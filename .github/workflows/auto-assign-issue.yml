name: Auto Assign and Label Issue

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  assign-and-label:
    runs-on: ubuntu-latest

    steps:
      - name: Assign issue to creator
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              assignees: [context.payload.issue.user.login]
            });

      - name: Add gssoc labels
        uses: actions/github-script@v7
        with:
          script: |
            const labels = ["gssoc", "Gssoc'26"];
            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label
                });
              } catch (e) {
                if (e.status === 404) {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: label,
                    color: "e4e669"
                  });
                } else {
                  core.warning(`Unexpected error checking label "${label}": ${e.message}`);
                }
              }
            }
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: labels
            });
