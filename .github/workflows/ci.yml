# ============================================================================
# CI Pipeline — 100 Days 100 Web Projects
# Runs on PRs and pushes to Main
# Validates HTML, checks links, builds Docker image, and runs security scan
# ============================================================================

name: CI Pipeline

on:
  push:
    branches: [Main]
    paths-ignore:
      - "README.md"
      - "CONTRIBUTING.md"
      - "DEPLOYMENT.md"
      - "SECURITY.md"
      - "LICENSE"
  pull_request:
    branches: [Main]
    paths-ignore:
      - "README.md"
      - "CONTRIBUTING.md"
      - "DEPLOYMENT.md"
      - "SECURITY.md"
      - "LICENSE"

permissions:
  contents: read

jobs:
  # ── HTML Linting ──────────────────────────────────────────────
  lint-html:
    name: 🔍 HTML Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run HTMLHint on main site
        run: npx -y htmlhint index.html contributors/contributor.html
        continue-on-error: true # Warn-only for now — don't block PRs

  # ── Link Checking ─────────────────────────────────────────────
  check-links:
    name: 🔗 Link Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Check for broken links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --exclude-mail
            --exclude "fonts.googleapis.com"
            --exclude "fonts.gstatic.com"
            --exclude "cdnjs.cloudflare.com"
            --exclude "github.com/.*/issues"
            --exclude "github.com/.*/pull"
            --suggest
            index.html
            contributors/contributor.html
          fail: false # Warn-only — external links may be flaky in CI

  # ── Docker Build ──────────────────────────────────────────────
  docker-build:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: 100days-web:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test container starts
        run: |
          docker run -d --name test-container -p 8080:80 100days-web:ci-${{ github.sha }}
          sleep 5
          curl -f http://localhost:8080/ || (docker logs test-container && exit 1)
          echo "✅ Container is serving content successfully"
          docker stop test-container

  # ── Security Scan ─────────────────────────────────────────────
  security-scan:
    name: 🛡️ Security Scan
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image for scan
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: 100days-web:scan

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "100days-web:scan"
          format: "table"
          severity: "CRITICAL,HIGH"
          exit-code: "0" # Warn-only — don't block on base image CVEs

      - name: Run Validation Script
        run: |
          echo "🏁 Starting PR Quality and Template Compliance checks..."
          node scripts/validate-metadata.js
