name: 🔍 Project Duplication Detector

on:
  push:
    branches: [Main]
    paths:
      - "projects.json"
      - ".github/workflows/duplicate-detector.yml"
      - ".github/scripts/detect-duplicates.js"
  pull_request:
    branches: [Main]
    paths:
      - "projects.json"
      - ".github/workflows/duplicate-detector.yml"
      - ".github/scripts/detect-duplicates.js"

permissions:
  contents: read

jobs:
  check-duplicates:
    name: 🛡️ Check Duplicate Registries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run Duplicate Detection Script
        run: node .github/scripts/detect-duplicates.js
