name: Label Merge Conflicts

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  label-merge-conflicts:
    runs-on: ubuntu-latest
    steps:
      - name: Label PRs with merge conflicts
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const labelName = 'merge-conflicts';

            try {
              await github.rest.issues.getLabel({
                owner,
                repo,
                name: labelName,
              });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }

              await github.rest.issues.createLabel({
                owner,
                repo,
                name: labelName,
                color: 'd73a4a',
                description: 'Pull request has merge conflicts',
              });
            }

            const openPulls = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: 'open',
              per_page: 100,
            });

            async function getMergeableStateWithRetry(pullNumber) {
              const maxAttempts = 5;
              for (let attempt = 1; attempt <= maxAttempts; attempt++) {
                let detailedPr;
                try {
                  detailedPr = await github.rest.pulls.get({
                    owner,
                    repo,
                    pull_number: pullNumber,
                  });
                } catch (error) {
                  if (error.status === 403) {
                    core.warning(`Skipped PR #${pullNumber} due to API rate limiting.`);
                    return null;
                  }
                  throw error;
                }

                const state = detailedPr.data.mergeable_state;
                if (state && state !== 'unknown') {
                  return state;
                }

                const delayMs = 1000 * 2 ** (attempt - 1);
                await new Promise((resolve) => setTimeout(resolve, delayMs));
              }

              core.info(`Skipped PR #${pullNumber} because mergeability is still being calculated.`);
              return null;
            }

            for (const pr of openPulls) {
              const hasLabel = pr.labels.some((label) => label.name === labelName);

              const mergeableState = await getMergeableStateWithRetry(pr.number);
              if (!mergeableState) {
                continue;
              }

              const hasConflicts = mergeableState === 'dirty';

              if (hasConflicts && !hasLabel) {
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: pr.number,
                  labels: [labelName],
                });
                core.info(`Added '${labelName}' to PR #${pr.number}`);
              }

              if (!hasConflicts && hasLabel) {
                try {
                  await github.rest.issues.removeLabel({
                    owner,
                    repo,
                    issue_number: pr.number,
                    name: labelName,
                  });
                  core.info(`Removed '${labelName}' from PR #${pr.number}`);
                } catch (error) {
                  if (error.status !== 404) {
                    throw error;
                  }
                }
              }
            }
