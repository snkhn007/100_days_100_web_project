name: pr-label-adder

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  process-prs:
    runs-on: ubuntu-latest

    steps:
      - name: Assign and Label PRs
        uses: actions/github-script@v7

        with:
          github-token: ${{ secrets.PR_CHECKER }}

          script: |
            const owner = context.repo.owner
            const repo = context.repo.repo

            async function getMergeState(prNumber){

              for(let i=0;i<5;i++){

                const pr =
                await github.rest.pulls.get({
                  owner,
                  repo,
                  pull_number: prNumber
                })

                if(
                  pr.data.mergeable_state &&
                  pr.data.mergeable_state !== "unknown"
                ){
                  return pr.data.mergeable_state
                }

                await new Promise(
                  r => setTimeout(r, 2000)
                )
              }

              return null
            }

            const prs =
            await github.paginate(
              github.rest.pulls.list,
              {
                owner,
                repo,
                state: "open",
                per_page: 100
              }
            )

            for(const pr of prs){

              const existing =
              pr.labels.map(
                l => l.name
              )

              const alreadyProcessed =
                existing.includes("gssoc:approved") ||
                existing.includes("merge-conflicts")

              if(alreadyProcessed){

                core.info(
                  `Skipping PR #${pr.number}`
                )

                continue
              }

              const files =
              await github.rest.pulls.listFiles({
                owner,
                repo,
                pull_number: pr.number
              })

              let changes = 0

              for(const f of files.data){
                changes += f.changes
              }

              let level

              if(changes < 75)
                level = "level:beginner"

              else if(changes <= 850)
                level = "level:intermediate"

              else
                level = "level:advanced"

              const mergeState =
              await getMergeState(
                pr.number
              )

              if(!mergeState){

                core.info(
                  `Skipping #${pr.number}`
                )

                continue
              }

              const labels = [
                "type:refactor",
                level
              ]

              if(
                mergeState === "dirty"
              ){
                labels.push(
                  "merge-conflicts"
                )
              }
              else{
                labels.push(
                  "gssoc:approved"
                )
              }

              try{

                await github.rest.issues.addAssignees({
                  owner,
                  repo,
                  issue_number:
                  pr.number,
                  assignees:[
                    pr.user.login
                  ]
                })

              } catch(err){

                core.warning(
                  `Assignment failed #${pr.number}`
                )
              }

              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number:
                pr.number,
                labels
              })

              core.info(
                `Completed PR #${pr.number}`
              )
            }
