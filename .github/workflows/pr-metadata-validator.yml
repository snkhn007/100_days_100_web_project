name: "Pull Request Metadata Validator"

on:
  pull_request:
    types: [opened, edited, synchronized]

jobs:
  validate-metadata:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Inspect PR Description Schema
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || "";
            
            let issuesFound = false;
            let checklistFound = false;
            let descriptionValid = true;
            
            // 1. Check for issue references (e.g. closes #12, resolve #4, #123)
            const issueRegex = /(closes|fixes|resolves|refs)?\s*#\d+/i;
            if (issueRegex.test(body)) {
              issuesFound = true;
            }
            
            // 2. Check for PR Template Checklist items
            if (body.includes("[x]") || body.includes("[ ]")) {
              checklistFound = true;
            }
            
            // 3. Verify PR is not empty
            if (body.trim().length < 20) {
              descriptionValid = false;
            }
            
            if (!issuesFound || !checklistFound || !descriptionValid) {
              let feedback = `### ⚠️ Pull Request Structure Notice\n\n`;
              feedback += `Hi @${pr.user.login}! Thanks for submitting your contribution. To keep our repository clean and reviewable, please ensure your PR descriptions meet our repository standard guidelines:\n\n`;
              
              if (!issuesFound) {
                feedback += `- **Link a target issue**: Reference the issue this PR resolves (e.g. \`Closes #123\`).\n`;
              }
              if (!checklistFound) {
                feedback += `- **Complete the template checklist**: Ensure the PR description contains our checklist items so we know what verification steps you took.\n`;
              }
              if (!descriptionValid) {
                feedback += `- **Provide context**: Add a brief summary explaining *what* was changed and *why* this fix is useful.\n`;
              }
              
              feedback += `\nOnce you edit the PR description to satisfy these points, our maintainers will be notified automatically. Thank you!`;
              
              // Post comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: feedback
              });
            } else {
              console.log("Pull Request metadata successfully validated!");
            }
