name: Update Contributors in README

on:
  workflow_dispatch:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  update-readme:
    if: github.event_name == 'workflow_dispatch' || (github.event.pull_request.merged == true && github.event.pull_request.base.ref == github.event.repository.default_branch)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update Contributors
        uses: akhilmhdh/contributors-readme-action@v2.3.10
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          readme_path: "README.md"
          commit_message: "docs(readme): auto-update contributor list [skip ci]"

      - name: Reorder Contributors by Latest Commit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python - <<'PY'
          import json
          import os
          import re
          import urllib.error
          import urllib.request
          from datetime import datetime
          from pathlib import Path

          readme_path = Path("README.md")
          start_marker = "<!-- readme: contributors -start -->"
          end_marker = "<!-- readme: contributors -end -->"
          columns_per_row = 6
          commits_per_page = 100
          # Scan a bounded window of recent history; unmatched users keep original order.
          max_commit_pages = 20

          content = readme_path.read_text(encoding="utf-8")
          section_match = re.search(
              rf"({re.escape(start_marker)}\n)(.*?)(\n{re.escape(end_marker)})",
              content,
              re.DOTALL,
          )

          if not section_match:
              raise SystemExit("Could not find contributors section in README.md")

          contributors_section = section_match.group(2)
          cells = re.findall(r"(<td align=\"center\">.*?</td>)", contributors_section, re.DOTALL)

          if not cells:
              raise SystemExit("No contributor cells found in README contributors section")

          token = os.environ["GITHUB_TOKEN"]
          repository = os.environ["GITHUB_REPOSITORY"]

          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {token}",
              "X-GitHub-Api-Version": "2022-11-28",
              "User-Agent": "contributors-reorder-workflow",
          }

          contributors = []
          usernames = set()
          for index, cell in enumerate(cells):
              username_match = re.search(r"https://github\.com/([a-zA-Z0-9-]+)", cell)
              if not username_match:
                  contributors.append((index, None, cell))
                  continue
              username = username_match.group(1)
              usernames.add(username)
              contributors.append((index, username, cell))

          latest_by_username = {}
          current_page = 1
          remaining_usernames = set(usernames)
          while remaining_usernames and current_page <= max_commit_pages:
              url = (
                  f"https://api.github.com/repos/{repository}/commits"
                  f"?per_page={commits_per_page}&page={current_page}"
              )
              request = urllib.request.Request(url, headers=headers)
              try:
                  with urllib.request.urlopen(request) as response:
                      payload = json.loads(response.read().decode("utf-8"))
              except urllib.error.HTTPError as exc:
                  print(
                      f"Warning: unable to fetch commits page {current_page}: HTTP {exc.code}. "
                      "Contributor order may be partially updated; rerun workflow if needed."
                  )
                  break
              except urllib.error.URLError as exc:
                  print(
                      f"Warning: unable to fetch commits page {current_page}: {exc.reason}. "
                      "Contributor order may be partially updated; rerun workflow if needed."
                  )
                  break

              if not isinstance(payload, list) or not payload:
                  break

              for commit_item in payload:
                  author = commit_item.get("author")
                  if not author:
                      continue
                  username = author.get("login")
                  if username not in remaining_usernames:
                      continue

                  commit_info = commit_item.get("commit") or {}
                  author_info = commit_info.get("author") or {}
                  date_str = author_info.get("date")
                  if not date_str:
                      continue
                  try:
                      parsed_date = datetime.fromisoformat(date_str.replace("Z", "+00:00"))
                  except ValueError:
                      continue
                  latest_by_username[username] = parsed_date.timestamp()
                  remaining_usernames.discard(username)
                  if not remaining_usernames:
                      break

              if len(payload) < commits_per_page:
                  break
              current_page += 1

          contributors = [
              (
                  index,
                  latest_by_username.get(username) if username else None,
                  cell,
              )
              for index, username, cell in contributors
          ]

          # Sort key tuple:
          # 1) item[1] is None: unknown timestamps go last
          # 2) -(item[1] or 0): newer commit timestamps first
          # 3) item[0]: preserve original order for ties
          contributors.sort(
              key=lambda item: (
                  item[1] is None,
                  -(item[1] or 0),
                  item[0],
              )
          )
          def normalize_cell_html(cell):
              normalized_lines = []
              for line in cell.strip().splitlines():
                  stripped_line = line.strip()
                  if stripped_line:
                      normalized_lines.append(stripped_line)
              return "\n".join(normalized_lines)

          sorted_cells = [normalize_cell_html(item[2]) for item in contributors]

          rows = []
          for idx in range(0, len(sorted_cells), columns_per_row):
              row_cells = sorted_cells[idx : idx + columns_per_row]
              row_content = "\n".join(row_cells)
              rows.append(f"<tr>\n{row_content}\n</tr>")

          rebuilt_table = "<table>\n<tbody>\n" + "\n".join(rows) + "\n</tbody>\n</table>"
          updated_content = (
              content[: section_match.start(2)]
              + rebuilt_table
              + content[section_match.end(2) :]
          )

          if updated_content != content:
              readme_path.write_text(updated_content, encoding="utf-8")
              print("Contributors reordered by latest commit date.")
          else:
              print("Contributors already ordered by latest commit date.")
          PY

      - name: Commit reordered contributors
        run: |
          if git diff --quiet README.md; then
            echo "No contributor reorder changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs(readme): reorder contributors by latest commit [skip ci]"
          git push
