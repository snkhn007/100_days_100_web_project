name: Validate Projects JSON Schema

on:
  push:
    paths:
      - 'projects.json'
  pull_request:
    paths:
      - 'projects.json'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Schema Validator
        run: node scripts/validate-metadata.js
