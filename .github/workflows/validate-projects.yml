name: Validate projects.json Schema

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-schema:
    name: Validate projects.json against schema
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate projects.json
        run: npm run validate:projects
