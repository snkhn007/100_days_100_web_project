name: Validate Projects JSON

on:
  pull_request:
    branches:
      - main

jobs:
  validate-projects:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate projects.json
        run: node scripts/validateProjects.js