name: First Interaction Welcome Bot

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - name: Welcome First Interaction
        uses: actions/first-interaction@v1.3.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            🎉 Welcome to **100 Days 100 Web Projects**! 🎉

            Thank you for opening your very first issue here! We are thrilled to have you join our open-source community. 

            Here are some quick steps to get started:
            1. **Check the Guidelines**: Please read our [CONTRIBUTING.md](https://github.com/dhairyagothi/100_days_100_web_project/blob/Main/CONTRIBUTING.md) to understand our workflow.
            2. **Wait for Assignment**: Please do not start working on this issue until a maintainer assigns it to you.
            3. **Ask for Help**: If you have any questions, feel free to drop a comment or start a discussion in our [GitHub Discussions](https://github.com/dhairyagothi/100_days_100_web_project/discussions).

            Happy contributing! 🚀
          pr-message: |
            🚀 Welcome to **100 Days 100 Web Projects**! 🚀

            Thank you for opening your first pull request! We truly appreciate your time and effort in making this project better.

            Before a maintainer reviews your changes, please ensure:
            - Your PR title is descriptive and follows the format: `type: description` (e.g., `feat: add new project X`).
            - You have linked the corresponding issue in your description (e.g., `Closes #123`).
            - All local tests pass by running `node scripts/validateProjects.js`.
            - The code is fully responsive and cross-browser compatible.

            We will review your PR as soon as possible. Thank you again! 🙌
