  <style type="text/css">
    :root {
      --bg-primary: #0a0a0a;
      --bg-secondary: rgba(255, 255, 255, 0.03);
      --text-primary: #fff;
      --text-secondary: rgba(255, 255, 255, 0.8);
      --accent-color: #1abc9c;
      --accent-hover: #16a085;
      --border-color: rgba(255, 255, 255, 0.1);
      --shadow-color: rgba(0, 0, 0, 0.3);
      --particle-color: rgba(26, 188, 156, 0.7);
    }

    body.light-mode {
      --bg-primary: #f5f5f5;
      --bg-secondary: rgba(0, 0, 0, 0.03);
      --text-primary: #2c3e50;
      --text-secondary: rgba(0, 0, 0, 0.7);
      --accent-color: #1abc9c;
      --accent-hover: #16a085;
      --border-color: rgba(0, 0, 0, 0.1);
      --shadow-color: rgba(0, 0, 0, 0.1);
      --particle-color: rgba(26, 188, 156, 0.3);
    }

    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 1000;
      background: rgba(26, 188, 156, 0.1);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border-color);
      padding: 1rem 2rem;
      box-shadow: 0 8px 32px var(--shadow-color);
      animation: slideDown 0.8s ease-out;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }

    @keyframes slideDown {
      from {
        transform: translateY(-100%);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .navbar-brand {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .navbar-brand img {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      box-shadow: 0 0 20px rgba(26, 188, 156, 0.6);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% {
        box-shadow: 0 0 20px rgba(26, 188, 156, 0.6);
      }
      50% {
        box-shadow: 0 0 40px rgba(26, 188, 156, 1);
      }
    }

    .navbar-brand span {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.5rem;
      font-weight: 900;
      background: linear-gradient(135deg, #1abc9c, #3498db, #9b59b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .buttons {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .buttons .button {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      padding: 0.6rem 1.2rem;
      border-radius: 8px;
      text-decoration: none;
      transition: all 0.3s ease;
      font-weight: 600;
      cursor: pointer;
    }

    .buttons .button:hover {
      background: var(--accent-color);
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(26, 188, 156, 0.4);
    }

    #themeToggle {
      background: rgba(26, 188, 156, 0.2);
      border: none;
      color: var(--accent-color);
      width: 45px;
      height: 45px;
      border-radius: 50%;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 1.1rem;
    }

    #themeToggle:hover {
      background: var(--accent-color);
      color: #fff;
      transform: rotate(180deg);
    }

     #scrollBtn {
       position: fixed;
       bottom: 20px; /* Place closer to the bottom */
       right: 20px; /* Place closer to the right */
       display: none; /* Initially hidden */
       background-color: #1abc9c;
       color: rgb(247, 242, 242);
       border: none;
       border-radius: 50%;
       padding: 15px;
       font-size: 18px;
       cursor: pointer;
       box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
       z-index: 1000; /* Ensure visibility above other elements */
       transition: background-color 0.3s ease, transform 0.3s ease;
     }

     #scrollBtn:hover {
       background-color: #000; /* Change color on hover */
       transform: scale(1.2); /* Slightly enlarge */
     }

     #bgCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

    @media (max-width: 768px) {
      .navbar-brand span {
        font-size: 1rem;
      }
      
      .navbar {
        padding: 1rem;
      }
      
      .buttons .button {
        font-size: 0.9rem;
        padding: 0.5rem 1rem;
      }
    }
  </style>

  <body>

    <!-- Top scroll button -->
    <button id="scrollBtn" title="Go to top">
      <i class="fa-solid fa-arrow-up fa-lg"></i>
    </button>

    <!-- Pushed JavaScript Code To Here -->
    <script src="index.js"></script>

    <script>
      // Get the button element
      const scrollBtn = document.getElementById("scrollBtn");

      // Show the button when the user scrolls down 100px from the top
      window.onscroll = function () {
        if (
          document.body.scrollTop > 100 ||
          document.documentElement.scrollTop > 100
        ) {
          scrollBtn.style.display = "block";
        } else {
          scrollBtn.style.display = "none";
        }
      };

      // Scroll to the top of the page when the button is clicked
      scrollBtn.onclick = function () {
        window.scrollTo({
          top: 0,
          behavior: "smooth",
        });
      };
    </script>
    <script src="contributor.js"></script>
