# ============================================================================
# 100 Days 100 Web Projects — Docker Compose
# Run: docker compose up --build
# Access: http://localhost:8080
# ============================================================================

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: 100days-web
    ports:
      - "8080:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
