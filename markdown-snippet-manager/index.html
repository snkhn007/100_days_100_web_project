<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a1a" />

    <title>Markdown Snippet Manager · 100 Days 100 Web Projects</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />

    <link rel="stylesheet" href="styles.css" />

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  </head>

  <body>
    <div class="ambient ambient-left" aria-hidden="true"></div>
    <div class="ambient ambient-right" aria-hidden="true"></div>
    <div class="noise-layer" aria-hidden="true"></div>

    <div class="app-container">
      <aside class="sidebar">
        <h2>Snippet Manager</h2>
        <button id="new-snippet-btn">+ New Snippet</button>
        <div class="search-box">
          <input
            type="text"
            id="search-input"
            placeholder="Search snippets..."
          />
        </div>
        <ul id="snippet-list"></ul>
      </aside>

      <main class="workspace">
        <div class="meta-inputs">
          <input
            type="text"
            id="snippet-title"
            placeholder="Snippet Title"
            disabled
          />
          <input
            type="text"
            id="snippet-category"
            placeholder="Category (e.g., Git, Docs)"
            disabled
          />
          <button id="save-btn" disabled>Save</button>
          <button id="copy-btn" disabled>Copy Raw Text</button>
        </div>

        <div class="split-view">
          <div class="editor-pane">
            <h3>Raw Markdown</h3>
            <textarea
              id="markdown-textarea"
              placeholder="Select a snippet or click '+ New Snippet' to start writing..."
              disabled
            ></textarea>
          </div>
          <div class="preview-pane">
            <h3>Live Preview</h3>
            <div id="markdown-preview" class="markdown-body"></div>
          </div>
        </div>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
