<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="2048 — A beautiful, feature-rich tile puzzle game." />
  <title>2048</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body class="light">
<a href="/" class="project-back-button" style="position:fixed;left:18px;top:18px;padding:8px 16px;border-radius:8px;background:#1e293b;color:#3b82f6;border:1px solid #3b82f6;text-decoration:none;z-index:9999;font-weight:700;font-family:Inter, system-ui, sans-serif;transition:all 0.2s ease;" onmouseover="this.style.background='#3b82f6';this.style.color='#fff'" onmouseout="this.style.background='#1e293b';this.style.color='#3b82f6'">← Back to Home</a>


  <div id="g">
    <!-- Animated background blobs -->
    <div class="blobs" aria-hidden="true">
      <div class="blob b1"></div>
      <div class="blob b2"></div>
      <div class="blob b3"></div>
      <div class="blob b4"></div>
    </div>

    <!-- Confetti canvas -->
    <canvas id="confetti-canvas" aria-hidden="true"></canvas>

    <div id="inner">

      <!-- Header: logo + scores -->
      <header class="hdr">
        <h1 class="logo" aria-label="2048">2048</h1>
        <div class="score-row" role="status" aria-live="polite" aria-label="Scores">
          <div class="sc" id="sc">
            <div class="sc-lbl">score</div>
            <div class="sc-val" id="sv">0</div>
          </div>
          <div class="sc" id="bc">
            <div class="sc-lbl">best</div>
            <div class="sc-val" id="bv">0</div>
          </div>
        </div>
      </header>

      <!-- Controls -->
      <div class="ctrl">
        <div class="btns">
          <button class="btn" id="nb" aria-label="New Game">New Game</button>
          <button class="btn sm" id="ub" aria-label="Undo last move">↩ Undo</button>
        </div>
        <div class="top-icons">
          <button class="icon-btn" id="stbtn" title="View Stats" aria-label="View Stats">📊</button>
          <button class="icon-btn" id="sdbtn" title="Toggle Sound" aria-label="Toggle Sound">🔊</button>
          <button class="icon-btn" id="tb" title="Toggle Theme" aria-label="Toggle Theme">☀</button>
        </div>
      </div>

      <!-- Mode selector -->
      <div class="mode-row" role="group" aria-label="Game mode">
  <button class="mode-btn active" data-mode="classic">Classic</button>
  <button class="mode-btn" data-mode="timed">⏱ 60s</button>
  <button class="mode-btn" data-mode="zen">Zen 5×5</button>
</div>

      <!-- Timer bar (timed mode only) -->
      <div class="timer-bar" id="tbar" aria-hidden="true">
        <div class="timer-fill" id="tfill" style="width:100%"></div>
      </div>

      <!-- Live metadata -->
      <div class="meta-row" role="status" aria-live="polite">
        <div class="meta-item">Moves: <span id="moves-val">0</span></div>
        <div class="meta-item">Tiles: <span id="tiles-val">2</span></div>
        <div class="meta-item">Best tile: <span id="btile-val">2</span></div>
      </div>

      <!-- Combo streak -->
      <div class="streak" id="streak" role="status" aria-live="polite"></div>

      
   <!-- Game board wrapper -->
<div class="wrap" id="wr">
  <div class="board" id="bd" role="grid" aria-label="Game board"></div>
  <div class="tiles-layer" id="tl" aria-hidden="true"></div>

  <!-- Game-over / win overlay -->
  <div
  id="ov"
  class="ov"
  style="display:none"
  role="dialog"
  aria-modal="true"
  aria-label="Game result">
</div>

  <!-- Achievement pop-up -->
  <div class="achievement" id="ach" role="alert">
    <div class="ach-title">Achievement Unlocked</div>
    <div id="ach-msg"></div>
  </div>

  <!-- Toast notification -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <div class="hint-arrow" id="hint-arrow"></div>

  <!-- Stats modal -->
  <div class="stats-modal" id="stats-modal" role="dialog" aria-modal="true" aria-label="Your Statistics">
    <div class="stats-inner">
      <h2 class="stats-title">Your Stats</h2>

      <div class="stats-grid">
        <div class="stat-card"><div class="lbl">Best Score</div><div class="val" id="st-best">0</div></div>
        <div class="stat-card"><div class="lbl">Games Played</div><div class="val" id="st-games">0</div></div>
        <div class="stat-card"><div class="lbl">Wins</div><div class="val" id="st-wins">0</div></div>
        <div class="stat-card"><div class="lbl">Best Tile</div><div class="val" id="st-tile">2</div></div>
      </div>

      <div class="ach-list">
        <div class="ach-list-title">Achievements</div>
        <div id="ach-badges"></div>
      </div>

      <button class="btn" id="close-stats">Close</button>
    </div>
  </div>

</div><!-- /.wrap -->

    </div><!-- /#inner -->
  </div><!-- /#g -->

  <script src="script.js"></script>
</body>

</html>
