<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>3D cards</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="../favv.png" type="image/x-icon" />
  </head>

  <body>
    <!-- Ambient Background Glow -->
    <div class="ambient-light"></div>

    <!-- Floating Hero Content -->
    <div class="hero-content">
      <h1>3D Dog Gallery</h1>

      <p>
        Interactive cinematic 3D rotating cards experience
      </p>
    </div>

    <!-- Glass Controls -->
    <div class="controls glass-panel">
      <button id="directionBtn">
        Reverse Rotation
      </button>

      <button id="pauseBtn">
        Pause Rotation
      </button>

      <button id="themeBtn">
        Light Mode
      </button>
    </div>

  <div class="box" id="slider">

    <span style="--i: 1">
      <img src="Images/img1.jpg" />
      <h2>Buddy</h2>
    </span>

    <span style="--i: 2">
      <img src="Images/img2.jpg" />
      <h2>Charlie</h2>
    </span>

    <span style="--i: 3">
      <img src="Images/img3.jpg" />
      <h2>Rocky</h2>
    </span>

    <span style="--i: 4">
      <img src="Images/img4.jpg" />
      <h2>Max</h2>
    </span>

  <span style="--i: 5">
    <img src="Images/img5.jpg" />
    <h2>Leo</h2>
  </span>

  <span style="--i: 6">
    <img src="Images/img6.jpg" />
    <h2>Luna</h2>
  </span>

  <span style="--i: 7">
    <img src="Images/img7.jpg" />
    <h2>Daisy</h2>
  </span>

  <span style="--i: 8">
    <img src="Images/img8.jpg" />
    <h2>Cooper</h2>
  </span>

</div>

    <script src="script.js"></script>
  </body>
</html>
