<!doctype html>
<html lang="en">
  <head>
    <style>
      
*,
*::before,
*::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --card-w: 200px;
  --card-h: 300px;
  --radius: 430px;
  --duration: 18s;
  --bg-from: #171717;
  --bg-mid: #050505;
  --bg-to: #000000;
  --text: #ffffff;
  --text-sub: rgba(255, 255, 255, 0.55);
  --glass-bg: rgba(255, 255, 255, 0.07);
  --glass-border: rgba(255, 255, 255, 0.1);
  --btn-bg: rgba(255, 255, 255, 0.08);
  --btn-hover-bg: #ffffff;
  --btn-hover-text: #000000;
  --card-border: rgba(255, 255, 255, 0.22);
  --card-border-hover: rgba(255, 255, 255, 0.6);
  --ambient: rgba(255, 255, 255, 0.08);
}

body {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  overflow: hidden;
  background: radial-gradient(
    circle at center,
    var(--bg-from) 0%,
    var(--bg-mid) 45%,
    var(--bg-to) 100%
  );
  font-family: 'DM Sans', Arial, sans-serif;
  perspective: 1800px;
  transition: background 0.5s ease;
}

.ambient-light {
  position: fixed;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  pointer-events: none;
  z-index: 0;
}

.ambient-light::after {
  content: '';
  width: 800px;
  height: 800px;
  background: radial-gradient(circle, var(--ambient), transparent 70%);
  filter: blur(90px);
  animation: pulseGlow 6s ease-in-out infinite;
}

@keyframes pulseGlow {
  0%,
  100% {
    transform: scale(1);
    opacity: 0.8;
  }
  50% {
    transform: scale(1.08);
    opacity: 1;
  }
}

.hero-content {
  position: fixed;
  top: clamp(16px, 5vh, 48px);
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  z-index: 50;
  width: 100%;
  padding: 0 16px;
  pointer-events: none;
}

.hero-content h1 {
  font-family: 'Bebas Neue', sans-serif;
  color: var(--text);
  font-size: clamp(2rem, 6vw, 4.5rem);
  letter-spacing: 4px;
  font-weight: 400;
  text-shadow: 0 0 20px rgba(255, 255, 255, 0.25);
  transition:
    color 0.4s,
    text-shadow 0.4s;
}

.hero-content p {
  margin-top: 8px;
  color: var(--text-sub);
  letter-spacing: 3px;
  text-transform: uppercase;
  font-size: clamp(0.65rem, 1.5vw, 0.85rem);
  transition: color 0.4s;
}

.scene {
  position: relative;
  z-index: 10;
  display: flex;
  justify-content: center;
  align-items: center;
  /* push down below hero text */
  margin-top: clamp(90px, 14vh, 140px);
  /* keep away from controls */
  margin-bottom: clamp(120px, 18vh, 160px);
}

.box {
  position: relative;
  width: var(--card-w);
  height: var(--card-h);
  transform-style: preserve-3d;
  animation: rotate var(--duration) linear infinite;
}

@keyframes rotate {
  from {
    transform: perspective(1400px) rotateY(0deg);
  }
  to {
    transform: perspective(1400px) rotateY(360deg);
  }
}

.box span {
  position: absolute;
  inset: 0;
  transform-origin: center;
  transform-style: preserve-3d;
  /* Apply dynamic depth scale, tilt angles, and Y rotation */
  transform: rotateY(calc(var(--i) * var(--angle-step, 45deg))) 
             translateZ(var(--radius)) 
             scale(var(--depth-scale, 1))
             rotateX(var(--tilt-x, 0deg))
             rotateY(var(--tilt-y, 0deg));
  transition:
    transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1),
    opacity 0.45s ease,
    filter 0.45s ease;
  -webkit-box-reflect: below 2px
    linear-gradient(transparent, rgba(0, 0, 0, 0) 40%, rgba(0, 0, 0, 0.12) 80%, transparent 100%);
  opacity: var(--depth-opacity, 0.55);
  filter: brightness(var(--depth-brightness, 0.75)) blur(var(--depth-blur, 0px));
}

.box span:hover {
  transform: rotateY(calc(var(--i) * var(--angle-step, 45deg)))
    translateZ(calc(var(--radius) + 42px)) 
    scale(1.06)
    rotateX(var(--tilt-x, 0deg))
    rotateY(var(--tilt-y, 0deg)) !important;
  opacity: 1 !important;
  filter: brightness(1.05) blur(0px) !important;
}

.image-wrapper {
  position: relative;
  width: 100%;
  height: 100%;
  border-radius: 20px;
  overflow: hidden;
}

.glare-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    135deg,
    rgba(255, 255, 255, 0.28) 0%,
    rgba(255, 255, 255, 0) 45%,
    rgba(0, 0, 0, 0.45) 100%
  );
  background-position: var(--glare-x, 50%) 50%;
  background-size: 200% 100%;
  mix-blend-mode: overlay;
  pointer-events: none;
  z-index: 10;
  transition: background-position 0.15s ease-out;
}

.box span img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 20px;
  border: 2px solid var(--card-border);
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.55);
  transition:
    border-color 0.4s ease,
    box-shadow 0.4s ease;
}

.box span {
  overflow: hidden;
  border-radius: 20px;
}

.box span img {
  background: #111;
}

.box span:hover img {
  border-color: var(--card-border-hover);
  box-shadow:
    0 0 25px rgba(255, 255, 255, 0.18),
    0 0 60px rgba(255, 255, 255, 0.1),
    0 20px 50px rgba(0, 0, 0, 0.75);
}

.box span h2 {
  position: absolute;
  bottom: -56px;
  left: 50%;
  transform: translateX(-50%);
  color: var(--text);
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(1rem, 2vw, 1.3rem);
  font-weight: 400;
  letter-spacing: 3px;
  text-transform: uppercase;
  white-space: nowrap;
  opacity: 0.85;
  text-shadow:
    0 0 10px rgba(255, 255, 255, 0.3),
    0 0 25px rgba(255, 255, 255, 0.12);
  transition:
    transform 0.4s ease,
    opacity 0.4s ease,
    text-shadow 0.4s ease;
}

.box span:hover h2 {
  opacity: 1;
  transform: translateX(-50%) translateY(-5px) scale(1.08);
  text-shadow:
    0 0 16px rgba(255, 255, 255, 0.65),
    0 0 40px rgba(255, 255, 255, 0.22);
}

.controls {
  position: fixed;
  bottom: clamp(16px, 4vh, 40px);
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 12px;
  z-index: 100;
  flex-wrap: wrap;
  justify-content: center;
}

.glass-panel {
  background: var(--glass-bg);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border: 1px solid var(--glass-border);
  border-radius: 20px;
  padding: clamp(12px, 2vw, 20px) clamp(14px, 2.5vw, 24px);
}

.ctrl-btn {
  position: relative;
  padding: 13px 0;
  width: clamp(160px, 22vw, 230px);
  border: 1px solid rgba(255, 255, 255, 0.12);
  border-radius: 12px;
  cursor: pointer;
  background: var(--btn-bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-weight: 600;
  font-size: clamp(0.8rem, 1.4vw, 0.95rem);
  letter-spacing: 0.8px;
  overflow: hidden;
  /* smooth all transitions */
  transition:
    color 0.3s ease,
    border-color 0.3s ease,
    transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1),
    box-shadow 0.35s ease,
    background 0.3s ease;
  isolation: isolate;
}

/* Sliding fill pseudo-element */
.ctrl-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--btn-hover-bg);
  transform: scaleX(0);
  transform-origin: left center;
  transition: transform 0.4s cubic-bezier(0.77, 0, 0.175, 1);
  border-radius: inherit;
  z-index: -1;
}

.ctrl-btn:hover::before {
  transform: scaleX(1);
}

/* Outer glow ring */
.ctrl-btn::after {
  content: '';
  position: absolute;
  inset: -3px;
  border-radius: 14px;
  background: transparent;
  border: 1.5px solid rgba(255, 255, 255, 0);
  transition:
    border-color 0.35s ease,
    box-shadow 0.35s ease;
  pointer-events: none;
}

.ctrl-btn:hover::after {
  border-color: rgba(255, 255, 255, 0.5);
  box-shadow:
    0 0 22px rgba(255, 255, 255, 0.25),
    0 0 55px rgba(255, 255, 255, 0.1);
}

.ctrl-btn:hover {
  color: var(--btn-hover-text);
  border-color: transparent;
  transform: translateY(-5px) scale(1.04);
  box-shadow:
    0 10px 32px rgba(255, 255, 255, 0.18),
    0 4px 12px rgba(0, 0, 0, 0.3);
}

.ctrl-btn:active {
  transform: translateY(-2px) scale(1.01);
  transition-duration: 0.1s;
}

.btn-label {
  position: relative;
  z-index: 1;
  pointer-events: none;
}

body.light-theme {
  --bg-from: #f8f8f8;

}

    circle at center,

}

}

}

}

    0 10px 28px rgba(0, 0, 0, 0.15),

@media (max-width: 600px) {
  :root {
    --card-w: 120px;
    --card-h: 180px;
    --radius: 220px;
  }

  .box span h2 {
    bottom: -36px;
    font-size: 0.85rem;
    letter-spacing: 2px;
  }

  .controls {
    gap: 8px;
    padding: 10px 12px;
  }

  .ctrl-btn {
    width: clamp(130px, 40vw, 180px);
    padding: 11px 0;
    font-size: 0.75rem;
  }

  .scene {
    margin-top: clamp(70px, 12vh, 110px);
    margin-bottom: clamp(140px, 22vh, 180px);
  }
}

@media (max-width: 380px) {
  :root {
    --card-w: 90px;
    --card-h: 135px;
    --radius: 150px;
  }

  .hero-content h1 {
    font-size: 1.7rem;
    letter-spacing: 2px;
  }

  .ctrl-btn {
    width: 120px;
    font-size: 0.7rem;
  }
}

@media (min-width: 601px) and (max-width: 900px) {
  :root {
    --card-w: 160px;
    --card-h: 240px;
    --radius: 340px;
  }

  .box span h2 {
    font-size: 1.1rem;
  }
}

.fallback-image {
  object-fit: contain !important;
  background: linear-gradient(
    135deg,
    rgba(255, 255, 255, 0.08),
    rgba(255, 255, 255, 0.02)
  );

  padding: 30px;
  border-radius: 20px;

  filter: brightness(0.95);

  display: flex;
  align-items: center;
  justify-content: center;
}


.box span img {
  transition:
    transform 0.4s ease,
    opacity 0.4s ease,
    border-color 0.4s ease,
    box-shadow 0.4s ease;
}

.box span:hover img {
  transform: scale(1.05);
}

/* cleaner reflections */
.box span {
  -webkit-box-reflect: below 2px

}


.image-wrapper {
  position: relative;
  width: 100%;
  height: 100%;
}

.fallback-card {
  position: absolute;
  inset: 0;

  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;

  border-radius: 20px;

  background:
    linear-gradient(
      145deg,
      rgba(35,35,35,0.95),
      rgba(10,10,10,0.98)
    );

  border: 2px solid rgba(255,255,255,0.08);

  box-shadow:
    inset 0 0 30px rgba(255,255,255,0.03),
    0 20px 40px rgba(0,0,0,0.55);

  overflow: hidden;
}

.fallback-card::before {
  content: '';

  position: absolute;
  inset: 0;

  background:
    radial-gradient(
      circle at top,
      rgba(255,255,255,0.08),
      transparent 60%
    );

  pointer-events: none;
}

.fallback-icon {
  font-size: 4rem;
  filter: drop-shadow(0 0 18px rgba(255,255,255,0.2));
  animation: floatDog 3s ease-in-out infinite;
}

.fallback-card p {
  color: rgba(255,255,255,0.75);

  font-size: 0.9rem;
  letter-spacing: 2px;
  text-transform: uppercase;

  font-family: 'DM Sans', sans-serif;
}

@keyframes floatDog {
  0%,100% {
    transform: translateY(0px);
  }

  50% {
    transform: translateY(-10px);
  }
}

}

  to {

  }
}
