<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Dog Gallery</title>

    <link rel="stylesheet" href="style.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link rel="icon" href="../favv.png" type="image/x-icon" />

    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
<a href="/" class="project-back-button" style="position:fixed;left:18px;top:18px;padding:8px 12px;border-radius:8px;background:linear-gradient(90deg, rgba(124,99,255,0.14), rgba(79,141,255,0.10));color:#fff;text-decoration:none;z-index:9999;font-weight:700;font-family:Inter, system-ui, sans-serif;box-shadow:0 8px 20px rgba(12,18,40,0.35);">← Back to Home</a>

    <div class="ambient-light"></div>

    <header class="hero-content">
      <h1>3D Dog Gallery</h1>
      <p>Interactive cinematic 3D rotating cards experience</p>
    </header>

    <main id="main-content">
      <section class="scene" aria-label="3D rotating dog gallery">
        <div
          class="box"
          id="slider"
          role="region"
          aria-live="polite"
          aria-label="Dog gallery cards"
        ></div>
      </section>
    </main>

    <nav class="controls glass-panel" aria-label="Gallery Controls">
      <button
        class="ctrl-btn"
        id="directionBtn"
        aria-label="Reverse gallery rotation"
      >
        <span class="btn-label">Reverse Rotation</span>
      </button>

      <button
        class="ctrl-btn"
        id="pauseBtn"
        aria-label="Pause gallery rotation"
      >
        <span class="btn-label">Pause Rotation</span>
      </button>

      <button class="ctrl-btn" id="themeBtn" aria-label="Switch theme">
        <span class="btn-label">Light Mode</span>
      </button>
    </nav>

    <script src="script.js"></script>
  </body>
</html>
