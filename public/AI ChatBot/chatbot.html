<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="api-key-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-icon">
                <i class="fa-solid fa-key"></i>
            </div>
            <h2>Enter Gemini API Key</h2>
            <p>To use this chatbot, please enter your Google Gemini API key. It is only stored locally in your current browser session.</p>
            <input type="password" id="api-key-input" placeholder="AIzaSy..." autocomplete="off">
            <button id="save-key-btn">Save & Start Chatting</button>
            <div class="modal-footer">
                Don't have one? <a href="https://aistudio.google.com/" target="_blank">Get it here</a>
            </div>
        </div>
    </div>

    <div class="chat-container">
        <div class="chat-header">
            <div class="header-info">
                <div class="bot-avatar-header">
                    <i class="fa-solid fa-robot"></i>
                    <span class="status-dot"></span>
                </div>
                <div class="header-text">
                    <h2>AI Assistant</h2>
                    <span class="status-text">Online</span>
                </div>
            </div>
            <button id="settings-btn" title="Update API Key" class="icon-btn">
                <i class="fa-solid fa-gear"></i>
            </button>
        </div>
        
        <div class="chat-messages" id="chat-messages">
            <div class="message bot">
                <div class="avatar"><i class="fa-solid fa-robot"></i></div>
                <div class="message-wrapper">
                    <div class="message-content">
                        <p>Hello! I'm your AI assistant. How can I help you today?</p>
                    </div>
                    <span class="timestamp">Just now</span>
                </div>
            </div>
        </div>

        <div class="chat-input-area">
            <div class="input-wrapper">
                <input type="text" id="user-input" placeholder="Message AI..." autocomplete="off">
                <button id="send-btn" class="send-btn" title="Send message">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
            <div class="branding-footer">
                Powered by Google Gemini
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
