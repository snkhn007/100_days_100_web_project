<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Classifier</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
</head>
<body>
<a href="/" class="project-back-button" style="position:fixed;left:18px;top:18px;padding:8px 12px;border-radius:8px;background:linear-gradient(90deg, rgba(124,99,255,0.14), rgba(79,141,255,0.10));color:#fff;text-decoration:none;z-index:9999;font-weight:700;font-family:Inter, system-ui, sans-serif;box-shadow:0 8px 20px rgba(12,18,40,0.35);">← Back to Home</a>

    <div class="bg-blur blur1"></div>
    <div class="bg-blur blur2"></div>
    <div class="main-layout">
        <div class="container">
            <div class="top-section">
                <div class="ai-badge">
                    AI Powered
                </div>
                <h1>🧠 AI Image Classifier</h1>
                <p class="subtitle">
                    Upload any image and let AI identify objects instantly with smart AI predictions.
                </p>
            </div>
            <div class="upload-area">
                <img id="preview" src="" alt="Preview">
                <div class="upload-content" id="uploadContent">
                    <div class="upload-icon">
                        📸
                    </div>
                    <h3>Upload Image</h3>
                    <p>Choose any image to analyze</p>
                </div>
            </div>
            <div class="btn-group">
                <label for="imageUpload" class="upload-btn">
                    Choose Image
                </label>
                <input type="file" id="imageUpload" accept="image/*" hidden>
                <button id="classifyBtn">
                    Analyze
                </button>
            </div>
        </div>
        <div class="prediction-panel" id="predictionPanel">
            <div class="prediction-header">
                <h2>✨ Predictions</h2>
            </div>
            <div id="result"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
