<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Form Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-shell">

  <!-- Top Bar -->
  <header class="topbar">
    <div class="topbar-left">
      <div class="logo">
        <span class="logo-icon">⬡</span>
        <span class="logo-text">FormForge</span>
      </div>
      <div class="form-meta-inputs">
        <input type="text" id="formTitle" placeholder="Untitled Form" class="meta-input title-input">
        <input type="text" id="formDesc" placeholder="Add a description…" class="meta-input desc-input">
      </div>
    </div>
    <div class="topbar-right">
      <div class="device-tabs">
        <button class="device-tab active" data-device="desktop" title="Desktop">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
        </button>
        <button class="device-tab" data-device="tablet" title="Tablet">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="2" width="16" height="20" rx="2"/><circle cx="12" cy="18" r="1"/></svg>
        </button>
        <button class="device-tab" data-device="mobile" title="Mobile">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2"/><circle cx="12" cy="18" r="1"/></svg>
        </button>
      </div>
      <div class="save-controls">
        <button class="btn-ghost" id="importBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Import
        </button>
        <button class="btn-ghost" id="exportBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Export
        </button>
        <button class="btn-ghost" id="generateBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
          HTML
        </button>
        <button class="btn-primary" id="saveBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          Save
        </button>
      </div>
      <div class="autosave-badge" id="autosaveBadge">● Saved</div>
    </div>
  </header>

  <div class="workspace">

    <!-- Left: Field Builder -->
    <aside class="panel panel-builder" id="builderPanel">
      <div class="panel-header">
        <span>Add Field</span>
        <div class="panel-tabs">
          <button class="ptab active" data-tab="field">Field</button>
          <button class="ptab" data-tab="settings">Settings</button>
        </div>
      </div>

      <!-- Field Tab -->
      <div class="panel-body" id="fieldTab">
        <div class="field-group">
          <label class="field-label">Label <span class="required-star">*</span></label>
          <input type="text" id="labelInput" placeholder="e.g. Username" class="f-input">
        </div>

        <div class="field-group">
          <label class="field-label">Field Type</label>
          <div class="type-grid">
            <button class="type-btn active" data-type="text">
              <span class="type-icon">Aa</span>
              <span>Text</span>
            </button>
            <button class="type-btn" data-type="email">
              <span class="type-icon">@</span>
              <span>Email</span>
            </button>
            <button class="type-btn" data-type="number">
              <span class="type-icon">123</span>
              <span>Number</span>
            </button>
            <button class="type-btn" data-type="tel">
              <span class="type-icon">☎</span>
              <span>Phone</span>
            </button>
            <button class="type-btn" data-type="textarea">
              <span class="type-icon">¶</span>
              <span>Textarea</span>
            </button>
            <button class="type-btn" data-type="select">
              <span class="type-icon">▾</span>
              <span>Select</span>
            </button>
            <button class="type-btn" data-type="checkbox">
              <span class="type-icon">☑</span>
              <span>Checkbox</span>
            </button>
            <button class="type-btn" data-type="radio">
              <span class="type-icon">◉</span>
              <span>Radio</span>
            </button>
            <button class="type-btn" data-type="date">
              <span class="type-icon">📅</span>
              <span>Date</span>
            </button>
            <button class="type-btn" data-type="file">
              <span class="type-icon">📎</span>
              <span>File</span>
            </button>
          </div>
        </div>

        <div class="field-group" id="optionsGroup" style="display:none">
          <label class="field-label">Options <span class="hint">(one per line)</span></label>
          <textarea id="optionsInput" placeholder="Option 1&#10;Option 2&#10;Option 3" class="f-input f-textarea" rows="4"></textarea>
        </div>

        <div class="field-group">
          <label class="field-label">Placeholder</label>
          <input type="text" id="placeholderInput" placeholder="Placeholder text…" class="f-input">
        </div>

        <div class="field-group">
          <label class="field-label">Default Value</label>
          <input type="text" id="defaultInput" placeholder="Default value…" class="f-input">
        </div>

        <div class="field-group">
          <label class="field-label">Help Text</label>
          <input type="text" id="helpInput" placeholder="Description shown below field…" class="f-input">
        </div>

        <div class="field-group">
          <label class="field-label">Required</label>
          <label class="toggle-switch">
            <input type="checkbox" id="requiredInput">
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
            <span class="toggle-label">Mark as required</span>
          </label>
        </div>

        <!-- Validation Section -->
        <div class="section-divider">
          <span>Validation</span>
        </div>

        <div class="field-group" id="minLenGroup">
          <label class="field-label">Min Length</label>
          <input type="number" id="minLenInput" placeholder="e.g. 5" class="f-input f-input-sm" min="0">
        </div>

        <div class="field-group" id="maxLenGroup">
          <label class="field-label">Max Length</label>
          <input type="number" id="maxLenInput" placeholder="e.g. 100" class="f-input f-input-sm" min="0">
        </div>

        <div class="field-group" id="minNumGroup" style="display:none">
          <label class="field-label">Min Value</label>
          <input type="number" id="minNumInput" placeholder="e.g. 0" class="f-input f-input-sm">
        </div>

        <div class="field-group" id="maxNumGroup" style="display:none">
          <label class="field-label">Max Value</label>
          <input type="number" id="maxNumInput" placeholder="e.g. 999" class="f-input f-input-sm">
        </div>

        <div class="field-group" id="regexGroup">
          <label class="field-label">Regex Pattern</label>
          <input type="text" id="regexInput" placeholder="e.g. ^[a-zA-Z]+$" class="f-input f-mono">
        </div>

        <div class="field-group" id="regexMsgGroup">
          <label class="field-label">Regex Error Message</label>
          <input type="text" id="regexMsgInput" placeholder="Invalid format" class="f-input">
        </div>

        <button class="btn-add" id="addFieldBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Field
        </button>
      </div>

      <!-- Settings Tab -->
      <div class="panel-body hidden" id="settingsTab">
        <div class="field-group">
          <label class="field-label">Button Text</label>
          <input type="text" id="btnTextInput" placeholder="Submit" class="f-input" value="Submit">
        </div>

        <div class="field-group">
          <label class="field-label">Theme</label>
          <div class="theme-grid">
            <button class="theme-btn active" data-theme="dark" style="--tc:#0f172a;--ta:#6366f1">
              <span class="theme-swatch"></span>Dark
            </button>
            <button class="theme-btn" data-theme="light" style="--tc:#ffffff;--ta:#6366f1">
              <span class="theme-swatch"></span>Light
            </button>
            <button class="theme-btn" data-theme="ocean" style="--tc:#0c1b33;--ta:#00b4d8">
              <span class="theme-swatch"></span>Ocean
            </button>
            <button class="theme-btn" data-theme="forest" style="--tc:#1a2e1a;--ta:#4ade80">
              <span class="theme-swatch"></span>Forest
            </button>
            <button class="theme-btn" data-theme="warm" style="--tc:#fdf6ec;--ta:#f97316">
              <span class="theme-swatch"></span>Warm
            </button>
            <button class="theme-btn" data-theme="mono" style="--tc:#1a1a1a;--ta:#e5e5e5">
              <span class="theme-swatch"></span>Mono
            </button>
          </div>
        </div>

        <div class="field-group">
          <label class="field-label">Primary Color</label>
          <div class="color-row">
            <input type="color" id="primaryColor" value="#6366f1" class="color-picker">
            <input type="text" id="primaryColorText" value="#6366f1" class="f-input f-mono" maxlength="7">
          </div>
        </div>

        <div class="field-group">
          <label class="field-label">Border Radius</label>
          <div class="range-row">
            <input type="range" id="borderRadius" min="0" max="24" value="8" class="range-input">
            <span class="range-value" id="borderRadiusVal">8px</span>
          </div>
        </div>

        <div class="field-group">
          <label class="field-label">Font Size</label>
          <div class="range-row">
            <input type="range" id="fontSize" min="12" max="20" value="15" class="range-input">
            <span class="range-value" id="fontSizeVal">15px</span>
          </div>
        </div>
      </div>
    </aside>

    <!-- Center: Preview -->
    <main class="preview-area" id="previewArea">
      <div class="preview-frame-wrap">
        <div class="preview-frame" id="previewFrame" data-device="desktop">
          <div class="preview-inner" id="previewInner">
            <div class="preview-form-header">
              <h2 class="preview-form-title" id="pvTitle">Untitled Form</h2>
              <p class="preview-form-desc" id="pvDesc"></p>
            </div>
            <form id="formPreview" novalidate></form>
            <div class="empty-state" id="emptyState">
              <div class="empty-icon">⊞</div>
              <p>Add your first field using the panel on the left</p>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Right: Fields List -->
    <aside class="panel panel-fields" id="fieldsPanel">
      <div class="panel-header">
        <span>Fields <span class="field-count" id="fieldCount">0</span></span>
        <button class="icon-btn danger" id="clearAllBtn" title="Clear all fields">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
        </button>
      </div>
      <div class="panel-body no-pad" id="fieldsList">
        <div class="fields-empty" id="fieldsEmptyMsg">No fields yet</div>
      </div>
    </aside>

  </div>

  <!-- Edit Modal -->
  <div class="modal-overlay hidden" id="editModal">
    <div class="modal">
      <div class="modal-header">
        <h3>Edit Field</h3>
        <button class="icon-btn" id="closeModal">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="field-group">
          <label class="field-label">Label</label>
          <input type="text" id="editLabel" class="f-input">
        </div>
        <div class="field-group">
          <label class="field-label">Placeholder</label>
          <input type="text" id="editPlaceholder" class="f-input">
        </div>
        <div class="field-group">
          <label class="field-label">Default Value</label>
          <input type="text" id="editDefault" class="f-input">
        </div>
        <div class="field-group">
          <label class="field-label">Help Text</label>
          <input type="text" id="editHelp" class="f-input">
        </div>
        <div class="field-group" id="editOptionsGroup">
          <label class="field-label">Options <span class="hint">(one per line)</span></label>
          <textarea id="editOptions" class="f-input f-textarea" rows="4"></textarea>
        </div>
        <div class="field-group">
          <label class="toggle-switch">
            <input type="checkbox" id="editRequired">
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
            <span class="toggle-label">Required</span>
          </label>
        </div>
        <div class="section-divider"><span>Validation</span></div>
        <div class="two-col">
          <div class="field-group">
            <label class="field-label">Min Length</label>
            <input type="number" id="editMinLen" class="f-input f-input-sm" min="0">
          </div>
          <div class="field-group">
            <label class="field-label">Max Length</label>
            <input type="number" id="editMaxLen" class="f-input f-input-sm" min="0">
          </div>
        </div>
        <div class="two-col" id="editNumGroup">
          <div class="field-group">
            <label class="field-label">Min Number</label>
            <input type="number" id="editMinNum" class="f-input f-input-sm">
          </div>
          <div class="field-group">
            <label class="field-label">Max Number</label>
            <input type="number" id="editMaxNum" class="f-input f-input-sm">
          </div>
        </div>
        <div class="field-group">
          <label class="field-label">Regex Pattern</label>
          <input type="text" id="editRegex" class="f-input f-mono">
        </div>
        <div class="field-group">
          <label class="field-label">Regex Error Message</label>
          <input type="text" id="editRegexMsg" class="f-input">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-ghost" id="cancelEdit">Cancel</button>
        <button class="btn-primary" id="saveEdit">Save Changes</button>
      </div>
    </div>
  </div>

  <!-- HTML Output Modal -->
  <div class="modal-overlay hidden" id="htmlModal">
    <div class="modal modal-wide">
      <div class="modal-header">
        <h3>Generated HTML</h3>
        <div style="display:flex;gap:8px;align-items:center">
          <button class="btn-ghost" id="copyHtml">Copy</button>
          <button class="icon-btn" id="closeHtmlModal">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
      </div>
      <div class="modal-body">
        <textarea id="htmlOutput" class="f-input f-mono html-output" readonly spellcheck="false"></textarea>
      </div>
    </div>
  </div>

  <!-- Hidden file input for import -->
  <input type="file" id="importFile" accept=".json" style="display:none">

</div>

<script src="script.js"></script>
</body>
</html>
