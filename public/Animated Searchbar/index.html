<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Search Bar</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Animated Search Bar</h1>
  <p class="subtitle">Search anything or use voice input</p>

  <div class="search-wrapper">
    <div class="container">
      <i class="fa-solid fa-magnifying-glass magnifier" aria-label="Search" role="button" tabindex="0"></i>
      <input 
        type="text" 
        class="input" 
        placeholder="Type to search..." 
        aria-label="Search input"
        autocomplete="off"
      />
      <kbd class="shortcut-badge">Ctrl K</kbd>
      <i class="fa-solid fa-xmark clear-icon" aria-label="Clear search" role="button" tabindex="0"></i>
      <i class="fa-solid fa-microphone mic-icon" aria-label="Voice search" role="button" tabindex="0"></i>
      <div class="loading-spinner"></div>
    </div>

    <div class="suggestions-box" id="suggestions"></div>
  </div>

  <div id="result" class="result-box"></div>

  <script src="app.js"></script>
</body>
</html>
