<!DOCTYPE html>
<html lang="en">
<head>
<meta charset= "UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="animated-cursor.css">
<link rel="icon" href="../favv.png" type="image/x-icon" />

<title>Animated Cursor</title>
</head>
<body>

<div class="background"></div>

<div class="galaxy-glow"></div>

<canvas id="stars"></canvas>

<div class="glass-overlay"></div>

<div class="cursor"></div>

<main class="content">
    <h1>Animated Cursor</h1>
    <p>Move around and hover the actions to feel the glowing comet trail.</p>
    <div class="cursor-picker">
        <span>Change Cursor Design</span>
        <select id="cursor-design" class="native-select" aria-hidden="true" tabindex="-1">
            <option value="orb">Glowing Orb</option>
            <option value="ring">Neon Ring</option>
            <option value="diamond">Crystal Diamond</option>
            <option value="crosshair">Crosshair</option>
        </select>
        <div class="custom-select magnetic-control" data-select="cursor-design">
            <button class="select-trigger" type="button" aria-haspopup="listbox" aria-expanded="false">
                <span>Glowing Orb</span>
            </button>
            <ul class="select-menu" role="listbox">
                <li class="select-option is-selected" role="option" data-value="orb" aria-selected="true">Glowing Orb</li>
                <li class="select-option" role="option" data-value="ring">Neon Ring</li>
                <li class="select-option" role="option" data-value="diamond">Crystal Diamond</li>
                <li class="select-option" role="option" data-value="crosshair">Crosshair</li>
            </ul>
        </div>
    </div>
    <div class="cursor-picker">
        <span>Theme</span>
        <select id="theme-design" class="native-select" aria-hidden="true" tabindex="-1">
            <option value="galaxy">Galaxy</option>
            <option value="aurora">Aurora</option>
            <option value="neon">Neon</option>
            <option value="firefly">Firefly</option>
        </select>
        <div class="custom-select magnetic-control" data-select="theme-design">
            <button class="select-trigger" type="button" aria-haspopup="listbox" aria-expanded="false">
                <span>Galaxy</span>
            </button>
            <ul class="select-menu" role="listbox">
                <li class="select-option is-selected" role="option" data-value="galaxy" aria-selected="true">Galaxy</li>
                <li class="select-option" role="option" data-value="aurora">Aurora</li>
                <li class="select-option" role="option" data-value="neon">Neon</li>
                <li class="select-option" role="option" data-value="firefly">Firefly</li>
            </ul>
        </div>
    </div>
</main>

<script src="animated-cursor.js"></script>
</body>
</html>
