<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Privacy Policy Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<a href="/" class="project-back-button" style="position:fixed;left:18px;top:18px;padding:8px 12px;border-radius:8px;background:white;text-decoration:none;z-index:9999;font-weight:700;font-family:Inter, system-ui, sans-serif;box-shadow:0 8px 20px rgba(0, 0, 0);">← Back to Home</a>

<div class="container">
    <header>
        <h1>Privacy Policy Generator</h1>
        <p>Generate a custom privacy policy for your app in seconds.</p>
    </header>

    <main class="grid">
        <section class="card input-section">
            <h2>App Details</h2>
            <form id="policyForm">
                <div class="form-group">
                    <label for="appName">App Name *</label>
                    <input type="text" id="appName" required placeholder="e.g., SnapPass AI">
                </div>

                <div class="form-group">
                    <label for="companyName">Company/Developer Name *</label>
                    <input type="text" id="companyName" required placeholder="e.g., Acme Corp">
                </div>

                <div class="form-group">
                    <label for="contactEmail">Contact Email *</label>
                    <input type="email" id="contactEmail" required placeholder="e.g., support@acme.com">
                </div>

                <div class="form-group">
                    <label for="privacyUrl">Privacy Policy URL</label>
                    <input type="url" id="privacyUrl" placeholder="https://yourdomain.com/privacy">
                </div>

                <div class="form-group">
                    <label for="lastUpdated">Last Updated</label>
                    <input type="date" id="lastUpdated">
                </div>

                <div class="form-group">
                    <label for="appWebsite">Website / App Store Link</label>
                    <input type="url" id="appWebsite" placeholder="https://yourapp.com">
                </div>

                <h3 class="subsection-title">Data Collection</h3>
                <p class="subtitle">What data does your app collect?</p>

                <div class="checkbox-group">
                    <label><input type="checkbox" id="dataLocation" value="Location"> Device Location</label>
                    <label><input type="checkbox" id="dataCamera" value="Camera"> Camera & Microphone</label>
                    <label><input type="checkbox" id="dataPersonal" value="Personal Info"> Personal Info (Name, Email)</label>
                    <label><input type="checkbox" id="dataAnalytics" value="Analytics"> Usage Analytics</label>
                    <label><input type="checkbox" id="dataAds" value="Ads"> Third-Party Advertising</label>
                    <label><input type="checkbox" id="dataPayments" value="Payments"> Payment Information</label>
                    <label><input type="checkbox" id="dataContacts" value="Contacts"> Contacts</label>
                    <label><input type="checkbox" id="dataFiles" value="Files"> Files / Media Uploads</label>
                </div>

                <h3 class="subsection-title">Policy Options</h3>
                <div class="checkbox-group">
                    <label><input type="checkbox" id="usesCookies"> Cookies & Tracking</label>
                    <label><input type="checkbox" id="usesThirdParty"> Third-Party Services</label>
                    <label><input type="checkbox" id="hasAccounts"> User Accounts</label>
                    <label><input type="checkbox" id="hasDeletion"> Account Deletion</label>
                    <label><input type="checkbox" id="hasRetention"> Data Retention</label>
                    <label><input type="checkbox" id="hasChildren"> Children’s Privacy</label>
                    <label><input type="checkbox" id="hasSecurity"> Security Practices</label>
                    <label><input type="checkbox" id="hasRights"> User Rights</label>
                </div>

                <button type="submit" class="btn-primary">Generate Policy</button>
            </form>
        </section>

        <section class="card output-section">
            <div class="output-header">
                <h2>Generated Policy</h2>
                <div class="tabs">
                    <button class="tab-btn active" data-tab="markdown">Markdown</button>
                    <button class="tab-btn" data-tab="html">HTML</button>
                </div>
            </div>

            <div class="output-container">
                <textarea id="outputText" readonly placeholder="Your generated policy will appear here..."></textarea>
            </div>

            <button id="copyBtn" class="btn-secondary" disabled>Copy to Clipboard</button>
        </section>
    </main>
</div>

<script src="script.js"></script>
</body>
</html>
