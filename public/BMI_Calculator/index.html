<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BMI Fitness Dashboard</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="theme-purple">

<div class="theme-switcher">
    <button class="theme-btn purple"
        onclick="changeTheme('theme-purple')"></button>

    <button class="theme-btn blue"
        onclick="changeTheme('theme-blue')"></button>

    <button class="theme-btn green"
        onclick="changeTheme('theme-green')"></button>

    <button class="theme-btn orange"
        onclick="changeTheme('theme-orange')"></button>
</div>

<div class="container">

    <div class="calculator-card">

        <h1>🏋️ BMI FITNESS DASHBOARD</h1>

        <div class="input-group">
            <label>Height (cm)</label>
            <input type="number" id="height"
                placeholder="Enter Height">
        </div>

        <div class="input-group">
            <label>Weight (kg)</label>
            <input type="number" id="weight"
                placeholder="Enter Weight">
        </div>

        <button id="calculateBtn">
            Calculate BMI
        </button>

        <div class="result-card">

            <div class="gauge-container">
                <div class="gauge">
                    <div class="gauge-cover">
                        <span id="bmiValue">0</span>
                    </div>
                </div>
            </div>

            <h2 id="category">Category</h2>

            <p id="message">
                Your health insights will appear here.
            </p>

        </div>

    </div>

    <div class="recommendation-card">

        <div class="recommendation-box">
            <h3>🔥 Daily Calories</h3>
            <p id="calories">0 kcal/day</p>
        </div>

        <div class="recommendation-box">
            <h3>💧 Water Intake</h3>
            <p id="water">0 Litres/day</p>
        </div>

        <div class="recommendation-box">
            <h3>🎯 Healthy Weight Range</h3>
            <p id="healthyWeight">0 - 0 kg</p>
        </div>

        <div class="recommendation-box">
            <h3>🥗 Diet Plan</h3>
            <ul id="dietPlan"></ul>
        </div>

        <div class="recommendation-box">
            <h3>🏋️ Workout Recommendation</h3>
            <ul id="workoutPlan"></ul>
        </div>

    </div>

</div>

<div class="chart-section">

    <h2>BMI Progress Tracker</h2>

    <canvas id="bmiChart"></canvas>

</div>

<script src="script.js"></script>

</body>
</html>
