<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boredom Buster</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-animation"></div>
    
    <main class="glass-panel">
        <header class="header">
            <h1>✨ Boredom Buster</h1>
            <p>Beat the block. Find your next adventure.</p>
        </header>

        <section class="controls">
            <div class="input-wrapper">
                <label for="category">Category</label>
                <select id="category" class="glass-input">
                    <option value="">Surprise Me</option>
                    <option value="education">Education</option>
                    <option value="recreational">Recreational</option>
                    <option value="social">Social</option>
                    <option value="diy">DIY</option>
                    <option value="charity">Charity</option>
                    <option value="cooking">Cooking</option>
                    <option value="relaxation">Relaxation</option>
                    <option value="music">Music</option>
                    <option value="busywork">Busywork</option>
                </select>
            </div>

            <div class="input-wrapper">
                <label for="participants">Group Size</label>
                <input type="number" id="participants" class="glass-input" min="1" max="10" placeholder="e.g., 1 for solo">
            </div>

            <div class="input-wrapper">
                <label for="budget">Vibe / Cost</label>
                <select id="budget" class="glass-input">
                    <option value="">Any</option>
                    <option value="free">Completely Free</option>
                    <option value="cheap">Spare Change</option>
                    <option value="expensive">Treat Yo' Self</option>
                </select>
            </div>

            <button id="fetch-btn" class="glow-on-hover">Find Activity</button>
        </section>

        <section id="result-container" class="result-box hidden">
            <h2 id="activity-name">Awaiting your command...</h2>
            <div class="pill-container">
                <span id="activity-type" class="pill">Type: -</span>
                <span id="activity-participants" class="pill">Peeps: -</span>
                <span id="activity-price" class="pill">Cost: -</span>
            </div>
            <p id="error-message" class="error-msg hidden"></p>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
