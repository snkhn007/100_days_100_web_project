<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" href="../favv.png" type="image/x-icon" />
    <script src="script.js" defer></script>
    <title>Breakout Game</title>
</head>
<body>
<a href="/" class="project-back-button" style="position:fixed;left:18px;top:18px;padding:8px 12px;border-radius:8px;background:linear-gradient(90deg, rgba(124,99,255,0.14), rgba(79,141,255,0.10));color:#fff;text-decoration:none;z-index:9999;font-weight:700;font-family:Inter, system-ui, sans-serif;box-shadow:0 8px 20px rgba(12,18,40,0.35);">← Back to Home</a>

    <h1>Breakout Game</h1>
    <canvas id="canvas"></canvas>
    <div id="countdown" class="countdown hidden">
      3
    </div>
    <div id="rules-container" class="rules-container">
        <div class="rules-content">
            <h2>Game Rules</h2>
            <p>1. Use the arrow keys to move the paddle.</p>
            <p>2. Bounce the ball to break the bricks.</p>
            <p>3. Score points by breaking bricks.</p>
            <p>4. The game resets when the ball falls below the paddle.</p>
            <button id="start-btn" class="btn">Start Game</button>
        </div>
    </div>

    <div id="game-over-container" class="game-over-container hidden">
    <div class="game-over-content">
        <h2>Game Over</h2>

        <p>Your Score: <span id="final-score">0</span></p>

        <p>Highest Score: <span id="high-score">0</span></p>

        <button id="restart-btn" class="btn">Restart Game</button>
    </div>
</div>

</body>
</html>
