<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Calculator</title>

    <link rel="stylesheet" href="Calculator.css">

    <link rel="icon" href="../favv.png" type="image/x-icon" />
</head>

<body>

    <div class="container">

        <!-- Calculator -->
        <div class="calculator">

            <input type="text" placeholder="0" id="inputBox">

        <div>
    <button>^</button>
    <button>sin</button>
    <button>cos</button>
    <button>tan</button>
</div>

<div>
    <button>sqrt</button>
    <button>pi</button>
    <button>ln</button>
    <button>log</button>
</div>

<div>
    <button>(</button>
    <button>)</button>
    <button></button>
    <button></button>
</div>

            <div>
                <button class="Clear">AC</button>
                <button class="Clear">DEL</button>
                <button class="operators">%</button>
                <button class="operators">/</button>
            </div>

            <div>
                <button>7</button>
                <button>8</button>
                <button>9</button>
                <button class="operators">*</button>
            </div>

            <div>
                <button>4</button>
                <button>5</button>
                <button>6</button>
                <button class="operators">-</button>
            </div>

            <div>
                <button>1</button>
                <button>2</button>
                <button>3</button>
                <button class="operators">+</button>
            </div>

            <div>
                <button>00</button>
                <button>0</button>
                <button>.</button>
                <button class="equalTo">=</button>
            </div>

        </div>

        <!-- History Panel -->
        <div class="history-panel">

            <h2>History</h2>

            <div id="historyList"></div>

            <button id="clearHistory">
                Clear History
            </button>

        </div>

    </div>

    <script src="Calculator.js"></script>

</body>
</html>
