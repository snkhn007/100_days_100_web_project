<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Cricket Scoreboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <h1>🏏 Live Cricket Scoreboard</h1>
    <p>Track live scores and upcoming fixtures</p>
  </header>

  <main class="container">
    <section class="section">
      <h2 class="section__title">🔴 Live Matches</h2>
      <div id="live-matches" class="matches-grid">
        <p class="loading">Loading live scores...</p>
      </div>
    </section>

    <section class="section">
      <h2 class="section__title">📅 Upcoming Fixtures</h2>
      <div id="upcoming-matches" class="matches-grid">
        <p class="loading">Loading upcoming fixtures...</p>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
