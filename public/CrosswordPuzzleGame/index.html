<!DOCTYPE html>
<html lang="en">
<head>

    <title>Crossword Puzzle Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>🧩 Crossword Puzzle Game</h1>

    <div class="container">

        <div id="grid" class="grid"></div>

        <div class="clues">
            <h2>Clues</h2>

            <h3>Across</h3>
            <ul>
                <li>1. Markup language for web pages</li>
                <li>2. Programming language of the web</li>
            </ul>

            <h3>Down</h3>
            <ul>
                <li>3. Styles web pages</li>
            </ul>

            <button id="checkBtn">Check Answers</button>
            <button id="resetBtn">Reset</button>

            <p id="result"></p>
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
