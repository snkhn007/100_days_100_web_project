<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DocNow</title>
  <link rel="stylesheet" href="docstyle.css">
</head>
<body>
  <div class="overlay" id="modal-overlay">
    <div class="modal">
      <h2 id="modal-title">New Card</h2>
      <div>
        <label>Title</label>
        <input type="text" id="input-title" placeholder="Card title" />
      </div>
      <div>
        <label>Content</label>
        <textarea id="input-content" placeholder="Notes, info, reference…"></textarea>
      </div>
      <div>
        <label>Category</label>
        <select id="input-category">
          <option value="note">Note</option>
          <option value="link">Link</option>
          <option value="reminder">Reminder</option>
          <option value="reference">Reference</option>
          <option value="work">Work</option>
        </select>
      </div>
      <div>
        <label>URL (optional)</label>
        <input type="text" id="input-url" placeholder="https://…" />
      </div>
      <div class="modal-footer">
        <button id="btn-cancel">Cancel</button>
        <button id="btn-save">Save</button>
      </div>
    </div>
  </div>

  <nav>
    <h1>DocNow</h1>
    <input type="text" id="search-input" placeholder="Search cards…" />
    <button id="btn-theme" title="Toggle theme">☀︎</button>
    <button id="btn-new">+ New</button>
  </nav>

  <div class="filters" id="filter-bar"></div>

  <div class="card-grid" id="card-grid"></div>
  <p id="empty-message" style="display:none">No cards found.</p>

  <script>
    let cards = JSON.parse(localStorage.getItem("docnow-cards") || "[]");
    let activeFilter = "all";
    let editingId = null;

    function saveToStorage() {
      localStorage.setItem("docnow-cards", JSON.stringify(cards));
    }

    function renderCards() {
      const searchText = document.getElementById("search-input").value.toLowerCase();

      const filteredCards = cards.filter(function(card) {
        const matchesCategory = activeFilter === "all" || card.category === activeFilter;
        const matchesSearch = card.title.toLowerCase().includes(searchText) ||
                              card.content.toLowerCase().includes(searchText);
        return matchesCategory && matchesSearch;
      });

      const grid = document.getElementById("card-grid");
      const emptyMessage = document.getElementById("empty-message");

      grid.innerHTML = "";

      if (filteredCards.length === 0) {
        emptyMessage.style.display = "block";
        return;
      }

      emptyMessage.style.display = "none";

      filteredCards.forEach(function(card) {
        const cardElement = document.createElement("div");
        cardElement.className = "card";
        cardElement.innerHTML = `
          <div class="category">${card.category}</div>
          <h3>${card.title}</h3>
          <p>${card.content}</p>
          ${card.url ? `<a href="${card.url}" target="_blank">${card.url}</a>` : ""}
          <div class="card-footer">
            <span>${formatDate(card.createdAt)}</span>
            <div style="display:flex; gap:6px">
              <button data-id="${card.id}" data-action="edit">Edit</button>
              <button data-id="${card.id}" data-action="delete">Delete</button>
            </div>
          </div>
        `;
        grid.appendChild(cardElement);
      });
    }

    function renderFilters() {
      const categories = ["all", "note", "link", "reminder", "reference", "work"];
      const filterBar = document.getElementById("filter-bar");
      filterBar.innerHTML = "";

      categories.forEach(function(category) {
        const button = document.createElement("button");
        button.textContent = category;
        if (category === activeFilter) {
          button.style.outline = "2px solid #60a5fa";
        }
        button.addEventListener("click", function() {
          activeFilter = category;
          renderFilters();
          renderCards();
        });
        filterBar.appendChild(button);
      });
    }

    function openModal(card = null) {
      editingId = card ? card.id : null;
      document.getElementById("modal-title").textContent = card ? "Edit Card" : "New Card";
      document.getElementById("input-title").value = card ? card.title : "";
      document.getElementById("input-content").value = card ? card.content : "";
      document.getElementById("input-category").value = card ? card.category : "note";
      document.getElementById("input-url").value = card ? card.url : "";
      document.getElementById("modal-overlay").classList.add("open");
    }

    function closeModal() {
      document.getElementById("modal-overlay").classList.remove("open");
      editingId = null;
    }

    function saveCard() {
      const title = document.getElementById("input-title").value.trim();
      const content = document.getElementById("input-content").value.trim();

      if (!title || !content) {
        alert("Title and content are required.");
        return;
      }

      const cardData = {
        title: title,
        content: content,
        category: document.getElementById("input-category").value,
        url: document.getElementById("input-url").value.trim(),
      };

      if (editingId) {
        const index = cards.findIndex(function(c) { return c.id === editingId; });
        cards[index] = Object.assign(cards[index], cardData);
      } else {
        cardData.id = Date.now().toString();
        cardData.createdAt = Date.now();
        cards.unshift(cardData);
      }

      saveToStorage();
      closeModal();
      renderCards();
    }

    function deleteCard(id) {
      if (!confirm("Delete this card?")) return;
      cards = cards.filter(function(c) { return c.id !== id; });
      saveToStorage();
      renderCards();
    }

    function formatDate(timestamp) {
      const diff = Date.now() - timestamp;
      if (diff < 3600000) return Math.floor(diff / 60000) + "m ago";
      if (diff < 86400000) return Math.floor(diff / 3600000) + "h ago";
      return Math.floor(diff / 86400000) + "d ago";
    }

    document.getElementById("btn-new").addEventListener("click", function() {
      openModal();
    });

    document.getElementById("btn-cancel").addEventListener("click", function() {
      closeModal();
    });

    document.getElementById("btn-save").addEventListener("click", function() {
      saveCard();
    });

    document.getElementById("search-input").addEventListener("input", function() {
      renderCards();
    });

    document.getElementById("btn-theme").addEventListener("click", function() {
      document.body.classList.toggle("light");
      this.textContent = document.body.classList.contains("light") ? "☾" : "☀︎";
    });

    document.getElementById("modal-overlay").addEventListener("click", function(event) {
      if (event.target === this) closeModal();
    });

    document.getElementById("card-grid").addEventListener("click", function(event) {
      const button = event.target.closest("button[data-action]");
      if (!button) return;
      const id = button.dataset.id;
      if (button.dataset.action === "edit") {
        openModal(cards.find(function(c) { return c.id === id; }));
      }
      if (button.dataset.action === "delete") {
        deleteCard(id);
      }
    });

    renderFilters();
    renderCards();
  </script>
</body>
</html>
