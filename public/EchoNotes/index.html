<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Echo Notes☁️</title>
  <link rel="stylesheet" href="styles.css">

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
</head>

<body>
  <header class="header-area">
    <h1>Echo Notes☁️</h1>

    <!-- ✅ NEW BUTTON CONTAINER -->
    <nav class="main-nav button-container">
      <button id="clearNoteBtn">Clear</button>
      <button id="saveNoteBtn">Save as PDF</button>
      <button id="changeColorBtn">Text Color</button>
      <button id="changeSizeBtn">Text Size</button>
    </nav>
  </header>

  <main class="note-section">
    <input id="noteTitle" type="text" placeholder="Title" />

    <div id="noteContent" contenteditable="true" class="note-area" spellcheck="false">
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
