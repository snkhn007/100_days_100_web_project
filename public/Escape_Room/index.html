<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escape The Lab</title>
    <link rel="stylesheet" href="style.css" class="css">
</head>

<body>
    <div class="main">
        <div class="container">
            <div class="heading"><b>ESCAPE THE LAB</b></div>
            <div class="text">
                <p>2089 — HELIX RESEARCH LAB

                    A DANGEROUS AI EXPERIMENT WENT WRONG.

                    THE ENTIRE FACILITY WAS LOCKED DOWN.

                    YOU WAKE UP ALONE INSIDE THE ABANDONED LAB WITH ONE OBJECTIVE:

                    FIND THE CLUES.
                    UNLOCK THE TERMINAL.
                    ESCAPE BEFORE THE SYSTEM SEALS PERMANENTLY.
                </p>
            </div>
            <button class="b1">START</button>
        </div>

        <div class="game-screen">
            <button class="hotspot tv" aria-label="Inspect TV">
                <div class="clue-content TV1">SIGNAL ERROR : 404</div>
            </button>
            
            <button class="hotspot document" aria-label="Inspect Document">
                <div class="clue-content">EXPERIMENT:98770</div>
            </button>
            
            <button class="hotspot pc" aria-label="Inspect PC Terminal">
                <div class="clue-content">NEON</div>
            </button>
            
            <button class="hotspot door" aria-label="Inspect Exit Door">
                <div class="clue-content">449907880</div>
            </button>

            <button class="b2">TERMINAL</button>
        </div>

        <div class="terminal">
            <div class="nav"> 
                <button class="b3">EXIT</button>
            </div>
            <div class="content"></div>   
        </div>

        <div class="timer">00:00</div>
    </div>
    <script src="script.js"></script>
</body>

</html>
