<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Currency Converter</title>

    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="../favv.png" type="image/x-icon" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>

  <body>
    <a
      href="/"
      class="project-back-button"
      style="position:fixed;left:18px;top:18px;padding:8px 16px;border-radius:8px;background:#1e293b;color:#3b82f6;border:1px solid #3b82f6;text-decoration:none;z-index:9999;font-weight:700;font-family:Inter, system-ui, sans-serif;transition:all 0.2s ease;" onmouseover="this.style.background='#3b82f6';this.style.color='#fff'" onmouseout="this.style.background='#1e293b';this.style.color='#3b82f6'"
    >
      ← Back to Home
    </a>

    <div class="title-container">
      <h1 class="page-title">Currency Converter</h1>
    </div>

    <div class="container">
      <form action="" onsubmit="event.preventDefault()">
        <!-- Amount Section -->
        <div class="amount">
          <p>Enter Amount</p>

          <input
            value="1"
            type="number"
            min="0"
            placeholder="Enter amount"
          />

          <div class="error-msg"></div>
        </div>

        <!-- Currency Selection -->
        <div class="dropdown">
          <div class="from">
            <p>From</p>

            <div class="select-container">
              <img
                src="https://flagsapi.com/US/flat/64.png"
                alt="Source Currency Flag"
              />

              <select name="from"></select>
            </div>
          </div>

          <i
            class="fa-solid fa-arrow-right-arrow-left"
            title="Swap currencies"
          ></i>

          <div class="to">
            <p>To</p>

            <div class="select-container">
              <img
                src="https://flagsapi.com/IN/flat/64.png"
                alt="Target Currency Flag"
              />

              <select name="to"></select>
            </div>
          </div>
        </div>

        <!-- Exchange Rate Display -->
        <div class="msg"></div>

        <!-- Converted Amount -->
        <div class="converted-amount">
          <p>Converted Amount</p>

          <input
            type="text"
            readonly
            placeholder="Converted amount will appear here"
          />
        </div>

        <!-- Exchange Trend Chart -->
        <div class="chart-container">
          <canvas id="historyChart"></canvas>
        </div>

        <!-- Conversion History -->
        <div class="history-section">
          <div class="history-header">
            <p>Recent Conversions</p>

            <button
              type="button"
              class="clear-history-btn"
            >
              <i class="fa-solid fa-trash"></i>
              Clear
            </button>
          </div>

          <div class="history-list">
            <p class="empty-history">
              No conversions yet
            </p>
          </div>
        </div>

        <!-- Reset Button -->
        <button type="button" class="reset-btn">
          <i class="fa-solid fa-rotate-right"></i>
          Reset Converter
        </button>
      </form>
    </div>

    <script src="data.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script src="app.js"></script>
  </body>
</html>
