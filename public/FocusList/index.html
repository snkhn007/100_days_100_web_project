<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FocusList</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI',sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#667eea,#764ba2);
    padding:20px;
}

.container{
    width:100%;
    max-width:500px;
    background:white;
    border-radius:24px;
    padding:25px;
    box-shadow:0 15px 40px rgba(0,0,0,.15);
}

h1{
    text-align:center;
    color:#333;
    margin-bottom:20px;
}

.stats{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
    font-size:14px;
    color:#555;
}

.progress-wrapper{
    width:100%;
    height:12px;
    background:#e5e7eb;
    border-radius:999px;
    overflow:hidden;
    margin-bottom:18px;
}

#progress{
    height:100%;
    width:0%;
    background:#ef4444;
    transition:all .4s ease;
}

.input-group{
    display:flex;
    gap:10px;
}

input[type="text"]{
    flex:1;
    padding:12px;
    border:1px solid #ddd;
    border-radius:12px;
    font-size:15px;
}

button{
    border:none;
    cursor:pointer;
    border-radius:12px;
    transition:.3s;
}

.add-btn{
    background:#4f46e5;
    color:white;
    padding:12px 16px;
}

.add-btn:hover{
    background:#4338ca;
}

.clear-btn{
    background:#ef4444;
    color:white;
    padding:8px 12px;
}

.clear-btn:hover{
    background:#dc2626;
}

ul{
    list-style:none;
    margin-top:20px;
}

li{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:#f9fafb;
    padding:12px;
    border-radius:12px;
    margin-bottom:10px;
    animation:slideIn .3s ease;
}

.task-left{
    display:flex;
    align-items:center;
    gap:10px;
    flex:1;
}

.task-text{
    cursor:pointer;
    transition:all .3s ease;
    word-break:break-word;
}

.completed{
    text-decoration:line-through;
    color:#9ca3af;
    transform:scale(.98);
}

.delete-btn{
    background:#ef4444;
    color:white;
    padding:6px 10px;
}

.delete-btn:hover{
    background:#dc2626;
}

.removing{
    animation:removeTask .3s forwards;
}

#emptyState{
    text-align:center;
    color:#777;
    margin-top:20px;
    display:none;
}

@keyframes slideIn{
    from{
        opacity:0;
        transform:translateY(10px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes removeTask{
    to{
        opacity:0;
        transform:translateX(50px);
        height:0;
        margin:0;
        padding:0;
    }
}

@media(max-width:500px){

    .input-group{
        flex-direction:column;
    }

    .add-btn{
        width:100%;
    }

    .stats{
        flex-direction:column;
        gap:10px;
    }

    .clear-btn{
        width:100%;
    }
}
</style>
</head>

<body>

<div class="container">

    <h1>FocusList</h1>

    <div class="stats">
        <span id="taskCounter">0/0 completed</span>

        <button
            class="clear-btn"
            onclick="clearCompleted()">
            Clear Completed
        </button>
    </div>

    <div class="progress-wrapper">
        <div id="progress"></div>
    </div>

    <div class="input-group">
        <input
            id="taskInput"
            type="text"
            placeholder="Add a task..."
        >

        <button
            class="add-btn"
            onclick="addTask()">
            Add
        </button>
    </div>

    <p id="emptyState">
        No tasks yet. Add one above!
    </p>

    <ul id="taskList"></ul>

</div>

<script>

let tasks =
JSON.parse(localStorage.getItem("tasks")) || [];

const taskInput =
document.getElementById("taskInput");

taskInput.addEventListener("keypress",e=>{
    if(e.key==="Enter"){
        addTask();
    }
});

function saveTasks(){
    localStorage.setItem(
        "tasks",
        JSON.stringify(tasks)
    );
}

function addTask(){

    const text = taskInput.value.trim();

    if(!text) return;

    tasks.push({
        text:text,
        done:false
    });

    taskInput.value="";

    saveTasks();
    render();
}

function toggleTask(index){

    tasks[index].done =
    !tasks[index].done;

    saveTasks();
    render();
}

function editTask(index){

    const updated =
    prompt(
        "Edit task",
        tasks[index].text
    );

    if(updated && updated.trim()){

        tasks[index].text =
        updated.trim();

        saveTasks();
        render();
    }
}

function deleteTask(index,element){

    element.classList.add("removing");

    setTimeout(()=>{

        tasks.splice(index,1);

        saveTasks();
        render();

    },300);
}

function clearCompleted(){

    tasks =
    tasks.filter(task=>!task.done);

    saveTasks();
    render();
}

function render(){

    const list =
    document.getElementById("taskList");

    list.innerHTML="";

    let completedCount = 0;

    tasks.forEach((task,index)=>{

        if(task.done)
            completedCount++;

        const li =
        document.createElement("li");

        const left =
        document.createElement("div");

        left.className="task-left";

        const checkbox =
        document.createElement("input");

        checkbox.type="checkbox";

        checkbox.checked=task.done;

        checkbox.addEventListener(
            "change",
            ()=>toggleTask(index)
        );

        const span =
        document.createElement("span");

        span.textContent=task.text;

        span.className=
        `task-text ${
            task.done
            ? "completed"
            : ""
        }`;

        span.ondblclick=
        ()=>editTask(index);

        left.appendChild(checkbox);
        left.appendChild(span);

        const deleteBtn =
        document.createElement("button");

        deleteBtn.textContent="✕";

        deleteBtn.className=
        "delete-btn";

        deleteBtn.onclick=
        ()=>deleteTask(index,li);

        li.appendChild(left);
        li.appendChild(deleteBtn);

        list.appendChild(li);
    });

    document.getElementById(
        "emptyState"
    ).style.display =
    tasks.length===0
    ? "block"
    : "none";

    document.getElementById(
        "taskCounter"
    ).textContent =
    `${completedCount}/${tasks.length} completed`;

    const progress =
    tasks.length===0
    ? 0
    : (completedCount/tasks.length)*100;

    const progressBar =
    document.getElementById("progress");

    progressBar.style.width =
    progress + "%";

    if(progress<40){
        progressBar.style.background="#ef4444";
    }
    else if(progress<80){
        progressBar.style.background="#f59e0b";
    }
    else{
        progressBar.style.background="#22c55e";
    }
}

render();

</script>

</body>
</html>
