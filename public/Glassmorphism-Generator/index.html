<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glassmorphism UI Generator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="container">
        <section class="preview-section">
            <div class="background-shape shape-1"></div>
            <div class="background-shape shape-2"></div>

            <div class="glass-card" id="preview-card">
                <h2>Glass UI</h2>
                <p>Live preview of your frosted glass effect.</p>
            </div>
        </section>

        <section class="controls-section">
            <div class="controls-header">
                <h1>Glass Generator</h1>
                <p>Adjust the properties below to style your card.</p>
            </div>

            <div class="control-group">
                <label for="blur">Blur: <span id="blur-val">10px</span></label>
                <input type="range" id="blur" min="0" max="40" value="10" step="1">
            </div>

            <div class="control-group">
                <label for="opacity">Opacity: <span id="opacity-val">0.2</span></label>
                <input type="range" id="opacity" min="0" max="1" value="0.2" step="0.05">
            </div>

            <div class="control-group">
                <label for="color">Background Color:</label>
                <input type="color" id="color" value="#ffffff">
            </div>

            <div class="control-group">
                <label for="shadow">Shadow Opacity: <span id="shadow-val">0.3</span></label>
                <input type="range" id="shadow" min="0" max="1" value="0.3" step="0.05">
            </div>

            <div class="code-exporter">
                <div class="code-header">
                    <span>CSS Code</span>
                    <button id="copy-btn">Copy</button>
                </div>
                <textarea id="css-output" readonly></textarea>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>

</html>
