<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Guessing Game | 100 Days 100 Projects</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="game-card">
            <h1>🎯 Number Guessing Game</h1>
            <p class="subtitle">Guess the number between 1 and 100</p>
            
            <div class="stats">
                <div class="stat-box">
                    <span class="stat-label">Attempts</span>
                    <span class="stat-value" id="attempts">0/10</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">Best Score</span>
                    <span class="stat-value" id="bestScore">-</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">Hint</span>
                    <span class="stat-value" id="hint">🤔</span>
                </div>
            </div>

            <div class="game-area">
                <input type="number" id="guessInput" placeholder="Enter your guess" min="1" max="100">
                <button id="guessBtn">Guess!</button>
                <button id="resetBtn">New Game</button>
            </div>

            <div class="message-area">
                <p id="message">💡 Start guessing!</p>
            </div>

            <div class="history">
                <h3>📜 Guess History</h3>
                <div id="historyList" class="history-list"></div>
            </div>

            <div class="difficulty">
                <button class="difficulty-btn active" data-diff="easy">Easy (1-50)</button>
                <button class="difficulty-btn" data-diff="medium">Medium (1-100)</button>
                <button class="difficulty-btn" data-diff="hard">Hard (1-200)</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
