<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Habit Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <button id="theme-toggle">🌙 Dark Mode</button>

  <div class="container">
    <h1>Habit Tracker</h1>

    <div class="input-section">
      <input type="text" id="habitInput" placeholder="Enter a habit" />
      <button id="addHabitBtn">Add Habit</button>
    </div>

    <div id="stats">
      <p>Total Habits: <span id="totalHabits">0</span></p>
      <p>Completed Today: <span id="completedHabits">0</span></p>
    </div>

    <ul id="habitList"></ul>
  </div>

  <script src="script.js"></script>
</body>
</html>
