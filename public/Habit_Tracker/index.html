<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Habit Tracker Pro</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="container">

        <header>

            <h1>🌱 Habit Tracker Pro</h1>

            <div class="header-actions">

                <input type="text" id="searchHabit" placeholder="Search habit...">

                <button id="addHabitBtn">
                    + Add Habit
                </button>

                <button id="themeBtn">
                    🌙
                </button>

            </div>

        </header>

        <div class="stats">

            <div class="card">
                <h3>Total Habits</h3>
                <p id="totalHabits">0</p>
            </div>

            <div class="card">
                <h3>Completed Today</h3>
                <p id="completedToday">0</p>
            </div>

            <div class="card">
                <h3>Best Streak</h3>
                <p id="bestStreak">0</p>
            </div>

        </div>

        <div class="quote-box">
            <p id="quote"></p>
        </div>

        <div id="habitList"></div>

    </div>

    <div class="modal" id="habitModal">

        <div class="modal-content">

            <h2>Add Habit</h2>

            <input type="text" id="habitName" placeholder="Habit Name">

            <select id="habitCategory">
                <option>Health</option>
                <option>Study</option>
                <option>Fitness</option>
                <option>Personal</option>
                <option>Work</option>
            </select>

            <input type="color" id="habitColor" value="#22c55e">

            <textarea id="habitNotes" placeholder="Notes..."></textarea>

            <button id="saveHabitBtn">
                Save Habit
            </button>

        </div>

    </div>
    <div class="modal" id="deleteModal">

    <div class="modal-content">

        <h2>Delete Habit?</h2>

        <p>
            Are you sure you want to delete this habit?
            This action cannot be undone.
        </p>

        <div class="modal-actions">

            <button id="cancelDeleteBtn">
                Cancel
            </button>

            <button id="confirmDeleteBtn">
                Delete
            </button>

        </div>

    </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
