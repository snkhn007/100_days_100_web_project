<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image to Text Conversion</title>
    <link rel="icon" href="../favv.png" type="image/x-icon" />
    <!-- Include Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!--Tesseract.js-->
    <script src="https://unpkg.com/tesseract.js@4.0.1/dist/tesseract.min.js"></script>
    <!--PDF.js-->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>

<body class="bg-gradient-to-tr from-blue-700 to-emerald-500 min-h-screen flex justify-center items-center p-4">
    <div class="w-full max-w-5xl bg-white/10 backdrop-blur-lg border border-white/20 rounded-2xl p-8 shadow-2xl">
        <h1 class="text-4xl font-bold text-center text-white mb-8">Image to Text Conversion</h1>
        <!-- Drag and Drop Area --> 
        <div id="dropArea" class="border-2 border-dashed border-white rounded-xl p-8 text-center text-white cursor-pointer hover:bg-white/10 transition duration-300">
             <p class="text-lg font-semibold"> Drag & Drop Image/PDF Here </p> 
             <p class="mt-2 text-sm text-gray-200"> or click below to upload </p> 
             <input type="file" id="fileInput" accept="image/*,.pdf" class="hidden"> 
             <button id="browseBtn" class="mt-4 bg-blue-500 hover:bg-blue-700 text-white px-6 py-2 rounded-lg"> Browse File </button> 
        </div>
        <!-- Language Selection --> 
        <div class="mt-6"> 
            <label class="text-white font-semibold block mb-2"> Select OCR Language </label> 
            <select id="languageSelect" class="w-full p-3 rounded-lg bg-white/70 outline-none"> 
              <option value="eng">English</option> <option value="hin">Hindi</option> 
              <option value="ben">Bengali</option> <option value="spa">Spanish</option> 
              <option value="fra">French</option> <option value="deu">German</option> 
            </select> 
        </div>
        <!-- Convert Button --> 
        <button onclick="convertFile()" class="mt-6 w-full bg-emerald-500 hover:bg-emerald-700 text-white font-bold py-3 rounded-lg transition duration-300"> Extract Text </button>
        <!-- Loader --> <div id="loader" class="hidden text-center text-white mt-4 font-semibold"> Processing... </div>
        <!-- Output Section --> 
        <div class="mt-8 grid grid-cols-1 md:grid-cols-2 gap-6"> 
        <!-- Extracted Text --> 
        <div> 
            <h2 class="text-white text-xl font-bold mb-3"> Extracted Text </h2> 
            <div id="output" class="bg-white/70 rounded-lg p-4 h-80 overflow-auto whitespace-pre-wrap"> Upload a file to begin OCR... </div>
            <!-- Download Button --> 
            <button id="downloadBtn" class="hidden mt-4 w-full bg-blue-500 hover:bg-blue-700 text-white py-2 rounded-lg"> Download Text </button> 
        </div>
        <!-- Preview --> 
        <div>
            <h2 class="text-white text-xl font-bold mb-3"> File Preview </h2> 
            <img id="imagePreview" class="hidden rounded-lg shadow-lg max-h-80 w-full object-contain bg-white/20 p-2" src="#" alt="Preview"> 
            <canvas id="pdfCanvas" class="hidden rounded-lg bg-white w-full"></canvas> 
        </div>
     </div> 
    </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
