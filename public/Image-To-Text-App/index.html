<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image to Text Conversion</title>
    <link rel="icon" href="../favv.png" type="image/x-icon" />
    <!-- Include Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-[#0b1120] relative flex items-center justify-center px-4">
<a href="/" class="project-back-button" style="position:fixed;left:18px;top:18px;padding:8px 12px;border-radius:8px;background:linear-gradient(90deg, rgba(124,99,255,0.14), rgba(79,141,255,0.10));color:#fff;text-decoration:none;z-index:9999;font-weight:700;font-family:Inter, system-ui, sans-serif;box-shadow:0 8px 20px rgba(12,18,40,0.35);">← Back to Home</a>


    <!-- Animated Background -->
    <div class="absolute inset-0 overflow-hidden">

        <div
            class="absolute top-[-120px] left-[-120px] w-[320px] h-[320px] bg-cyan-500/30 rounded-full blur-3xl animate-pulse">
        </div>

        <div
            class="absolute bottom-[-120px] right-[-120px] w-[320px] h-[320px] bg-emerald-500/30 rounded-full blur-3xl animate-pulse">
        </div>

        <div
            class="absolute top-[40%] left-[60%] w-[220px] h-[220px] bg-purple-500/20 rounded-full blur-3xl animate-bounce">
        </div>

    </div>

    <!-- Main Card -->
    <div
        class="relative z-10 w-full max-w-6xl rounded-3xl border border-white/10 bg-white/10 backdrop-blur-2xl shadow-2xl p-8 md:p-10">

        <!-- Heading -->
        <div class="text-center mb-10">

            <h1
                class="text-[2.25rem] md:text-[3rem] font-extrabold bg-gradient-to-r from-green-400 via-blue-400 to-emerald-400 bg-clip-text text-transparent">
                Image to Text
            </h1>

            <p class="text-gray-300 mt-4 text-sm md:text-base">
                Upload your image and instantly extract text with AI OCR.
            </p>

        </div>

        <!-- Upload Section -->
        <div class="flex flex-col md:flex-row gap-4 mb-8">

            <label
                class="flex-1 flex items-center justify-center gap-3 px-6 py-5 rounded-2xl border border-dashed border-white/20 bg-white/5 hover:bg-white/10 transition-all duration-300 cursor-pointer">

                <span class="text-3xl">📁</span>

                <div>
                    <p class="text-white font-medium">
                        Choose an Image
                    </p>

                    <p class="text-xs text-gray-400">
                        PNG, JPG, JPEG supported
                    </p>
                </div>

                <input type="file" id="fileInput" accept="image/*" class="hidden">
            </label>

            <button onclick="convertImage()"
                class="px-8 py-5 rounded-2xl bg-gradient-to-r from-cyan-500 to-emerald-500 text-white font-semibold hover:scale-105 hover:shadow-xl hover:shadow-cyan-500/30 transition-all duration-300">
                Convert Image
            </button>

        </div>

        <!-- Content Area -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

            <!-- OCR Output -->
            <div
                class="rounded-2xl border border-white/10 bg-white/5 backdrop-blur-xl p-6 min-h-[350px]">

                <div class="flex items-center justify-between mb-5">

                    <h2 class="text-xl font-semibold text-white">
                        Extracted Text
                    </h2>

                    <button
                        class="text-sm px-4 py-2 rounded-xl bg-white/10 text-gray-300 hover:bg-white/20 transition">
                        Copy
                    </button>

                </div>

                <div id="output"
                    class="text-gray-300 leading-relaxed text-center overflow-y-auto max-h-[260px]">
                    Select an image and get started...
                </div>

            </div>

            <!-- Image Preview -->
            <div
                class="rounded-2xl border border-white/10 bg-white/5 backdrop-blur-xl p-6 flex items-center justify-center min-h-[350px]">

                <img id="imagePreview"
                    class="hidden rounded-2xl shadow-2xl max-h-[300px] object-contain"
                    src="#"
                    alt="Selected Image Preview">

                <div id="placeholder" class="text-center">

                    <div class="text-6xl mb-4">
                        🖼️
                    </div>

                    <p class="text-gray-400">
                        Image preview will appear here
                    </p>

                </div>

            </div>

        </div>
    </div>

    <script src="https://unpkg.com/tesseract.js@4.0.1/dist/tesseract.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
