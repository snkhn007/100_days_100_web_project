<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Interview Simulator - Voice Assist</title>
  <link rel="stylesheet" href="style.css">
  <!-- Include FontAwesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <!-- Ambient background blobs -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="container glass-panel">
    <div class="top-bar">
      <h1><i class="fa-solid fa-user-tie"></i> Interview Simulator</h1>

      <div class="stats">
        <div class="card glass-card">
          <div class="card-header">
            <span><i class="fa-solid fa-clipboard-list"></i> Question</span>
          </div>
          <h2 id="question-count">1/5</h2>
          <div class="progress-bar-container">
            <div id="question-progress" class="progress-fill info"></div>
          </div>
        </div>

        <div class="card glass-card">
          <div class="card-header">
            <span><i class="fa-solid fa-heart-pulse"></i> Stress Level</span>
          </div>
          <h2 id="stress-level">0%</h2>
          <div class="progress-bar-container">
            <div id="stress-progress" class="progress-fill success"></div>
          </div>
        </div>

        <div class="card glass-card">
          <div class="card-header">
            <span><i class="fa-solid fa-stopwatch"></i> Timer</span>
          </div>
          <h2 id="timer">60s</h2>
          <div class="progress-bar-container">
            <div id="timer-progress" class="progress-fill warning"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="interview-box glass-card">
      <div class="interviewer">
        <div class="avatar-container">
          <div class="avatar">
            <i class="fa-solid fa-robot"></i>
          </div>
          <div class="pulse-ring"></div>
        </div>
        
        <div class="dialogue">
          <h3>AI Interviewer</h3>
          <p id="question">Loading question...</p>
        </div>
      </div>

      <div class="answer-section">
        <div class="voice-controls">
          <button id="mic-btn" class="mic-btn" title="Toggle Voice Input">
            <i class="fa-solid fa-microphone"></i>
          </button>
          <span id="mic-status" class="mic-status">Click mic to speak</span>
          <div id="recording-indicator" class="recording-indicator hidden">
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
          </div>
        </div>
        <textarea 
          id="answer"
          placeholder="Type your answer here or click the microphone to speak..."
        ></textarea>
      </div>

      <div class="buttons">
        <button id="next-btn" class="btn primary-btn">
          <span>Next Question</span> <i class="fa-solid fa-arrow-right"></i>
        </button>
        <button id="restart-btn" class="btn secondary-btn">
          <i class="fa-solid fa-rotate-right"></i> <span>Restart</span>
        </button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
