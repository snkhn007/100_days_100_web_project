<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sammu Trial Login Page</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="bg-blur"></div>

    <nav class="navbar">
      <a href="../index.html" class="button home-btn">Home</a>
    </nav>

    <section class="hero-section">
      <h1 class="hero-title">100 Days 100 Web Projects</h1>
      <p class="auth-title">
        Dive in to explore a seamless access to 100+ exciting web experiments
        crafted for learning and inspiration. Log in to continue building,
        exploring, and creating amazing web experiences every day.
      </p>

      <div class="auth-container">
        <div class="auth-card">
          <h2 class="auth-title-1">Login</h2>

          <form id="loginForm" class="auth-form">
            <div class="form-group">
              <i class="fa-solid fa-user"></i>
              <input
                type="text"
                id="username"
                placeholder="Username"
                class="form-input"
                autocomplete="username"
                required
              />
            </div>

            <div class="form-group">
              <i class="fa-solid fa-lock"></i>
              <input
                type="password"
                id="password"
                placeholder="Password"
                class="form-input"
                autocomplete="current-password"
                required
              />
            </div>

            <button type="submit" class="button home-btn">
              <i class="fa-solid fa-right-to-bracket"></i>
              Login
            </button>
          </form>

          <p class="already-signed-up">
            <a href="./ForgotPassword.html" id="forgotPasswordLink">Forgot Password?</a>
          </p>

          <p class="already-signed-up">
            Not signed up? <a href="./SignUp.html">Sign Up</a>
          </p>
        </div>
      </div>
    </section>

    <script>
      document
        .getElementById("loginForm")
        .addEventListener("submit", function (event) {
          event.preventDefault();

          const username = document.getElementById("username").value.trim();
          const password = document.getElementById("password").value.trim();

          // Get stored user
          const storedUser = localStorage.getItem(username);

          // Check if user exists
          if (!storedUser) {
            alert("User does not exist.");
            return;
          }

          const userData = JSON.parse(storedUser);

          // Password matching
          if (password !== userData.password) {
            alert("Incorrect password.");
            return;
          }

          // Login successful
          alert("Login successful!");

          localStorage.setItem("loggedInUser", username);
          window.location.href = "../index.html";
        });
    </script>
  </body>
</html>
