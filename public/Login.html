<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Login</title>
  <link rel="stylesheet" href="login.css">
  <link rel="icon" href="favv.png" type="image/x-icon" />
</head>

<body>
  <header class="navbar">
    <a href="../index.html" class="nav-link">Back to Home</a>
  </header>
  <div class="container">
    <!-- Left Section -->
    <div class="left-section">
      <button class="back-button" onclick="window.location.href = '../index.html';">
        <svg xmlns="Imagemain.png" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
      </button>
      <h1 class="animated-heading">
        <span id="typing-text"></span><span class="blinking-cursor">|</span>
      </h1>
      <p class="description">
        Dive in to explore a user-friendly interface designed for secure and seamless access to your account.
      </p>
      <form id="loginForm" class="login-form">
        <input type="text" id="username" placeholder="Username" class="input-field" required>
        <input type="password" id="password" placeholder="Password" class="input-field" required>
        <button type="submit" class="submit-button">Login</button>
      </form><br>
      <p class="already-signed-up">
        Not signed up? <a href="./signup.html">Sign Up</a>
      </p>
    </div>

    <!-- Right Section -->
    <div class="right-section">
      <img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1200&auto=format&fit=crop"
        alt="Developers collaborating on web project" class="transition-image">

      <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f?q=80&w=1200&auto=format&fit=crop"
        alt="Team contribution and coding" class="transition-image">

      <img src="https://images.unsplash.com/photo-1555066931-4365d14bab8c?q=80&w=1200&auto=format&fit=crop"
        alt="Web development coding screen" class="transition-image">

      <img src="https://images.unsplash.com/photo-1496171367470-9ed9a91ea931?q=80&w=1200&auto=format&fit=crop"
        alt="Modern website development workspace" class="transition-image">

      <img src="https://images.unsplash.com/photo-1531482615713-2afd69097998?q=80&w=1200&auto=format&fit=crop"
        alt="Open source contribution teamwork" class="transition-image">
    </div>
  </div>

  <script>
    // Transition effect for images
    const images = document.querySelectorAll(".transition-image");
    let currentImageIndex = 0;

    function showNextImage() {
      images[currentImageIndex].style.opacity = 0;
      currentImageIndex = (currentImageIndex + 1) % images.length;
      images[currentImageIndex].style.opacity = 1;
    }

    setInterval(showNextImage, 3000);

    // Login form submission
    document.getElementById("loginForm").addEventListener("submit", function (event) {
      event.preventDefault();

      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;

      if (username && password) {
        localStorage.setItem("username", username);
        window.location.pathname = "/index.html";
      } else {
        alert("Invalid credentials. Please try again.");
      }
    });

    // Typing effect for heading
    const text = "100 Days 100 Web Projects!";
    const typingText = document.getElementById("typing-text");

    let index = 0;
    let deleting = false;

    function typeEffect() {
      if (!deleting) {
        typingText.innerHTML = text.substring(0, index + 1);
        index++;

        if (index === text.length) {
          deleting = true;
          setTimeout(typeEffect, 1200);
          return;
        }
      } else {
        typingText.innerHTML = text.substring(0, index - 1);
        index--;

        if (index === 0) {
          deleting = false;
        }
      }

      setTimeout(typeEffect, deleting ? 60 : 120);
    }

    typeEffect();
  </script>
</body>

</html>
