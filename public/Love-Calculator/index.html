<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Calculator</title>

    <!-- Link to external CSS -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="icon" href="../favv.png" type="image/x-icon" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>
    <h1>❤️ Love Calculator ❤️</h1>
    <i class="fa-solid fa-heart"></i>
<a href="/" class="project-back-button" style="position:fixed;left:18px;top:18px;padding:8px 12px;border-radius:8px;background:white;text-decoration:none;z-index:9999;font-weight:700;font-family:Inter, system-ui, sans-serif;box-shadow:0 8px 20px rgba(0, 0, 0);">← Back to Home</a>

    <img src="pink-realistic-heart-isolate-on-transparente-background-symbol-love-3d-heart-icon-png.webp" height="20px" width="20px" alt="heart" style="position: absolute; top: 0; right: 0; margin: 10px;">
    <!-- Floating hearts background -->

<label for="name1">Your Name</label>
<input id="name1">

<label for="name2">Partner Name</label>
<input id="name2">

<button aria-label="Calculate Love Score"></button>

<div class="hearts">
    <span>❤</span>
    <span>❤</span>
    <span>❤</span>
    <span>❤</span>
    <span>❤</span>
    <span>❤</span>
    <span>❤</span>
    <span>❤</span>
    <span>❤</span>
    <span>❤</span>
</div>
    <div class="container glass-card">
        <h1><span>Love</span> Calculator</h1>
        <p>Enter your name and your crush's name to see the chance that this relationship will work out:</p>

        <!-- Input for Your Name -->
        <div class="input-group">
            <input type="text" required id="fname">
            <span class="highlight"></span>
            <span class="bar"></span>
            <label>Your Name</label>
        </div>

        <!-- Input for Crush's Name -->
        <div class="input-group">
            <input type="text" required id="cname">
            <span class="highlight"></span>
            <span class="bar"></span>
            <label>Crush Name</label>
        </div>

        <!-- Calculate Button -->
        <button id="calculate">Calculate</button>
       

        <!-- Result Display -->
        <div class="footer">
            <h2 id="result-message"></h2>
            <p id="result-percentage"></p>
        </div>
        <!-- Loading animation text -->

<p id="loading" class="hidden">
    Calculating compatibility...
</p>
    </div>
    <div id="result"></div>
    
    
    <script src="script.js"></script>
</body>

</html>
