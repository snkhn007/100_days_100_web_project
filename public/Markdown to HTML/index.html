<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Markdown | Modern HTML Converter</title>
    <link rel="stylesheet" href="style.css">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Markdown Parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="app-container">
        <header class="glass-header">
            <div class="logo">
                <i aria-hidden="true" class="fa-brands fa-markdown"></i>
                <h1>Pro<span>Markdown</span></h1>
            </div>
            
            <div class="toolbar">
                <button id="uploadBtn" class="btn-icon" title="Upload Markdown">
                    <i aria-hidden="true" class="fa-solid fa-cloud-arrow-up"></i>
                    <input type="file" id="fileInput" accept=".md" hidden>
                </button>
                <button id="copyBtn" class="btn-icon" title="Copy HTML">
                    <i aria-hidden="true" class="fa-solid fa-copy"></i>
                </button>
                <button id="downloadBtn" class="btn-icon" title="Download HTML">
                    <i aria-hidden="true" class="fa-solid fa-download"></i>
                </button>
                <button id="clearBtn" class="btn-icon danger" title="Clear Editor">
                    <i aria-hidden="true" class="fa-solid fa-trash-can"></i>
                </button>
                <div class="divider"></div>
                <button id="themeToggle" class="btn-icon" title="Toggle Theme">
                    <i aria-hidden="true" class="fa-solid fa-moon"></i>
                </button>
            </div>
        </header>

        <main class="split-screen">
            <section class="editor-pane">
                <div class="pane-header">
                    <span>EDITOR</span>
                </div>
                <textarea id="markdownEditor" spellcheck="false" placeholder="Type your markdown here..."></textarea>
            </section>

            <div class="resizer"></div>

            <section class="preview-pane">
                <div class="pane-header">
                    <span>PREVIEW</span>
                </div>
                <div id="htmlPreview" class="markdown-body"></div>
            </section>
        </main>

        <footer class="glass-footer">
            <div class="stats">
                <span id="wordCount">Words: 0</span>
                <span class="dot"></span>
                <span id="charCount">Characters: 0</span>
            </div>
            <div class="status">
                <span id="saveStatus">Auto-saved</span>
            </div>
        </footer>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <script src="script.js"></script>
</body>
</html>
