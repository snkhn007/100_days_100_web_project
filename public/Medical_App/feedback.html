<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Feedback | MedConsult</title>

    <link
        rel="stylesheet"
        href="css/feedback.css"
    >

    <link
        rel="icon"
        href="assets/logo.png"
    >
</head>
<body>

    <div class="feedbackmain">

        <h2>⭐ Feedback</h2>

        <p>
            Help us improve your healthcare experience.
        </p>

        <form id="feedbackform">

            <label for="feedbackMessage">
                Your Feedback
            </label>

            <textarea
                id="feedbackMessage"
                name="feedbackMessage"
                placeholder="Write your feedback here..."
                required
            ></textarea>

            <button
                type="submit"
                class="submit-btn"
            >
                Submit Feedback
            </button>

        </form>

        <button
            class="back"
            onclick="window.location.href='index.html'"
        >
            ← Back To Dashboard
        </button>

    </div>

    <div id="toast-container"></div>

    <script src="js/feedback.js"></script>

</body>
</html>
