<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FeedBack</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="../favv.png" type="image/x-icon" />
</head>
<body style="background: url(pngtree-medical-device-line-draft-border-png-image_2392872.jpg);">
    <div  class="feedbackmain">
        <h2>FeedBack</h2>
        <p>Help us help you.</p>

        
            <form id="feedbackform">
                <label for="feedbackMessage">Your Feedback:</label>
                <br><br>
                <textarea id="feedbackMessage" name="feedbackMessage" required></textarea>
                <br><br>
                <button type="submit">Submit Feedback</button>
            </form>
           <button class="back" onclick="window.location.href='./index.html'">
    Back To the Main
</button>
    </div>

    <div id="toast-container"></div>

<script>
function showToast(message, type = 'info') {
    const container = document.getElementById('toast-container');

    const toast = document.createElement('div');
    toast.className = `toast ${type}`;

    toast.innerHTML = `
        <span>${message}</span>
        <button onclick="this.parentElement.remove()">&times;</button>
    `;

    container.appendChild(toast);

    setTimeout(() => {
        toast.remove();
    }, 3000);
}

document.getElementById("feedbackform").addEventListener("submit", function(event) {
    event.preventDefault();

    showToast("Feedback submitted successfully!", "success");
});
</script>
</body>
</html>
