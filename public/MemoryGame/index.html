<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Matching Game</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="../favv.png" type="image/x-icon" />
</head>
<body>

    <h1 id="game-title">Memory Matching Game</h1>
    <div id="controls">
        <div id="timer">Time: 60s</div>
        <div id="difficulty">
            <span>Time:</span>
            <button onclick="setDifficulty(120)">Easy</button>
            <button onclick="setDifficulty(60)" class="active">Moderate</button>
            <button onclick="setDifficulty(30)">Hard</button>
        </div>
    </div>
    <div id="game-container" class="grid"></div>
    <p id="score-board">Matches: 0</p>
    <button id="restart-btn">Restart</button>
    <div id="congrats" class="hidden">Congratulations! You Won!</div>

    <script src="script.js"></script>
</body>
</html>
