<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Festival Calendar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-wrapper">
        <div class="calendar-container">
            <div id="month-image" class="month-image"></div>
            <div class="calendar-header">
                <button type="button" id="prevMonth" class="nav-btn" aria-label="Previous Month">&lt;</button>
                <p id="monthYearText" aria-live="polite"></p>
                <button type="button" id="nextMonth" class="nav-btn" aria-label="Next Month">&gt;</button>
            </div>
            <div class="calendar-grid">
                <div class="day-name">Sun</div>
                <div class="day-name">Mon</div>
                <div class="day-name">Tue</div>
                <div class="day-name">Wed</div>
                <div class="day-name">Thu</div>
                <div class="day-name">Fri</div>
                <div class="day-name">Sat</div>
            </div>
        </div>

        <div id="noteArea" class="note-section">
            <h3>Notes for <span id="selectedDateText" aria-live="polite">Select a day</span></h3>
            <select id="eventTag" aria-label="Event Type">
                <option value="none">Normal Day</option>
                <option value="festival">Festival / Holiday</option>
                <option value="event">Personal Event</option>
            </select>
            <textarea id="noteInput" placeholder="Plan your festivals and events here..." aria-label="Notes"></textarea>
            <button type="button" id="saveNote" aria-label="Save Note">Save Note</button>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
