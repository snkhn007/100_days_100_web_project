<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neural Network Playground</title>
    <meta
      name="description"
      content="Interactive neural network visualizer with live backpropagation, decision boundary heatmaps, and configurable architectures."
    />
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <!-- Header -->
    <header class="app-header">
      <div class="header-left">
        <div class="logo">
          <i class="fas fa-brain"></i>
          <span>Neural Network <strong>Playground</strong></span>
        </div>
      </div>
      <div class="header-right">
        <div class="epoch-display">
          <span class="epoch-label">Epoch</span>
          <span id="epochCount" class="epoch-value">0</span>
        </div>
        <div class="loss-display">
          <span class="loss-label">Loss</span>
          <span id="lossValue" class="loss-value">—</span>
        </div>
        <div class="accuracy-display">
          <span class="accuracy-label">Accuracy</span>
          <span id="accuracyValue" class="accuracy-value">—</span>
        </div>
      </div>
    </header>

    <main class="app-main">
      <!-- Controls Sidebar -->
      <aside class="controls-panel" id="controlsPanel">
        <!-- Training Controls -->
        <section class="control-group">
          <h3 class="control-title">
            <i class="fas fa-play-circle"></i> Training
          </h3>
          <div class="btn-row">
            <button
              id="btnTrain"
              class="btn btn-primary"
              title="Start Training"
            >
              <i class="fas fa-play"></i> Train
            </button>
            <button
              id="btnPause"
              class="btn btn-warning"
              title="Pause Training"
              disabled
            >
              <i class="fas fa-pause"></i> Pause
            </button>
            <button id="btnReset" class="btn btn-danger" title="Reset Network">
              <i class="fas fa-redo"></i> Reset
            </button>
          </div>
          <div class="speed-control">
            <label>Speed</label>
            <input type="range" id="speedSlider" min="1" max="100" value="50" />
            <span id="speedLabel">50 steps/frame</span>
          </div>
        </section>

        <!-- Dataset -->
        <section class="control-group">
          <h3 class="control-title"><i class="fas fa-database"></i> Dataset</h3>
          <div class="dataset-grid" id="datasetGrid">
            <button
              class="dataset-btn active"
              data-dataset="circle"
              title="Circle"
            >
              <svg viewBox="0 0 40 40">
                <circle
                  cx="20"
                  cy="20"
                  r="10"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                />
                <circle cx="20" cy="12" r="2" fill="#4fc3f7" />
                <circle cx="28" cy="20" r="2" fill="#4fc3f7" />
                <circle cx="12" cy="20" r="2" fill="#4fc3f7" />
                <circle cx="20" cy="28" r="2" fill="#4fc3f7" />
                <circle cx="20" cy="20" r="2" fill="#ef5350" />
                <circle cx="17" cy="18" r="2" fill="#ef5350" />
                <circle cx="23" cy="22" r="2" fill="#ef5350" />
              </svg>
              <span>Circle</span>
            </button>
            <button class="dataset-btn" data-dataset="xor" title="XOR">
              <svg viewBox="0 0 40 40">
                <circle cx="12" cy="12" r="3" fill="#4fc3f7" />
                <circle cx="28" cy="28" r="3" fill="#4fc3f7" />
                <circle cx="28" cy="12" r="3" fill="#ef5350" />
                <circle cx="12" cy="28" r="3" fill="#ef5350" />
              </svg>
              <span>XOR</span>
            </button>
            <button class="dataset-btn" data-dataset="spiral" title="Spiral">
              <svg viewBox="0 0 40 40">
                <path
                  d="M20 20 Q25 15 28 20 Q31 25 20 28 Q12 30 10 20 Q8 10 20 8 Q32 6 34 20"
                  fill="none"
                  stroke="#4fc3f7"
                  stroke-width="2"
                />
                <path
                  d="M20 20 Q15 25 12 20 Q9 15 20 12 Q28 10 30 20 Q32 30 20 32"
                  fill="none"
                  stroke="#ef5350"
                  stroke-width="2"
                />
              </svg>
              <span>Spiral</span>
            </button>
            <button
              class="dataset-btn"
              data-dataset="gaussian"
              title="Gaussian"
            >
              <svg viewBox="0 0 40 40">
                <circle cx="14" cy="14" r="2" fill="#4fc3f7" />
                <circle cx="16" cy="12" r="2" fill="#4fc3f7" />
                <circle cx="12" cy="16" r="2" fill="#4fc3f7" />
                <circle cx="26" cy="26" r="2" fill="#ef5350" />
                <circle cx="28" cy="24" r="2" fill="#ef5350" />
                <circle cx="24" cy="28" r="2" fill="#ef5350" />
              </svg>
              <span>Gaussian</span>
            </button>
            <button class="dataset-btn" data-dataset="moon" title="Moons">
              <svg viewBox="0 0 40 40">
                <path
                  d="M8 24 Q14 12 26 16"
                  fill="none"
                  stroke="#4fc3f7"
                  stroke-width="2.5"
                  stroke-linecap="round"
                />
                <path
                  d="M14 24 Q20 36 32 28"
                  fill="none"
                  stroke="#ef5350"
                  stroke-width="2.5"
                  stroke-linecap="round"
                />
              </svg>
              <span>Moons</span>
            </button>
          </div>
          <div class="form-row">
            <label>Noise</label>
            <input type="range" id="noiseSlider" min="0" max="50" value="15" />
            <span id="noiseLabel">15%</span>
          </div>
          <div class="form-row">
            <label>Points</label>
            <input
              type="range"
              id="pointsSlider"
              min="50"
              max="500"
              value="200"
              step="50"
            />
            <span id="pointsLabel">200</span>
          </div>
          <button id="btnRegenData" class="btn btn-sm btn-outline">
            <i class="fas fa-sync-alt"></i> Regenerate Data
          </button>
        </section>

        <!-- Network Architecture -->
        <section class="control-group">
          <h3 class="control-title">
            <i class="fas fa-project-diagram"></i> Architecture
          </h3>
          <div class="layer-config" id="layerConfig">
            <div class="layer-header">
              <span>Hidden Layers</span>
              <div class="layer-add-remove">
                <button
                  id="btnRemoveLayer"
                  class="btn-icon"
                  title="Remove Layer"
                >
                  <i class="fas fa-minus"></i>
                </button>
                <button id="btnAddLayer" class="btn-icon" title="Add Layer">
                  <i class="fas fa-plus"></i>
                </button>
              </div>
            </div>
            <div id="layerNeurons" class="layer-neurons-list">
              <!-- Dynamically populated -->
            </div>
          </div>
        </section>

        <!-- Hyperparameters -->
        <section class="control-group">
          <h3 class="control-title">
            <i class="fas fa-sliders-h"></i> Hyperparameters
          </h3>
          <div class="form-row">
            <label>Learning Rate</label>
            <select id="learningRate">
              <option value="0.001">0.001</option>
              <option value="0.003">0.003</option>
              <option value="0.01" selected>0.01</option>
              <option value="0.03">0.03</option>
              <option value="0.1">0.1</option>
              <option value="0.3">0.3</option>
              <option value="1">1.0</option>
            </select>
          </div>
          <div class="form-row">
            <label>Activation</label>
            <select id="activation">
              <option value="relu" selected>ReLU</option>
              <option value="sigmoid">Sigmoid</option>
              <option value="tanh">Tanh</option>
              <option value="leaky_relu">Leaky ReLU</option>
            </select>
          </div>
          <div class="form-row">
            <label>Batch Size</label>
            <select id="batchSize">
              <option value="0">Full Batch</option>
              <option value="8">8</option>
              <option value="16" selected>16</option>
              <option value="32">32</option>
            </select>
          </div>
        </section>
      </aside>

      <!-- Visualization Area -->
      <div class="viz-area">
        <div class="viz-row">
          <!-- Decision Boundary -->
          <div class="viz-card" id="boundaryCard">
            <div class="viz-card-header">
              <h3><i class="fas fa-border-all"></i> Decision Boundary</h3>
              <div class="viz-card-actions">
                <label class="toggle-label">
                  <input type="checkbox" id="showDataToggle" checked />
                  <span>Show Data</span>
                </label>
              </div>
            </div>
            <div class="canvas-wrap">
              <canvas id="boundaryCanvas" width="400" height="400"></canvas>
            </div>
          </div>

          <!-- Network Graph -->
          <div class="viz-card" id="networkCard">
            <div class="viz-card-header">
              <h3>
                <i class="fas fa-project-diagram"></i> Network Architecture
              </h3>
              <div class="viz-card-actions">
                <label class="toggle-label">
                  <input type="checkbox" id="showWeightsToggle" checked />
                  <span>Weights</span>
                </label>
              </div>
            </div>
            <div class="canvas-wrap">
              <canvas id="networkCanvas" width="500" height="400"></canvas>
            </div>
          </div>
        </div>

        <!-- Loss Chart -->
        <div class="viz-card viz-card-wide" id="lossCard">
          <div class="viz-card-header">
            <h3><i class="fas fa-chart-line"></i> Training Loss</h3>
          </div>
          <div class="canvas-wrap canvas-wrap-short">
            <canvas id="lossCanvas" width="900" height="180"></canvas>
          </div>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="app-footer">
      <span
        >Neural Network Playground — Built with vanilla JavaScript &amp;
        Canvas</span
      >
    </footer>

    <script src="script.js"></script>
  </body>
</html>
