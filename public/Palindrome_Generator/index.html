<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Palindrome Checker | GSSoC '26</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<a href="/" class="project-back-button" style="position:fixed;left:18px;top:18px;padding:8px 12px;border-radius:8px;background:white;text-decoration:none;z-index:9999;font-weight:700;font-family:Inter, system-ui, sans-serif;box-shadow:0 8px 20px rgba(0, 0, 0);">← Back to Home</a>

    <!-- Centered Wrapper -->
    <div class="main-container">
        <div class="glass-card p-4 p-md-5">
            <h1 class="text-center mb-2">Palindrome Generator</h1>
            <p class="text-center text-light-50 mb-4">Click the button to see the magic ✨</p>
            
            <div class="input-section">
                <label for="inputString" class="form-label text-white">Enter your text:</label>
                <input type="text" class="form-control custom-input" id="inputString" placeholder="Type something..." autocomplete="off">
            </div>

            <div class="d-grid gap-2 mt-4">
                <button id="checkBtn" class="btn btn-primary-custom">Generate Palindrome 🚀</button>
                <button id="clearBtn" class="btn btn-link text-white-50 btn-sm text-decoration-none">Clear</button>
            </div>

            <!-- Result Box -->
            <div id="resultBox" class="result-container mt-4 text-center">
                <div id="resultIcon" class="mb-2 fs-1">⌨️</div>
                <div id="resultText">Waiting for you to click generate...</div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
