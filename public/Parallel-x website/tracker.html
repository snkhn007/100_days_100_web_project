<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco Habit Tracker</title>
    <style>
        :root {
            --bg-primary: #f0f7f4;
            --bg-card: #ffffff;
            --text-main: #2d3748;
            --text-muted: #718096;
            --emerald: #10b981;
            --emerald-light: #d1fae5;
            --emerald-dark: #065f46;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --radius: 12px;
            --transition: all 0.3s ease;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-main);
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        /* Header Styling */
        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px 0;
        }

        header h1 {
            color: var(--emerald-dark);
            font-size: 2.5rem;
            margin-bottom: 8px;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* Dashboard Grid Layout */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
            margin-bottom: 30px;
        }

        @media (min-width: 768px) {
            .dashboard-grid {
                grid-template-columns: 2fr 1fr;
            }
        }

        /* Card Base Styling */
        .card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow);
        }

        .card-title {
            font-size: 1.25rem;
            color: var(--text-main);
            margin-bottom: 20px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Impact Dashboard Widgets */
        .impact-panel {
            grid-column: 1 / -1;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .stat-box {
            background: var(--emerald-light);
            color: var(--emerald-dark);
            padding: 20px;
            border-radius: var(--radius);
            text-align: center;
            transition: var(--transition);
        }

        .stat-box:hover {
            transform: translateY(-2px);
        }

        .stat-box .value {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .stat-box .label {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 500;
        }

        /* Habit List Styling */
        .habit-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .habit-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            border: 1px solid #e2e8f0;
            border-radius: var(--radius);
            transition: var(--transition);
        }

        .habit-item:hover {
            border-color: var(--emerald);
            background-color: #fcfdfd;
        }

        .habit-details h3 {
            font-size: 1.1rem;
            margin-bottom: 4px;
        }

        .habit-details p {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* Custom Checkbox Button */
        .action-btn {
            background-color: transparent;
            border: 2px solid var(--emerald);
            color: var(--emerald);
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            outline: none;
        }

        .action-btn.completed {
            background-color: var(--emerald);
            color: white;
        }

        .action-btn:active {
            transform: scale(0.95);
        }

        /* Badges & Achievements Grid */
        .badge-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .badge-item {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: var(--radius);
            padding: 16px;
            text-align: center;
            opacity: 0.4;
            filter: grayscale(100%);
            transition: var(--transition);
        }

        .badge-item.unlocked {
            opacity: 1;
            filter: grayscale(0%);
            border-color: var(--emerald-light);
            background: var(--bg-card);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.1);
        }

        .badge-icon {
            font-size: 2rem;
            margin-bottom: 6px;
            display: block;
        }

        .badge-item h4 {
            font-size: 0.9rem;
            margin-bottom: 2px;
        }

        .badge-item p {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        /* History Log Container */
        .history-section {
            grid-column: 1 / -1;
        }

        .history-table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 0.95rem;
        }

        th, td {
            padding: 12px 16px;
            border-bottom: 1px solid #e2e8f0;
        }

        th {
            background-color: #f8fafc;
            color: var(--text-muted);
            font-weight: 600;
        }

        .empty-state {
            text-align: center;
            color: var(--text-muted);
            padding: 20px 0;
            font-style: italic;
        }
    </style>
</head>
<body>
<a href="/" class="project-back-button" style="position:fixed;left:18px;top:18px;padding:8px 12px;border-radius:8px;background:white;text-decoration:none;z-index:9999;font-weight:700;font-family:Inter, system-ui, sans-serif;box-shadow:0 8px 20px rgba(0, 0, 0);">← Back to Home</a>


    <div class="container">
        <header>
            <h1>Eco Habit Tracker</h1>
            <p>Small daily shifts build a sustainable future</p>
        </header>

        <div class="dashboard-grid">
            
            <!-- Impact Scoreboard Section -->
            <div class="impact-panel">
                <div class="stat-box">
                    <div class="value" id="stat-score">0</div>
                    <div class="label">Eco Score</div>
                </div>
                <div class="stat-box">
                    <div class="value" id="stat-co2">0g</div>
                    <div class="label">CO₂ Offset</div>
                </div>
                <div class="stat-box">
                    <div class="value" id="stat-water">0L</div>
                    <div class="label">Water Saved</div>
                </div>
                <div class="stat-box">
                    <div class="value" id="stat-plastic">0</div>
                    <div class="label">Plastics Avoided</div>
                </div>
            </div>

            <!-- Active Habits Panel -->
            <main class="card">
                <div class="card-title">
                    <span>Today's Habits</span>
                    <span id="date-display" style="font-size: 0.9rem; color: var(--text-muted);"></span>
                </div>
                <div class="habit-list" id="habit-list-container">
                    <!-- Dynamic rendering via JavaScript -->
                </div>
            </main>

            <!-- Accomplishments Panel -->
            <aside class="card">
                <div class="card-title">Milestones</div>
                <div class="badge-grid" id="badge-container">
                    <!-- Dynamic rendering via JavaScript -->
                </div>
            </aside>

            <!-- History Section -->
            <section class="card history-section">
                <div class="card-title">Completed Logs</div>
                <div class="history-table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Action Taken</th>
                                <th>Environmental Impact Saved</th>
                            </tr>
                        </thead>
                        <tbody id="history-log-rows">
                            <!-- Dynamic rendering via JavaScript -->
                        </tbody>
                    </table>
                    <div id="history-empty" class="empty-state">No historical entries recorded yet. Complete an action to log history!</div>
                </div>
            </section>

        </div>
    </div>

    <script>
        // Core Habit Dataset with specific impact weight configurations
        const habitTemplate = [
            { id: 'water', title: 'Bring a Reusable Bottle', desc: 'Avoid single-use plastic production cycles.', points: 10, co2: 80, water: 3, plastic: 1 },
            { id: 'meat', title: 'Plant-Based Meals Only', desc: 'Significantly reduce dietary carbon footprint.', points: 25, co2: 1200, water: 540, plastic: 0 },
            { id: 'commute', title: 'Active or Public Transit', desc: 'Walk, cycle, or take a bus instead of driving.', points: 20, co2: 900, water: 0, plastic: 0 },
            { id: 'bags', title: 'Utilize Reusable Bags', desc: 'Keep microplastics out of ocean environments.', points: 10, co2: 30, water: 1, plastic: 2 },
            { id: 'energy', title: 'Unplug Standby Electronics', desc: 'Curtail subtle vampire power consumption.', points: 15, co2: 150, water: 0, plastic: 0 }
        ];

        // Milestone configuration targets based on Cumulative Eco Score
        const milestoneBadges = [
            { id: 'b1', title: 'Green Seedling', desc: 'Earn 15 Eco Points', target: 15, icon: '🌱' },
            { id: 'b2', title: 'Wave Maker', desc: 'Save 10L of Water', target: 10, type: 'water', icon: '💧' },
            { id: 'b3', title: 'Carbon Fighter', desc: 'Offset 2000g of CO₂', target: 2000, type: 'co2', icon: '🛡️' },
            { id: 'b4', title: 'Eco Guardian', desc: 'Earn 100 Eco Points', target: 100, icon: '🌳' }
        ];

        // State Architecture setup with LocalStorage fallbacks
        let appState = {
            totals: JSON.parse(localStorage.getItem('eco_totals')) || { score: 0, co2: 0, water: 0, plastic: 0 },
            completedToday: JSON.parse(localStorage.getItem('eco_completed_today')) || [],
            historyLog: JSON.parse(localStorage.getItem('eco_history_log')) || [],
            lastSavedDate: localStorage.getItem('eco_last_date') || ""
        };

        // UI Element Direct References
        const habitContainer = document.getElementById('habit-list-container');
        const badgeContainer = document.getElementById('badge-container');
        const historyRows = document.getElementById('history-log-rows');
        const historyEmptyState = document.getElementById('history-empty');
        const dateDisplay = document.getElementById('date-display');

        // Dynamic metrics interface updater
        function updateDashboardMetrics() {
            document.getElementById('stat-score').innerText = appState.totals.score;
            document.getElementById('stat-co2').innerText = `${appState.totals.co2}g`;
            document.getElementById('stat-water').innerText = `${appState.totals.water}L`;
            document.getElementById('stat-plastic').innerText = appState.totals.plastic;
            
            localStorage.setItem('eco_totals', JSON.stringify(appState.totals));
            evaluateMilestones();
        }

        // Daily structural reset validation checking calendar cross-over
        function checkDailyReset() {
            const todayStr = new Date().toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
            dateDisplay.innerText = todayStr;

            if (appState.lastSavedDate !== todayStr) {
                appState.completedToday = [];
                appState.lastSavedDate = todayStr;
                localStorage.setItem('eco_completed_today', JSON.stringify(appState.completedToday));
                localStorage.setItem('eco_last_date', todayStr);
            }
        }

        // Execution of completion toggle toggling system state array strings
        function toggleHabit(habitId) {
            const targetHabit = habitTemplate.find(h => h.id === habitId);
            if (!targetHabit) return;

            const index = appState.completedToday.indexOf(habitId);
            const isAdding = index === -1;

            if (isAdding) {
                // Add to daily list
                appState.completedToday.push(habitId);
                
                // Update metrics
                appState.totals.score += targetHabit.points;
                appState.totals.co2 += targetHabit.co2;
                appState.totals.water += targetHabit.water;
                appState.totals.plastic += targetHabit.plastic;

                // Push an entry out to historical logger array string format
                const logEntry = {
                    date: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }),
                    title: targetHabit.title,
                    impact: `+${targetHabit.points} Pts, -${targetHabit.co2}g CO₂`
                };
                appState.historyLog.unshift(logEntry); // Top entry insertion 
            } else {
                // Subtract execution logic
                appState.completedToday.splice(index, 1);
                
                appState.totals.score = Math.max(0, appState.totals.score - targetHabit.points);
                appState.totals.co2 = Math.max(0, appState.totals.co2 - targetHabit.co2);
                appState.totals.water = Math.max(0, appState.totals.water - targetHabit.water);
                appState.totals.plastic = Math.max(0, appState.totals.plastic - targetHabit.plastic);

                // Clean entry from log for the current instance
                const logIndex = appState.historyLog.findIndex(entry => entry.title === targetHabit.title);
                if (logIndex !== -1) appState.historyLog.splice(logIndex, 1);
            }

            // Sync structural arrays out onto LocalStorage strings
            localStorage.setItem('eco_completed_today', JSON.stringify(appState.completedToday));
            localStorage.setItem('eco_history_log', JSON.stringify(appState.historyLog));

            updateDashboardMetrics();
            renderHabits();
            renderHistory();
        }

        // Render functions constructing raw component string structures
        function renderHabits() {
            habitContainer.innerHTML = habitTemplate.map(habit => {
                const isDone = appState.completedToday.includes(habit.id);
                return `
                    <div class="habit-item">
                        <div class="habit-details">
                            <h3>${habit.title}</h3>
                            <p>${habit.desc}</p>
                        </div>
                        <button class="action-btn ${isDone ? 'completed' : ''}" onclick="toggleHabit('${habit.id}')">
                            ${isDone ? '✓ Logged' : `+ ${habit.points} pts`}
                        </button>
                    </div>
                `;
            }).join('');
        }

        function evaluateMilestones() {
            badgeContainer.innerHTML = milestoneBadges.map(badge => {
                let currentVal = appState.totals.score; // Default evaluation property setup
                if (badge.type === 'water') currentVal = appState.totals.water;
                if (badge.type === 'co2') currentVal = appState.totals.co2;

                const isUnlocked = currentVal >= badge.target;
                return `
                    <div class="badge-item ${isUnlocked ? 'unlocked' : ''}">
                        <span class="badge-icon">${badge.icon}</span>
                        <h4>${badge.title}</h4>
                        <p>${badge.desc}</p>
                    </div>
                `;
            }).join('');
        }

        function renderHistory() {
            if (appState.historyLog.length === 0) {
                historyRows.innerHTML = '';
                historyEmptyState.style.display = 'block';
                return;
            }

            historyEmptyState.style.display = 'none';
            historyRows.innerHTML = appState.historyLog.map(entry => `
                <tr>
                    <td>${entry.date}</td>
                    <td><strong>${entry.title}</strong></td>
                    <td><span style="color: var(--emerald-dark); font-weight:500;">${entry.impact}</span></td>
                </tr>
            `).join('');
        }

        // Application Lifecyle initializer execution
        function initApp() {
            checkDailyReset();
            updateDashboardMetrics();
            renderHabits();
            renderHistory();
        }

        window.onload = initApp;
    </script>
</body>
</html>
