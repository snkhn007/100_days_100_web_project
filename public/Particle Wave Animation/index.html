<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Particle Wave Animation</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <header class="header">
        <h1>Particle Wave</h1>
        <p class="subtitle">Interactive particle field with wave dynamics</p>
      </header>

      <div class="canvas-wrapper">
        <canvas id="waveCanvas"></canvas>
        <div class="overlay-label" id="fpsDisplay">-- FPS</div>
      </div>

      <div class="controls">
        <div class="control-group">
          <label for="speedSlider">Speed</label>
          <div class="slider-row">
            <input type="range" id="speedSlider" min="1" max="10" value="4" step="1" />
            <span id="speedVal">4</span>
          </div>
        </div>

        <div class="control-group">
          <label for="countSlider">Particles</label>
          <div class="slider-row">
            <input type="range" id="countSlider" min="30" max="250" value="120" step="10" />
            <span id="countVal">120</span>
          </div>
        </div>

        <div class="control-group">
          <label for="sizeSlider">Size</label>
          <div class="slider-row">
            <input type="range" id="sizeSlider" min="1" max="7" value="2" step="1" />
            <span id="sizeVal">2</span>
          </div>
        </div>

        <div class="control-group">
          <label for="connectSlider">Connect Range</label>
          <div class="slider-row">
            <input type="range" id="connectSlider" min="0" max="150" value="80" step="10" />
            <span id="connectVal">80</span>
          </div>
        </div>

        <div class="control-group theme-group">
          <label>Theme</label>
          <div class="theme-buttons">
            <button class="theme-btn active" data-theme="ocean">Ocean</button>
            <button class="theme-btn" data-theme="fire">Fire</button>
            <button class="theme-btn" data-theme="aurora">Aurora</button>
            <button class="theme-btn" data-theme="mono">Mono</button>
            <button class="theme-btn" data-theme="candy">Candy</button>
          </div>
        </div>

        <div class="control-group actions-group">
          <label>Actions</label>
          <div class="action-buttons">
            <button id="pauseBtn" class="action-btn">Pause</button>
            <button id="resetBtn" class="action-btn">Reset</button>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
