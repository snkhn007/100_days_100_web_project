<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Secure Password Generator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
    <a href="/" class="project-back-button">← Back to Home</a>

    <div class="container">
        <h1>Password Generator</h1>
        <div class="display-container">
            <input readonly placeholder="Password" class="display" data-passwordDisplay>
            <button class="copyBtn" data-copy>
                <span class="tooltip" data-copyMsg></span>
                <img src="./assets/copy.svg" alt="copy" width="23" height="23">
            </button>
        </div>

        <div class="input-container">
            <div class="length-container">
                <p>Password Length</p>
                <p data-lengthNumber>10</p>
            </div>

            <input type="range" min="1" max="20" class="slider" step="1" data-lengthSlider>

            <div class="check">
                <input type="checkbox" id="uppercase">
                <label for="uppercase">Includes Uppercase letters</label>
            </div>
            <div class="check">
                <input type="checkbox" id="lowercase">
                <label for="lowercase">Includes Lowercase letters</label>
            </div>
            <div class="check">
                <input type="checkbox" id="numbers">
                <label for="numbers">Includes Numbers</label>
            </div>
            <div class="check">
                <input type="checkbox" id="symbols">
                <label for="symbols">Includes Symbols</label>
            </div>

            <div class="strength-container">
                <p>Strength</p>
                <div class="strength-info">
                  <div class="indicator" data-indicator></div>
                  <span class="strength-text" data-strengthText>Weak</span>
                </div>
            </div>
            
            <p id="suggestionsText" class="suggestions">Suggestions: Include lowercase or uppercase letters, Include numbers or symbols</p>

            <div class="check">
                <input type="checkbox" id="useCustomWord">
                <label for="useCustomWord">Use Custom Word</label>
            </div>
            
            <input type="text" id="customWordInput" placeholder="Enter custom word..." class="custom-word-input">

            <p id="hideTimer"></p>
            <p id="warningMsg"></p>
            
            <button class="generateButton">GENERATE PASSWORD</button>
        </div>

        <div class="history-container" id="historyContainer">
            <h3>Recent Passwords</h3>
            <div id="historyList" class="history-list"></div>
            <button id="clearHistoryBtn" class="clear-btn">Clear History</button>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
