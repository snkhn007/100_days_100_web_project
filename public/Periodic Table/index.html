<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Periodic Table</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
<a href="/" class="project-back-button" style="position:fixed;left:18px;top:18px;padding:8px 16px;border-radius:8px;background:#1e293b;color:#3b82f6;border:1px solid #3b82f6;text-decoration:none;z-index:9999;font-weight:700;font-family:Inter, system-ui, sans-serif;transition:all 0.2s ease;" onmouseover="this.style.background='#3b82f6';this.style.color='#fff'" onmouseout="this.style.background='#1e293b';this.style.color='#3b82f6'">← Back to Home</a>


<div class="main-container">

    <!-- Controls -->
    <div class="controls">

        <input
        type="text"
        id="searchInput"
        placeholder="Search element..."
        >

        <select id="categoryFilter">

            <option value="all">All</option>
            <option value="alkali">Alkali Metals</option>
            <option value="alkaline-earth">Alkaline Earth</option>
            <option value="transition">Transition Metals</option>
            <option value="metal">Post-transition Metals</option>
            <option value="metalloid">Metalloids</option>
            <option value="nonmetal">Non-metals</option>
            <option value="halogen">Halogens</option>
            <option value="noble-gas">Noble Gases</option>
            <option value="lanthanide">Lanthanoids</option>
            <option value="actinide">Actinides</option>

        </select>


        <select id="trendFilter">

            <option value="none">
                Periodic Trends
            </option>

            <option value="mass">
                Atomic Mass
            </option>

            <option value="electronegativity">
                Electronegativity
            </option>

            <option value="atomicRadius">
                Atomic Radius
            </option>

            <option value="ionizationEnergy">
                Ionization Energy
            </option>

        </select>
        <button id="exportPdfBtn">
    Export PDF
</button>

    </div>
<div id="pdfExportArea">

    <!-- Legend -->
    <div class="legend"></div>



    <!-- ONLY ONE TREND POPUP -->
   <!-- Trend Popup Container -->
<div
id="trendPopupContainer"
class="trend-popup-container"

style="display:none;">


<!-- Existing popup -->
<div id="trendInfo"
class="trend-info">

<button id="closeTrendInfo">

×

</button>

<h3 id="trendTitle"></h3>

<p id="trendDescription"></p>

<div id="trendExtremes"></div>

<div class="trend-scale">

<span>LOW</span>

<div class="gradient-bar"></div>

<span>HIGH</span>

</div>
<div class="trend-link">

<p>

Want to learn more about this property?

</p>

<a
id="wikiLink"

target="_blank">

Explore in detail →

</a>

</div>

</div>



<!-- New Analysis Popup -->

<div
id="trendAnalysis"

class="trend-info">

<h3>

Trend Analysis

</h3>

<div id="analysisContent">

Select a trend property

</div>

</div>


</div>



    <!-- Periodic Table -->
    <div class="periodic-table-wrapper">
        <div class="table-container">

            <!-- JS adds elements here -->

        </div>
    </div>


</div>
</div>



<!-- MODAL -->

<div id="element-modal"
class="modal">

<div class="modal-content">

<span class="close-btn"
id="close-modal-btn">

&times;

</span>


<div class="modal-body">

<div class="element-details-panel">

<div class="element-header">

<div id="modal-number"
class="modal-number">

</div>

<h1 id="modal-symbol"
class="modal-symbol">

</h1>

<h2 id="modal-name"
class="modal-name">

</h2>

<span
id="modal-category"
class="modal-category-badge">

</span>

</div>


<div class="element-stats">

<div class="stat-title">

Atomic Properties

</div>

<div class="stat-grid">

<div class="stat-item">

<span class="stat-label">
Atomic Mass
</span>

<span
id="modal-mass"
class="stat-value">

</span>

</div>


<div class="stat-item">

<span class="stat-label">
Protons
</span>

<span
id="modal-protons"
class="stat-value text-proton">

</span>

</div>


<div class="stat-item">

<span class="stat-label">
Neutrons
</span>

<span
id="modal-neutrons"
class="stat-value text-neutron">

</span>

</div>


<div class="stat-item">

<span class="stat-label">
Electrons
</span>

<span
id="modal-electrons"
class="stat-value text-electron">

</span>

</div>

</div>

</div>



<div class="shell-configuration">

<div class="stat-title">

Electron Configuration

</div>

<div
class="shell-summary"
id="shell-summary-text">

</div>


<div
id="shells-list"
class="shells-list">

</div>

</div>

</div>



<div class="visualization-panel">

<div class="canvas-container">

<canvas
id="atomic-canvas">

</canvas>

<div
class="canvas-overlay-text">

BOHR MODEL

</div>

</div>


<div class="control-panel">

<button
id="play-pause-btn"
class="ctrl-btn">

Play

</button>


<div class="slider-container">

<span>
Speed
</span>

<input
type="range"
id="speed-slider"
min="0.1"
max="3"
step="0.1"
value="1">

</div>


<button
id="toggle-orbits-btn"
class="ctrl-btn active">

Orbits

</button>


<button
id="toggle-trails-btn"
class="ctrl-btn active">

Trails

</button>

</div>

</div>

</div>

</div>

</div>



<script src="script.js?v=2024"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</body>
</html>
