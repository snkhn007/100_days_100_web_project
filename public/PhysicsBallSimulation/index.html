<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Physics Ball Simulation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <canvas id="canvas" aria-label="Physics simulation canvas"></canvas>

  <div class="controls glass" role="group" aria-label="Simulation controls">

    <div class="controls-header">
      <div class="controls-title">
        <h1>Physics Ball Simulation</h1>
        <p class="subtitle">Click to spawn &nbsp;·&nbsp; Right-click to remove &nbsp;·&nbsp; Space to pause</p>
      </div>
      <span class="ball-count" aria-live="polite"><span id="ball-count">0</span> balls</span>
    </div>

    <div class="sliders">

      <div class="ctrl-item">
        <div class="ctrl-head">
          <label for="gravity">Gravity</label>
          <span class="val" id="gravity-val">0.20</span>
        </div>
        <input type="range" id="gravity" min="0" max="2" step="0.05" value="0.2">
      </div>

      <div class="ctrl-item">
        <div class="ctrl-head">
          <label for="elasticity">Bounce</label>
          <span class="val" id="elasticity-val">0.75</span>
        </div>
        <input type="range" id="elasticity" min="0.1" max="1" step="0.05" value="0.75">
      </div>

      <div class="ctrl-item">
        <div class="ctrl-head">
          <label for="ball-size">Size</label>
          <span class="val" id="ball-size-val">22</span>
        </div>
        <input type="range" id="ball-size" min="8" max="50" step="1" value="22">
      </div>

      <div class="ctrl-item">
        <div class="ctrl-head">
          <label for="trail">Trail</label>
          <span class="val" id="trail-val">16</span>
        </div>
        <input type="range" id="trail" min="0" max="40" step="1" value="16">
      </div>

      <div class="ctrl-item">
        <div class="ctrl-head">
          <label for="density">Density</label>
          <span class="val" id="density-val">1.0</span>
        </div>
        <input type="range" id="density" min="0.2" max="5" step="0.1" value="1">
      </div>

    </div>

    <div class="ctrl-footer">
      <button id="add-btn">+ Ball</button>
      <button id="pause-btn" title="Space">⏸</button>
      <button id="clear-btn">Clear</button>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
