<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Placement Predictor</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- Premium Theme Switcher Toggle -->
  <div class="theme-switch-wrapper">
    <label class="theme-switch" for="themeCheckbox">
      <input type="checkbox" id="themeCheckbox" />
      <div class="slider">
        <span class="icon moon">🌙</span>
        <span class="icon sun">☀️</span>
        <div class="ball"></div>
      </div>
    </label>
  </div>

  <div class="container">
    <!-- Perfectly Centered Hero Illustration -->
    <div class="hero-wrapper">
      <img src="hero_illustration.png" alt="Placement Predictor Career Success" class="hero-image">
    </div>

    <h1 class="main-title">Placement Predictor</h1>
      Predict your placement chances and expected package based on your profile
    </p>

    <div class="form-grid">

      <div class="input-group">
        <label>College Name</label>
        <input type="text" id="college" />
      </div>

      <div class="input-group">
        <label>State</label>
        <select id="state">
            <option value="">Select State</option>

            <option>Andhra Pradesh</option>
            <option>Arunachal Pradesh</option>
            <option>Assam</option>
            <option>Bihar</option>
            <option>Chhattisgarh</option>
            <option>Goa</option>
            <option>Gujarat</option>
            <option>Haryana</option>
            <option>Himachal Pradesh</option>
            <option>Jharkhand</option>
            <option>Karnataka</option>
            <option>Kerala</option>
            <option>Madhya Pradesh</option>
            <option>Maharashtra</option>
            <option>Manipur</option>
            <option>Meghalaya</option>
            <option>Mizoram</option>
            <option>Nagaland</option>
            <option>Odisha</option>
            <option>Punjab</option>
            <option>Rajasthan</option>
            <option>Sikkim</option>
            <option>Tamil Nadu</option>
            <option>Telangana</option>
            <option>Tripura</option>
            <option>Uttar Pradesh</option>
            <option>Uttarakhand</option>
            <option>West Bengal</option>

            <option>Andaman and Nicobar Islands</option>
            <option>Chandigarh</option>
            <option>Dadra and Nagar Haveli and Daman and Diu</option>
            <option>Delhi</option>
            <option>Jammu and Kashmir</option>
            <option>Ladakh</option>
            <option>Lakshadweep</option>
            <option>Puducherry</option>
        </select>
      </div>

      <div class="input-group">
        <label>CGPA</label>
        <input type="number" id="cgpa" min="0" max="10" step="0.1" />
      </div>

      <div class="input-group">
        <label>DSA Skill (Out of 10)</label>
        <input type="number" id="dsa" min="0" max="10" />
      </div>

      <div class="input-group">
        <label>Projects Completed</label>
        <input type="number" id="projects" min="0" />
      </div>

      <div class="input-group">
        <label>Communication Skill</label>
        <select id="communication">
          <option value="">Select</option>
          <option>Excellent</option>
          <option>Good</option>
          <option>Average</option>
          <option>Poor</option>
        </select>
      </div>

      <div class="input-group">
        <label>Internship Experience</label>
        <select id="internship">
          <option value="">Select</option>
          <option>Yes</option>
          <option>No</option>
        </select>
      </div>

      <div class="input-group">
        <label>Tech Stack</label>
        <select id="stack">
          <option value="">Select Stack</option>
          <option>Web Development</option>
          <option>AI / ML</option>
          <option>Android Development</option>
          <option>Cyber Security</option>
          <option>Data Science</option>
        </select>
      </div>

    </div>

    <button id="predictBtn">Predict Placement</button>

    <div class="result-box" id="resultBox">

      <div class="meter-wrapper">
        <div class="progress-ring" id="progressRing">
          <svg class="progress-svg" width="180" height="180">
            <circle
              class="progress-bg"
              cx="90"
              cy="90"
              r="75"
            ></circle>
            <circle
              class="progress-circle"
              id="progressCircle"
              cx="90"
              cy="90"
              r="75"
            ></circle>
          </svg>

        <div class="meter-content">
          <h2 id="meterScore">0%</h2>
          <p>Placement Chance</p>
        </div>
      </div>
    </div>
    
      <h2>Your Prediction</h2>

      <div class="result-card">
        <span>Placement Probability</span>
        <h3 id="placementChance">0%</h3>
      </div>

      <div class="result-card">
        <span>Expected Package</span>
        <h3 id="expectedPackage">₹0 LPA</h3>
      </div>

      <div class="result-card">
        <span>Suggested Focus Area</span>
        <h3 id="suggestion">-</h3>
      </div>

      <!-- Personalized Recommendations & Actionable Resource Suggestions -->
      <div class="recommendations-container" id="recommendationsContainer" style="display: none;">
        <h3 class="recommendations-title">🎯 Areas for Improvement & Actionable Steps</h3>
        <div class="recommendations-list" id="recommendationsList">
          <!-- Dynamic recommendation items will be programmatically injected here -->
        </div>
      </div>


      <div class="charts-container">
        <div class="chart-card">
          <canvas id="placementChart"></canvas>
        </div>

        <div class="chart-card">
          <canvas id="skillsChart"></canvas>
        </div>
      </div>
    </div>

  </div>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="script.js"></script>
</body>
</html>
