<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<a href="/" class="project-back-button" style="position:fixed;left:18px;top:18px;padding:8px 12px;border-radius:8px;background:white;text-decoration:none;z-index:9999;font-weight:700;font-family:Inter, system-ui, sans-serif;box-shadow:0 8px 20px rgba(0, 0, 0);">← Back to Home</a>

    <main class="pokedex-app">
        <header class="pokedex-header">
            <h1>Pokédex</h1>
            <p>Search for any Pokémon by name or ID</p>
        </header>

        <section class="search-section">
            <input type="text" id="search-input" placeholder="e.g. pikachu or 25" autocomplete="off">
            <button id="search-btn">Search</button>
        </section>

        <section id="pokemon-container" class="pokemon-display">
            </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
