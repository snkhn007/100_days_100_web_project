<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:#071739;
            color:white;
            min-height:100vh;

            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;

            transition:0.4s;

            padding:40px 20px;
        }

        body.light{
            background:#f3f4f6;
            color:#111827;
        }

        .theme-toggle{
            position:absolute;
            top:25px;
            right:25px;
        }

        .theme-toggle button{
            border:none;

            padding:12px 16px;

            border-radius:12px;

            cursor:pointer;

            font-size:18px;

            background:#1e293b;

            color:white;
        }

        body.light .theme-toggle button{
            background:white;
            color:black;
        }

        .title{
            font-size:64px;
            font-weight:900;
            letter-spacing:4px;

            margin-bottom:35px;

            text-align:center;
        }

        .container{

            width:500px;

            background:#1e293b;

            border-radius:30px;

            padding:35px;

            box-shadow:0 0 30px rgba(0,0,0,0.4);

            display:flex;
            flex-direction:column;
            align-items:center;

            gap:25px;

            transition:0.4s;
        }

        body.light .container{
            background:white;
        }

        .top-section{

            width:100%;

            display:flex;
            flex-direction:column;

            align-items:flex-start;

            gap:18px;
        }

        #taskInput{

            width:100%;

            padding:16px;

            border:none;

            border-radius:16px;

            outline:none;

            background:#334155;

            color:white;

            font-size:17px;
        }

        body.light #taskInput{
            background:#e5e7eb;
            color:black;
        }

        .task-display{

            width:100%;

            background:#334155;

            padding:18px;

            border-radius:16px;

            display:flex;

            align-items:center;

            gap:14px;

            font-size:20px;

            min-height:70px;
        }

        body.light .task-display{
            background:#e5e7eb;
        }

        #taskCheck{
            width:22px;
            height:22px;

            cursor:pointer;
        }

        .center-section{

            width:100%;

            display:flex;
            flex-direction:column;

            justify-content:center;
            align-items:center;

            gap:25px;
        }

        .mode{
            display:flex;
            gap:16px;
        }

        .mode button{

            border:none;

            padding:14px 32px;

            border-radius:16px;

            cursor:pointer;

            font-size:20px;

            transition:0.3s;
        }

        .active{
            background:#38bdf8;
            color:white;
        }

        .circle{

            position:relative;

            width:320px;
            height:320px;

            display:flex;
            justify-content:center;
            align-items:center;
        }

        svg{
            width:320px;
            height:320px;

            transform:rotate(-90deg);
        }

        circle{
            fill:none;
            stroke-width:14;
        }

        .bg{
            stroke:#334155;
        }

        body.light .bg{
            stroke:#d1d5db;
        }

        .progress{
            stroke:#38bdf8;

            stroke-linecap:round;

            stroke-dasharray:628;

            stroke-dashoffset:0;

            transition:1s linear;
        }

        #timer{

            position:absolute;

            top:50%;
            left:50%;

            transform:translate(-50%,-50%);

            font-size:82px;

            font-weight:bold;
        }

        .buttons{

            display:flex;
            gap:18px;

            flex-wrap:wrap;

            justify-content:center;
        }

        .buttons button,
        #focusModeBtn{

            border:none;

            padding:15px 28px;

            border-radius:14px;

            cursor:pointer;

            color:white;

            font-size:20px;

            transition:0.3s;
        }

        .buttons button:hover,
        .mode button:hover,
        #focusModeBtn:hover,
        .theme-toggle button:hover{

            transform:scale(1.05);
        }

        #start{
            background:#22c55e;
        }

        #pause{
            background:#f59e0b;
        }

        #reset{
            background:#ef4444;
        }

        #focusModeBtn{
            background:#8b5cf6;
        }

        .quote-banner{

            margin-top:28px;

            width:100%;

            max-width:900px;

            text-align:center;

            font-size:26px;

            color:#38bdf8;

            font-family:cursive;

            min-height:40px;

            overflow:hidden;
        }

        body.light .quote-banner{
            color:#2563eb;
        }

        .focus-mode .title,
        .focus-mode .top-section,
        .focus-mode .theme-toggle,
        .focus-mode .quote-banner{
            display:none;
        }

        .focus-mode .container{
            transform:scale(1.1);
        }

        @media(max-width:600px){

            .title{
                font-size:40px;
            }

            .container{
                width:100%;
                padding:25px;
            }

            .circle,
            svg{
                width:240px;
                height:240px;
            }

            #timer{
                font-size:56px;
            }

            .buttons{
                flex-direction:column;
                width:100%;
            }

            .buttons button,
            #focusModeBtn{
                width:100%;
            }

            .mode{
                flex-direction:column;
                width:100%;
            }

            .mode button{
                width:100%;
            }

            .quote-banner{
                font-size:18px;
            }
        }

    </style>
</head>

<body>

    <div class="theme-toggle">
        <button id="themeBtn">🌙</button>
    </div>

    <div class="title">
        POMODORO TIMER
    </div>

    <div class="container">

        <div class="top-section">

            <input
                type="text"
                id="taskInput"
                placeholder="What are you working on?"
            >

            <div class="task-display">

                <input type="checkbox" id="taskCheck">

                <span id="currentTask">
                    No current task
                </span>

            </div>

        </div>

        <div class="center-section">

            <div class="mode">

                <button id="workBtn" class="active">
                    Work
                </button>

                <button id="breakBtn">
                    Break
                </button>

            </div>

            <button id="focusModeBtn">
                Focus Mode
            </button>

            <div class="circle">

                <svg>

                    <circle
                        class="bg"
                        cx="160"
                        cy="160"
                        r="100">
                    </circle>

                    <circle
                        class="progress"
                        id="progressCircle"
                        cx="160"
                        cy="160"
                        r="100">
                    </circle>

                </svg>

                <div id="timer">25:00</div>

            </div>

            <div class="buttons">

                <button id="start">
                    Start
                </button>

                <button id="pause">
                    Pause
                </button>

                <button id="reset">
                    Reset
                </button>

            </div>

        </div>

    </div>

    <div class="quote-banner">

        <marquee id="quoteText">
            Stay focused and never give up
        </marquee>

    </div>

    <audio id="tickSound" loop>
        <source
            src="https://www.soundjay.com/clock/sounds/clock-ticking-2.mp3"
            type="audio/mpeg">
    </audio>

    <script>

        let workTime = 25 * 60;
        let breakTime = 5 * 60;

        let totalTime = workTime;
        let time = workTime;

        let timer = null;
        let isRunning = false;

        const timerDisplay =
        document.getElementById("timer");

        const progressCircle =
        document.getElementById("progressCircle");

        const workBtn =
        document.getElementById("workBtn");

        const breakBtn =
        document.getElementById("breakBtn");

        const tickSound =
        document.getElementById("tickSound");

        const taskInput =
        document.getElementById("taskInput");

        const currentTask =
        document.getElementById("currentTask");

        const taskCheck =
        document.getElementById("taskCheck");

        const quoteBanner =
        document.querySelector(".quote-banner");

        const taskDisplay =
        document.querySelector(".task-display");

        const quotes = [

            "It's the job that's never started that takes longest to finish. — J.R.R. Tolkien",

            "Someday is not a day of the week. — Janet Dailey",

            "A year from now you may wish you had started today. — Karen Lamb",

            "You may delay, but time will not. — Benjamin Franklin",

            "You cannot escape the responsibility of tomorrow by evading it today. — Abraham Lincoln",

            "Whatever you want to do, do it now. There are only so many tomorrows. — Michael Landon",

            "Small progress is still progress",

            "You don't have to see the whole staircase, just take the first step. — Martin Luther King Jr.",

            "Discipline creates freedom",

            "Stay consistent, not perfect"

        ];

        const quoteText =
        document.getElementById("quoteText");

        function changeQuote(){

            if(totalTime === breakTime){
                return;
            }

            const randomQuote =
            quotes[Math.floor(Math.random() * quotes.length)];

            quoteText.innerText = randomQuote;
        }

        setInterval(changeQuote,5000);

        function updateDisplay(){

            let minutes =
            Math.floor(time / 60);

            let seconds =
            time % 60;

            seconds =
            seconds < 10
            ? "0" + seconds
            : seconds;

            timerDisplay.innerText =
            `${minutes}:${seconds}`;

            let progress =
            628 - (628 * time) / totalTime;

            progressCircle.style.strokeDashoffset =
            progress;
        }

        function startTimer(){

            if(isRunning) return;

            isRunning = true;

            tickSound.play().catch(() => {});

            timer = setInterval(()=>{

                if(time > 0){

                    time--;

                    updateDisplay();
                }

                else{

                    clearInterval(timer);

                    tickSound.pause();

                    isRunning = false;

                    alert("Session Complete!");

                    switchMode();

                    startTimer();
                }

            },1000);
        }

        function pauseTimer(){

            clearInterval(timer);

            tickSound.pause();

            isRunning = false;
        }

        function resetTimer(){

            clearInterval(timer);

            tickSound.pause();

            isRunning = false;

            time = totalTime;

            updateDisplay();
        }

        function switchMode(){

            if(totalTime === workTime){

                totalTime = breakTime;
                time = breakTime;

                breakBtn.classList.add("active");
                workBtn.classList.remove("active");

                taskDisplay.style.display = "none";

                quoteBanner.style.display = "none";
            }

            else{

                totalTime = workTime;
                time = workTime;

                workBtn.classList.add("active");
                breakBtn.classList.remove("active");

                taskDisplay.style.display = "flex";

                quoteBanner.style.display = "block";
            }

            updateDisplay();
        }

        taskInput.addEventListener("keypress",(e)=>{

            if(e.key === "Enter"){

                if(taskInput.value.trim() !== ""){

                    currentTask.innerText =
                    taskInput.value;

                    taskCheck.checked = false;

                    currentTask.style.textDecoration =
                    "none";

                    currentTask.style.opacity = "1";

                    taskInput.value = "";
                }
            }
        });

        taskCheck.addEventListener("change",()=>{

            if(taskCheck.checked){

                currentTask.style.textDecoration =
                "line-through";

                currentTask.style.opacity = "0.6";

                setTimeout(()=>{

                    currentTask.innerText =
                    "No current task";

                    currentTask.style.textDecoration =
                    "none";

                    currentTask.style.opacity =
                    "1";

                    taskCheck.checked = false;

                },1500);
            }

            else{

                currentTask.style.textDecoration =
                "none";

                currentTask.style.opacity =
                "1";
            }
        });

        document
        .getElementById("start")
        .addEventListener("click",startTimer);

        document
        .getElementById("pause")
        .addEventListener("click",pauseTimer);

        document
        .getElementById("reset")
        .addEventListener("click",resetTimer);

        workBtn.addEventListener("click",()=>{

            totalTime = workTime;
            time = workTime;

            workBtn.classList.add("active");
            breakBtn.classList.remove("active");

            taskDisplay.style.display = "flex";

            quoteBanner.style.display = "block";

            resetTimer();
        });

        breakBtn.addEventListener("click",()=>{

            totalTime = breakTime;
            time = breakTime;

            breakBtn.classList.add("active");
            workBtn.classList.remove("active");

            taskDisplay.style.display = "none";

            quoteBanner.style.display = "none";

            resetTimer();
        });

        const themeBtn =
        document.getElementById("themeBtn");

        themeBtn.addEventListener("click",()=>{

            document.body.classList.toggle("light");

            if(document.body.classList.contains("light")){

                themeBtn.innerText = "☀️";
            }

            else{

                themeBtn.innerText = "🌙";
            }
        });

        const focusBtn =
        document.getElementById("focusModeBtn");

        focusBtn.addEventListener("click",()=>{

            document.body.classList.toggle("focus-mode");

            if(document.body.classList.contains("focus-mode")){

                focusBtn.innerText = "Exit Focus Mode";
            }

            else{

                focusBtn.innerText = "Focus Mode";
            }
        });

        updateDisplay();

    </script>

</body>
</html>
