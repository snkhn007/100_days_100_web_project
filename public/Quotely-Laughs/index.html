<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quotely Laughs</title>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>😉</text></svg>">
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,400;1,300&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet" />
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #1e1e1e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background-color: #161616;
      border-bottom: 1px solid #2a2a2a;
      padding: 18px 24px;
      text-align: center;
    }

    header h1 {
      font-family: 'Merriweather', serif;
      font-size: 1.6rem;
      color: #f5f5f5;
      letter-spacing: -0.3px;
    }

    header p {
      color: #666;
      font-size: 0.78rem;
      margin-top: 4px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 20px;
      gap: 28px;
    }

    #generate {
      background-color: #f5f5f5;
      color: #1a1a1a;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 0.88rem;
      padding: 12px 28px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.2px;
    }

    #generate:hover {
      background-color: #ddd;
    }

    #generate:active {
      transform: scale(0.98);
    }

    #content {
      width: 100%;
      max-width: 560px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .card {
      background: #272727;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 24px 28px;
    }

    .card-type {
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #666;
      margin-bottom: 12px;
    }

    #quote {
      font-family: 'Merriweather', serif;
      font-style: italic;
      font-size: 1rem;
      line-height: 1.8;
      color: #e0e0e0;
      margin-bottom: 16px;
      min-height: 52px;
    }

    #joke {
      font-size: 0.95rem;
      line-height: 1.7;
      color: #ccc;
      margin-bottom: 16px;
      min-height: 48px;
    }

    .share-row {
      display: flex;
      align-items: center;
      gap: 8px;
      border-top: 1px solid #333;
      padding-top: 14px;
    }

    .share-row p {
      font-size: 0.75rem;
      color: #555;
    }

    .share-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: #333;
      border: 1px solid #3d3d3d;
      border-radius: 4px;
      padding: 5px 12px;
      color: #aaa;
      font-size: 0.75rem;
      font-weight: 500;
      text-decoration: none;
      transition: background 0.15s, color 0.15s;
    }

    .share-btn:hover {
      background: #3a3a3a;
      color: #f5f5f5;
    }

    #loading {
      position: fixed;
      inset: 0;
      background: rgba(30, 30, 30, 0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 50;
    }

    #loading.hidden {
      display: none;
    }

    .loader {
      width: 36px;
      height: 36px;
      border: 3px solid #333;
      border-top-color: #f5f5f5;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
  <script defer src="script.js"></script>
</head>

<body>
<a href="/" class="project-back-button" style="position:fixed;left:18px;top:18px;padding:8px 12px;border-radius:8px;background:white;text-decoration:none;z-index:9999;font-weight:700;font-family:Inter, system-ui, sans-serif;box-shadow:0 8px 20px rgba(0, 0, 0);">← Back to Home</a>

  <header>
    <h1>Quotely Laughs</h1>
    <p>quotes & jokes, daily</p>
  </header>

  <main>
    <button id="generate">Generate Quote and Joke</button>

    <div id="content">
      <div class="card">
        <p class="card-type">Quote</p>
        <p id="quote">Click generate to load a quote.</p>
        <div class="share-row">
          <p>Share on</p>
          <a id="share-quote-x" href="#" target="_blank" class="share-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 512 512">
              <path fill="currentColor"
                d="M389.2 48h70.6L305.6 224.2L487 464H345L233.7 318.6L106.5 464H35.8l164.9-188.5L26.8 48h145.6l100.5 132.9zm-24.8 373.8h39.1L151.1 88h-42z" />
            </svg>
            X / Twitter
          </a>
        </div>
      </div>

      <div class="card">
        <p class="card-type">Joke</p>
        <p id="joke">Click generate to load a joke.</p>
        <div class="share-row">
          <p>Share on</p>
          <a id="share-joke-x" href="#" target="_blank" class="share-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 512 512">
              <path fill="currentColor"
                d="M389.2 48h70.6L305.6 224.2L487 464H345L233.7 318.6L106.5 464H35.8l164.9-188.5L26.8 48h145.6l100.5 132.9zm-24.8 373.8h39.1L151.1 88h-42z" />
            </svg>
            X / Twitter
          </a>
        </div>

      </div>
    </div>
  </main>

  <div id="loading" class="hidden">
    <div class="loader"></div>
  </div>
</body>

</html>
