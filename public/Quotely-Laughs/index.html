<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Quotely Laughs</title>

  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>😂</text></svg>">

  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link rel="icon" href="favicon.png">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Merriweather:wght@400;700&display=swap"
    rel="stylesheet">

  <script defer src="script.js"></script>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <a href="/" class="project-back-button">
    ← Back
  </a>

  <header>

    <h1>😂 Quotely Laughs</h1>

    <p class="subtitle">
      Quotes • Jokes • Inspiration
    </p>

    <div class="header-actions">
      <button id="theme-toggle" class="header-btn">
        🌙
      </button>
    </div>

    <div class="hero">
      <h2>Daily Inspiration & Laughter</h2>
      <p>Generate motivational quotes and funny jokes instantly.</p>
    </div>

  </header>

  <main>

    <div class="search-section">

      <input
        type="text"
        id="keyword"
        placeholder="Try coding, exams, college, life..."
      >

      <button id="generate" class="action-btn">
        ✨ Generate
      </button>

      <button id="history-btn" class="action-btn">
        📜 History
      </button>

    </div>

    <div class="stats">
      Quotes Generated:
      <span id="counter">0</span>
    </div>

    <div class="content-grid">

      <div class="card">

        <p class="card-type">Quote</p>

        <p id="quote">
          Click Generate to load a quote.
        </p>

        <div class="card-actions">

          <button id="copy-quote" class="small-btn">
            📋 Copy
          </button>

          <button id="favorite-quote" class="small-btn">
            ❤️ Favorite
          </button>

          <a id="share-quote-x"
            href="#"
            target="_blank"
            class="small-btn">
            🐦 Share
          </a>

        </div>

      </div>

      <div class="card">

        <p class="card-type">Joke</p>

        <p id="joke">
          Click Generate to load a joke.
        </p>

        <div class="card-actions">

          <button id="copy-joke" class="small-btn">
            📋 Copy
          </button>

          <button id="favorite-joke" class="small-btn">
            ❤️ Favorite
          </button>

          <a id="share-joke-x"
            href="#"
            target="_blank"
            class="small-btn">
            🐦 Share
          </a>

        </div>

      </div>

    </div>

  </main>

  <div id="history-panel">

    <div class="history-header">

      <h2>📜 History</h2>

      <button id="close-history" class="small-btn">
        ✕
      </button>

    </div>

    <div id="history-list"></div>

  </div>

  <div id="loading" class="hidden">
    <div class="loader"></div>
  </div>

</body>

</html>
