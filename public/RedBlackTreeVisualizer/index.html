<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red-Black Tree Visualizer</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <h1>Red-Black Tree Visualizer</h1>
            <p>Insert nodes to watch the Red-Black Tree auto-balance. Strict rules apply: Root is black, no two adjacent red nodes, and equal black-depth.</p>
        </header>

        <main>
            <div class="controls glass-panel">
                <div class="input-group">
                    <input type="number" id="node-value" placeholder="Enter number..." />
                    <button id="insert-btn" class="btn primary">Insert Node</button>
                    <button id="random-btn" class="btn secondary">Random</button>
                    <button id="clear-btn" class="btn danger">Clear</button>
                </div>
                <div class="speed-control">
                    <label for="speed-slider">Animation Speed:</label>
                    <input type="range" id="speed-slider" min="1" max="10" value="5">
                </div>
            </div>

            <div class="logger glass-panel" id="logger">
                <h3>Operation Log</h3>
                <ul id="log-list">
                    <li>Tree initialized. Ready for insertion.</li>
                </ul>
            </div>

            <div class="visualization-area glass-panel">
                <svg id="edges-svg"></svg>
                <div id="nodes-container"></div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
