<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Resume Studio</title>

    <link rel="stylesheet" href="style.css"/>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>

<div class="bg-glow"></div>
<div class="animated-bg">
    <span></span><span></span><span></span>
    <span></span><span></span><span></span>
</div>

<div class="app">

    <aside class="sidebar">
        <div class="logo">
            <div class="logo-box">RS</div>
            <div>
                <h2>Resume Studio</h2>
                <p>ATS Resume Builder</p>
            </div>
        </div>

        <div class="ats-card glass">
            <h3>ATS Score</h3>
            <div class="score-circle">
                <span id="atsScoreValue">82</span><span>%</span>
            </div>
            <p>Good Resume Structure</p>
        </div>

        <button id="themeSwitcher" class="theme-btn">
            🌙 Dark Mode
        </button>
    </aside>

    <section class="editor">
        <div class="form-card glass">
            <div class="top-bar">
                <div>
                    <h1>Build Your Resume</h1>
                    <p>Create a professional ATS-ready resume</p>
                </div>

                <div class="template-buttons">
                    <button class="template active" data-template="modern">Modern</button>
                    <button class="template" data-template="classic">Classic</button>
                    <button class="template" data-template="minimal">Minimal</button>
                </div>
            </div>

            <form id="resumeForm">
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="name" placeholder="John Doe">
                    </div>
                    <div class="form-group">
                        <label>Professional Title</label>
                        <input type="text" id="title" placeholder="Frontend Developer">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="email" placeholder="john@example.com">
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="text" id="phone" placeholder="+91 9876543210">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Location</label>
                        <input type="text" id="location" placeholder="Mumbai, India">
                    </div>
                    <div class="form-group">
                        <label>Education</label>
                        <input type="text" id="education" placeholder="B.Tech in AI & DS">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>LinkedIn (URL)</label>
                        <input type="text" id="linkedin" placeholder="linkedin.com/in/johndoe">
                    </div>
                    <div class="form-group">
                        <label>GitHub (URL)</label>
                        <input type="text" id="github" placeholder="github.com/johndoe">
                    </div>
                </div>

                <div class="form-group">
                    <label>Professional Summary</label>
                    <textarea id="summary" rows="3" placeholder="Write a short professional summary..."></textarea>
                </div>

                <div class="form-group">
                    <label>Skills (Comma separated)</label>
                    <textarea id="skills" rows="2" placeholder="HTML, CSS, JavaScript, React..."></textarea>
                </div>

                <div class="form-group">
                    <label>Experience (Use dashes '-' for bullet points)</label>
                    <textarea id="experience" rows="4" placeholder="- Frontend Developer Intern at XYZ Company&#10;- Built responsive web apps"></textarea>
                </div>

                <div class="form-group">
                    <label>Projects (Use dashes '-' for bullet points)</label>
                    <textarea id="projects" rows="4" placeholder="- Resume Studio Web App&#10;- E-commerce Clone"></textarea>
                </div>

                <div class="buttons">
                    <button type="button" id="fillDemoBtn" class="secondary-btn">
                        Fill Demo Data
                    </button>
                    <button type="button" id="clearFormBtn" class="secondary-btn" style="background: rgba(255,50,50,0.1);">
                        Clear Form
                    </button>
                </div>
                
                <div class="buttons">
                    <button type="button" id="printBtn" class="primary-btn">
                        Print / Save as PDF
                    </button>
                    <button type="button" id="downloadBtn" class="secondary-btn">
                        Download Image PDF
                    </button>
                </div>

            </form>
        </div>
    </section>

    <section class="preview">
        <div class="preview-header">
            <h2>Live Resume Preview</h2>
        </div>
        
        <div id="resumePreview" class="resume-sheet">
            <div style="text-align: center; margin-top: 50px; color: #666;">
                Start typing to generate your live preview...
            </div>
        </div>
    </section>

</div>

<script src="script.js"></script>

</body>
</html>
