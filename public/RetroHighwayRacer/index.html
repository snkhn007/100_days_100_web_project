<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Highway Racer</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:,">
</head>
<body>
<a href="/" class="project-back-button" style="position:fixed;left:18px;top:18px;padding:8px 12px;border-radius:8px;background:linear-gradient(90deg, rgba(124,99,255,0.14), rgba(79,141,255,0.10));color:#fff;text-decoration:none;z-index:9999;font-weight:700;font-family:Inter, system-ui, sans-serif;box-shadow:0 8px 20px rgba(12,18,40,0.35);">← Back to Home</a>

    <div class="game-container" id="game-container">
        <div class="game-arena">
            <div class="grass grass-left" id="grass-left"></div>
            
            <div class="highway" id="highway">
                <div class="player-car" id="player"></div>
            </div>
            
            <div class="grass grass-right" id="grass-right"></div>
        </div>

        <button class="pause-btn" id="pause-btn" style="display: none;">||</button>

        <div class="mobile-controls">
            <button class="ctrl-btn" id="left-btn">◀</button>
            <button class="ctrl-btn" id="right-btn">▶</button>
        </div>

        <div class="ui-panel">
            <div class="distance-board">Distance: <span id="distance-val">0</span> m</div>
            <div class="score-board">Score: <span id="score-val">0</span></div>
            
            <div class="speedometer">
                <svg viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="45" stroke="#1abc9c" stroke-width="2" fill="none" />
                    <text x="50" y="60" text-anchor="middle" font-weight="bold" font-size="20" fill="white">
                        <tspan id="speed-val">0</tspan> <tspan font-size="10" y="70" x="50">m/s</tspan>
                    </text>
                    <line x1="50" y1="50" x2="50" y2="10" stroke="#e74c3c" stroke-width="3" id="speed-hand" transform="rotate(0, 50, 50)" />
                </svg>
            </div>
        </div>

        <div class="overlay" id="start-screen">
            <h1 id="game-title">Retro Simulator</h1>
            <div class="rules-box">
                <h3>🎮 How to Play</h3>
                <ul>
                    <li>Use <strong>Left/Right Arrows</strong> or <strong>A/D</strong> to steer.</li>
                    <li>Avoid oncoming cars, trucks, and obstacles!</li>
                    <li>The longer you drive, the faster it gets.</li>
                </ul>
            </div>
            <button class="start-btn" id="start-btn">Start Race</button>
        </div>

        <div class="overlay" id="crash-screen" style="display: none;">
            <h1 class="crash-title">CRASHED!</h1>
            <div class="final-stats">
                <h2>Total Distance: <span id="final-distance">0</span> m</h2>
                <p>Final Score: <span id="final-score">0</span></p>
            </div>
            <div class="button-group">
                <button class="start-btn" id="restart-btn">Restart Race</button>
                <button class="menu-btn" id="menu-btn">Return to Menu</button>
            </div>
        </div>

        <div class="overlay" id="pause-screen" style="display: none;">
            <h1 id="game-title">PAUSED</h1>
            <div class="button-group">
                <button class="start-btn" id="resume-btn">Resume</button>
                <button class="start-btn" id="pause-restart-btn">Restart Race</button>
                <button class="menu-btn" id="pause-menu-btn">Return to Menu</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
