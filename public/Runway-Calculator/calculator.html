<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculator</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="previous">
    <a href="index.html" class="back"><-Back</a>
    <h1>Runway Calculator</h1>
    <div class="input">
      <label>Select Currency</label>
      <select id="currency">
        <option value="INR">₹ INR</option>
        <option value="USD">$ USD</option>
        <option value="EUR">€ EUR</option>
      </select>
    </div>
    <div class="input">
      <label>Total Cash on Hand (Rs.)</label>
      <input type="number" id="cash" placeholder="eg. 2000" />
    </div>
    <div class="input">
      <label>Monthly Burn Rate (Rs.)</label>
      <input type="number" id="burn" placeholder="eg. 2000" />
    </div>

    <button onclick="calculateRunway()">Calculate</button>
    <div id="result" class="result hidden">
      <h2 id="months"></h2>
      <p id="days"></p>
      <p id="status" class="status"></p>
      <p id="moneyInfo"></p>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
