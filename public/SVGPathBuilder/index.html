<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG Path Builder</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <header class="app-header">
            <h1>SVG Path Builder</h1>
            <p>Click to drop anchor points. Drag to adjust. Generate raw SVG code instantly.</p>
        </header>

        <main class="workspace">
            <div class="card canvas-container">
                <svg id="draw-canvas" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
                    <path id="svg-path" d="" fill="none" stroke="#E3E3E3" stroke-width="3" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
            </div>

            <div class="card controls-container">
                <div class="code-header">
                    <h2>Output Code</h2>
                    <div class="button-group">
                        <button id="clear-btn" class="btn secondary">Clear</button>
                        <button id="copy-btn" class="btn primary">Copy Code</button>
                    </div>
                </div>
                <div class="code-block-wrapper">
                    <pre><code id="code-output">&lt;svg&gt;...&lt;/svg&gt;</code></pre>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>

</html>
