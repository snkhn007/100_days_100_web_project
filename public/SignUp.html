<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sammu Trial Login Page</title>

    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
     rel="stylesheet" href="style.css" />
  

    <style>
      /* ── Reset & Base ── */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #0f172a, #1e293b, #2563eb);
        color: #f1f5f9;
        min-height: 100vh;
      }

      /* ── Navbar ── */
      .navbar {
        padding: 16px 24px;
        background: linear-gradient(135deg, #0f172a, #1e293b, #2563eb);
        backdrop-filter: blur(8px);
        position: sticky;
        top: 0;
        z-index: 10;
        border-bottom: 1px solid rgba(255,255,255,0.07);
      }

      .button {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 8px 18px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        font-size: 14px;
        font-weight: 600;
        text-decoration: none;
        transition: background 0.2s, transform 0.15s;
      }

      .home-btn {
        background: #6366f1;
        color: #fff;
      }
      .home-btn:hover { background: #4f46e5; transform: translateY(-1px); }

      /* ── Hero ── */
      .hero-section {
        max-width: 560px;
        margin: 40px auto;
        padding: 0 20px 60px;
        text-align: center;
      }

      .hero-title {
        font-size: clamp(1.6rem, 5vw, 2.4rem);
        font-weight: 800;
        background: linear-gradient(135deg, #a5b4fc, #818cf8);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 16px;
      }

      .hero-desc {
        font-size: 14px;
        line-height: 1.7;
        color: #94a3b8;
        margin-bottom: 36px;
      }

      /* ── Card ── */
      .auth-card {
        background: #1e293b;
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 16px;
        padding: 36px 32px;
        text-align: left;
      }

      .auth-title-1 {
        font-size: 1.5rem;
        font-weight: 700;
        color: #e2e8f0;
        margin-bottom: 28px;
        text-align: center;
      }

      /* ── Field wrapper: stable height ── */
      .field-wrap {
        margin-bottom: 8px; /* gap between fields */
      }

      .form-group {
        display: flex;
        align-items: center;
        gap: 10px;
        background:;
        border: 1.5px solid #334155;
        border-radius: 10px;
        padding: 11px 14px;
        transition: border-color 0.2s;
      }

      .form-group:focus-within { border-color: #6366f1; }
      .form-group.error        { border-color: #f87171; }
      .form-group.success      { border-color: #34d399; }

      .form-group i {
        color: #64748b;
        font-size: 14px;
        flex-shrink: 0;
        width: 16px;
        text-align: center;
      }

      .form-input {
        flex: 1;
        background: transparent;
        border: none;
        outline: none;
        color: #f1f5f9;
        font-size: 14px;
      }

      .form-input::placeholder { color: #475569; }

      /* ── Error message: fixed height so form never jumps ── */
      .error-msg {
        display: block;
        font-size: 11.5px;
        height: 18px;           /* always occupies this space */
        line-height: 18px;
        padding-left: 4px;
        color: #f87171;
        transition: opacity 0.2s;
      }
      .error-msg:empty { opacity: 0; }

      /* ── Submit ── */
      .signup-btn {
        width: 100%;
        background: #2563eb;
        justify-content: center;
        margin-top: 20px;
        padding: 12px;
        font-size: 15px;
        border-radius: 10px;
      }

      .already-signed-up {
        text-align: center;
        margin-top: 18px;
        font-size: 13px;
        color: #64748b;
      }
      .already-signed-up a { color: #818cf8; text-decoration: none; }
      .already-signed-up a:hover { text-decoration: underline; }

      /* ── Responsive ── */
      @media (max-width: 480px) {
        .auth-card { padding: 28px 18px; }
      }
    </style>
  </head>
  <body>
            <!-- Password -->
            <div class="field-wrap">
              <div class="form-group" id="grp-password">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" placeholder="Password" class="form-input" autocomplete="new-password" />
              </div>
              <span class="error-msg" id="err-password"></span>
            </div>

            <button type="submit" class="button home-btn signup-btn">
              Sign Up <i class="fa-solid fa-arrow-right"></i>
            </button>
          </form>

          <p class="already-signed-up">
            Already signed up? <a href="Login.html">Login</a>
          </p>
          
        </div>
      </div>
    </section>

    <script>
      /* ─── helpers ─── */
      const $ = id => document.getElementById(id);
      const emailRx   = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      const passwordRx = /^(?=.*[A-Z])(?=.*[0-9])(?=.*[!@#$%^&*]).{6,}$/;

      function setField(grpId, errId, msg) {
        const grp = $(grpId), err = $(errId);
        err.textContent = msg;
        grp.classList.toggle('error',   !!msg);
        grp.classList.toggle('success', !msg && grp.querySelector('input').value.trim() !== '');
      }

      /* ─── live validation ─── */
      $('name').addEventListener('input', () => {
        const v = $('name').value.trim();
        setField('grp-name', 'err-name',
          v.length === 0 ? '' :                     // blank while untouched — no error yet
          v.length < 3   ? 'Name must be at least 3 characters' : '');
      });

      $('username').addEventListener('input', () => {
        const v = $('username').value.trim();
        setField('grp-username', 'err-username',
          v.length === 0 ? '' :
          v.includes(' ') ? 'Username cannot contain spaces' :
          v.length < 4    ? 'Username must be at least 4 characters' : '');
      });

      $('email').addEventListener('input', () => {
        const v = $('email').value.trim();
        setField('grp-email', 'err-email',
          v.length === 0 ? '' :
          !emailRx.test(v) ? 'Enter a valid email address' : '');
      });

      $('password').addEventListener('input', () => {
        const v = $('password').value;
        if (v.length === 0) { setField('grp-password', 'err-password', ''); return; }
        const hints = [];
        if (!/[A-Z]/.test(v))          hints.push('uppercase letter');
        if (!/[0-9]/.test(v))          hints.push('number');
        if (!/[!@#$%^&*]/.test(v))     hints.push('special char (!@#$%^&*)');
        if (v.length < 6)              hints.push('6+ characters');
        setField('grp-password', 'err-password',
          hints.length ? 'Needs: ' + hints.join(', ') : '');
      });

      /* ─── submit ─── */
      $('signupForm').addEventListener('submit', e => {
        e.preventDefault();

        const name     = $('name').value.trim();
        const username = $('username').value.trim();
        const email    = $('email').value.trim();
        const password = $('password').value;

        let ok = true;

        if (name.length < 3) {
          setField('grp-name', 'err-name', 'Name must be at least 3 characters');
          ok = false;
        }
        if (username.includes(' ')) {
          setField('grp-username', 'err-username', 'Username cannot contain spaces');
          ok = false;
        } else if (username.length < 4) {
          setField('grp-username', 'err-username', 'Username must be at least 4 characters');
          ok = false;
        }
        if (!emailRx.test(email)) {
          setField('grp-email', 'err-email', 'Enter a valid email address');
          ok = false;
        }
        if (!passwordRx.test(password)) {
          setField('grp-password', 'err-password', 'Password does not meet requirements');
          ok = false;
        }

        if (!ok) return;

        if (localStorage.getItem(username)) {
          setField('grp-username', 'err-username', 'Username already taken');
          return;
        }

        localStorage.setItem(username, JSON.stringify({ name, email, password }));
        alert('Signup successful!');
        window.location.href = 'Login.html';
      });
    </script>
  </body>
</html>
