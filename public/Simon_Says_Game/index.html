<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simon Says Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="theme-toggle-wrapper">
  <label class="theme-switch">
    <input type="checkbox" id="theme-toggle" />
    <span class="theme-icon">🌙</span>
  </label>
</div>

  <h1>Simon Says</h1>
  <h2>Press Start to play</h2>
  <h3 id="highscore">High Score: 0</h3>

  <div class="controls">

  <button id="start-btn">▶ Start Game</button>

  <div class="toggle-group">
    <span class="toggle-label">⚡ Strict Mode</span>

    <label class="switch">
      <input type="checkbox" id="strict-toggle" />
      <span class="slider"></span>
    </label>
  </div>

</div>

  <div class="btn-container">
    <div class="line-one">
      <div class="btn red" id="red"></div>
      <div class="btn yellow" id="yellow"></div>
    </div>
    <div class="line-two">
      <div class="btn green" id="green"></div>
      <div class="btn purple" id="purple"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
