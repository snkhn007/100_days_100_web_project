<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistics Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dashboard">
        <h1>📊 Statistics Dashboard</h1>

        <div class="card">Total Games: <span id="totalGames">0</span></div>
        <div class="card">X Wins: <span id="xWins">0</span></div>
        <div class="card">O Wins: <span id="oWins">0</span></div>
        <div class="card">Draws: <span id="draws">0</span></div>
        <div class="card">Win Rate X: <span id="winRateX">0%</span></div>

        <button id="resetStats">Reset Stats</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
