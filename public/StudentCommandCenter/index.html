<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Command Center</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>
<a href="/" class="project-back-button" style="position:fixed;left:18px;top:18px;padding:8px 12px;border-radius:8px;background:white;text-decoration:none;z-index:9999;font-weight:700;font-family:Inter, system-ui, sans-serif;box-shadow:0 8px 20px rgba(0, 0, 0);">← Back to Home</a>


    <div class="container">

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <h2>Command Center</h2>

            <ul>
                <li class="active">Dashboard</li>
                <li><a href="tasks.html">Tasks</a></li>
                <li>Notes</li>
                <li>Focus Mode</li>
                <li>Settings</li>
            </ul>
            <div class="streak-box">
                <h3>🔥 Streak</h3>
                <p><span id="streak">7</span> Days</p>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="main-content">

            <!-- TOP BAR -->
            <div class="topbar">
                <div>
                    <h1>Hello Aditya 👋</h1>
                    <p id="date"></p>
                </div>

                <button id="themeToggle">🌙 Toggle Theme</button>
            </div>

            <!-- CARDS -->
            <div class="cards">

                <div class="card">
                    <h3>📚 Tasks</h3>
                    <p id="taskCount">0</p>
                </div>

                <div class="card">
                    <h3>⏳ Focus Time</h3>
                    <p>3h 20m</p>
                </div>

                <div class="card">
                    <h3>⚡ Productivity</h3>
                    <p>82%</p>
                </div>

            </div>

            <!-- TASK SECTION -->
            <section class="task-section">
                <div class="task-header">
                    <h2>Today's Tasks</h2>
                </div>

                <div class="task-input-box">
                    <input type="text" id="taskInput" placeholder="Enter your task..." />
                    <button id="addTaskBtn">Add Task</button>
                </div>

                <ul id="taskList"></ul>
            </section>

            <!-- NOTES SECTION -->
            <section class="notes-section">
                <h2>Quick Notes</h2>

                <textarea id="notesArea" placeholder="Write notes here..."></textarea>

                <button id="saveNotesBtn">Save Notes</button>
            </section>

            <!-- FOCUS TIMER -->
            <section class="focus-section">
                <h2>Pomodoro Timer</h2>

                <div class="timer-box">
                    <span id="minutes">25</span>
                    :
                    <span id="seconds">00</span>
                </div>

                <div class="timer-buttons">
                    <button id="startTimer">Start</button>
                    <button id="resetTimer">Reset</button>
                    <button id="pauseTimer">Pause</button>
                </div>
            </section>

        </main>

    </div>

    <script src="script.js"></script>
</body>
</html>
