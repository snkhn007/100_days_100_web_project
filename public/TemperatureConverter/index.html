<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Temperature Converter</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>
<a href="/" class="project-back-button" style="position:fixed;left:18px;top:18px;padding:8px 12px;border-radius:8px;background:white;text-decoration:none;z-index:9999;font-weight:700;font-family:Inter, system-ui, sans-serif;box-shadow:0 8px 20px rgba(0, 0, 0);">← Back to Home</a>

<div class="container">
  <h1>Temperature Converter</h1>
  
  <div class="box">
    <label>Celsius (°C)</label>
    <input type="number" id="celsius" placeholder="Enter temperature in Celsius">
  </div>

  <div class="box">
    <label>Fahrenheit (°F)</label>
    <input type="number" id="fahrenheit" placeholder="Enter temperature in Fahrenheit">
  </div>

  <div class="box">
    <label>Kelvin (K)</label>
    <input type="number" id="kelvin" placeholder="Enter temperature in Kelvin">
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
</html>
