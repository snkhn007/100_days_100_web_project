<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voice & Text Studio</title>
    <!-- Google Fonts for premium typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css" />
</head>
<body>

    <!-- Floating Theme Toggle -->
    <button id="theme-toggle" class="theme-btn" aria-label="Toggle dark mode">🌙</button>

    <!-- Top Navigation Bar / Back Button -->
    <header class="app-header">
        <a href="/" class="back-btn">← Back to Home</a>
        <div class="app-title-container">
            <h1 class="main-title">Voice & Text Studio</h1>
            <p class="subtitle">Convert text to high-quality audio or transcribe your voice instantly</p>
        </div>
    </header>

    <main class="wrapper">
        <!-- TEXT TO SPEECH CARD -->
        <section class="container card tts-card">
            <div class="card-header">
                <h2>🔊 Text to Speech</h2>
                <span class="status-badge" id="speaking-status">Ready</span>
            </div>
            
            <div class="input-group">
                <label for="tts-language">Select Language</label>
                <div class="select-wrapper">
                    <select id="tts-language"></select>
                </div>
            </div>

            <div class="input-group">
                <label for="voice-select">Select Voice</label>
                <div class="select-wrapper">
                    <select id="voice-select">
                        <option value="">Detecting voices...</option>
                    </select>
                </div>
            </div>

            <div class="input-group relative">
                <label for="text-input">Text Input</label>
                <textarea id="text-input" placeholder="Type or paste your text here..."></textarea>
                <div class="textarea-footer">
                    <span id="char-count">Characters: 0</span>
                </div>
            </div>

            <div class="btn-group">
                <button id="convert-btn" class="primary-btn">
                    <span class="btn-icon">▶</span> Convert to Speech
                </button>
                <button id="stop-btn-text" class="stop-btn" disabled>
                    <span class="btn-icon">■</span> Stop
                </button>
                <button id="clear-text" class="secondary-btn">
                    Clear
                </button>
            </div>
        </section>

        <!-- VOICE TO TEXT CARD -->
        <section class="container card stt-card">
            <div class="card-header">
                <h2>🎤 Speech to Text</h2>
                <span class="status-badge" id="listening-status">Ready</span>
            </div>
            
            <div class="input-group">
                <label for="stt-language">Select Language</label>
                <div class="select-wrapper">
                    <select id="stt-language"></select>
                </div>
            </div>

            <div class="input-group">
                <label for="output">Transcript Output</label>
                <textarea id="output" placeholder="Your spoken words will appear here in real-time..." readonly></textarea>
            </div>

            <div class="btn-group main-controls">
                <button id="start-btn" class="record-btn">
                    <span class="mic-dot"></span> Speak
                </button>
                <button id="stop-btn-voice" class="stop-btn" disabled>
                    <span class="btn-icon">■</span> Stop
                </button>
            </div>

            <div class="btn-group action-controls">
                <button id="copy-btn" class="action-btn">
                    <span class="btn-icon">📋</span> Copy
                </button>
                <button id="download-btn" class="action-btn">
                    <span class="btn-icon">📥</span> Download
                </button>
                <button id="clear-output" class="secondary-btn">
                    Clear
                </button>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
