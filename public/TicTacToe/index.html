<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
</head>
<body data-theme="neon">

<a href="/" class="project-back-button">
    ← Back to Home
</a>

<header class="hero">
    <h1 class="heading">
        TIC<span>TAC</span>TOE
    </h1>
    <p class="subheading">
        Neon grid. Smart moves. First to three wins the set.
    </p>

    <!-- THEME SELECTOR — moved here for visibility -->
    <div class="theme-bar">
        <span class="theme-label">🎨 Theme</span>
        <div class="theme-toggle-group" id="themeToggleGroup" role="group" aria-label="Select theme">
            <button class="theme-btn active" data-theme="neon" type="button">Neon</button>
            <button class="theme-btn" data-theme="pastel" type="button">Pastel</button>
            <button class="theme-btn" data-theme="mono" type="button">Mono</button>
        </div>
    </div>
</header>

<main class="container">
    <section class="panel">

        <!-- STATUS -->
        <div class="status-row">
            <div class="status" id="statusText">X's Turn</div>
            <div class="turn-chip" id="turnChip">Turn: X</div>
        </div>

        <!-- BOARD -->
        <div class="board-container">
            <div class="board" id="board">
                <!-- Cells generated by JS -->
            </div>
        </div>

        <!-- ACTION BUTTONS -->
        <div class="controls">
            <button class="btn-primary" id="newRoundBtn">New Round</button>
            <button class="btn-ghost" id="resetAllBtn">Reset Scores</button>
        </div>

        <!-- SCOREBOARD -->
        <div class="scoreboard">
            <div class="score-card" data-player="X">
                <span>Player X</span>
                <strong id="scoreX">0</strong>
            </div>
            <div class="score-card" data-player="O">
                <span>Player O</span>
                <strong id="scoreO">0</strong>
            </div>
            <div class="score-card" data-player="D">
                <span>Draws</span>
                <strong id="scoreD">0</strong>
            </div>
        </div>

        <!-- SETTINGS -->
        <details class="settings-box">
            <summary>⚙ Game Settings</summary>
            <div class="toolbar">
                <div class="field">
                    <span>Mode</span>
                    <select id="modeSelect">
                        <option value="pvp">Player vs Player</option>
                        <option value="cpu-easy">CPU Easy</option>
                        <option value="cpu-medium">CPU Medium</option>
                        <option value="cpu-hard">CPU Hard</option>
                    </select>
                </div>

                <!-- Theme select kept here for JS compatibility; hidden visually -->
                <select id="themeSelect" style="display:none;" aria-hidden="true">
                    <option value="neon">Neon</option>
                    <option value="pastel">Pastel</option>
                    <option value="mono">Mono</option>
                </select>

                <div class="toolbar-actions">
                    <button class="btn-ghost" id="hintBtn" type="button">Hint</button>
                    <button class="btn-ghost" id="undoBtn" type="button">Undo</button>
                </div>
            </div>
        </details>

        <!-- HISTORY -->
        <details class="history">
            <summary>Move History</summary>
            <ol id="historyList"></ol>
        </details>

    </section>
</main>

<!-- WINNER MODAL -->
<div class="winner-modal" id="winnerModal" aria-hidden="true">
    <div class="winner-card">
        <h2 id="winnerTitle">Player X Wins!</h2>
        <p id="winnerSubtitle">Ready for the next round?</p>
        <div class="winner-actions">
            <button id="winnerNext" class="btn-primary">Next Round</button>
            <button id="winnerClose" class="btn-ghost">Close</button>
        </div>
    </div>
</div>

<!-- CONFETTI -->
<canvas id="confetti"></canvas>

<footer class="footer">Neon Tic Tac Toe</footer>

<script src="script.js"></script>
</body>
</html>
