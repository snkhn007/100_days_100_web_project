<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Capsule</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Time Capsule</h1>
        <form id="capsuleForm">
            <textarea id="message" placeholder="Write a letter to your future self..." required></textarea>
            <label>Reveal in</label>
            <div class="time-row">
                <div class="time-unit">
                    <input type="number" id="hrs" min="0" max="999" value="0">
                    <span class="time-label">Hours</span>
                </div>
            <div class="time-sep">:</div>
            <div class="time-unit">
                <input type="number" id="mins" min="0" max="59" value="0">
                <span class="time-label">Minutes</span>
            </div>
             <div class="time-sep">:</div>
            <div class="time-unit">
                <input type="number" id="secs" min="0" max="59" value="30">
                <span class="time-label">Seconds</span>
            </div>
        </div>
    <div class="time-preview" id="preview">Reveals in 30 seconds</div>
    <p class="error" id="err"></p>
            <button type="submit">Seal the Capsule</button>
        </form>
        
        <div id="capsuleReveal" class="hidden">
            <h2>🔒 Capsule Sealed</h2>
            <p id="revealTime"></p>
        </div>
        <div id="messageReveal" class="hidden">
            <h2>📩 Message from the Past</h2>
            <p id="revealedMessage" style="color: red;"></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
