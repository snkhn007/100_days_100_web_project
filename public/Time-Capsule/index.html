
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Time Capsule</title>

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <link rel="stylesheet" href="style.css">
</head>
<body>
<a href="/" class="project-back-button" style="position:fixed;left:18px;top:18px;padding:8px 16px;border-radius:8px;background:#1e293b;color:#3b82f6;border:1px solid #3b82f6;text-decoration:none;z-index:9999;font-weight:700;font-family:Inter, system-ui, sans-serif;transition:all 0.2s ease;" onmouseover="this.style.background='#3b82f6';this.style.color='#fff'" onmouseout="this.style.background='#1e293b';this.style.color='#3b82f6'">← Back to Home</a>


    <div class="container">
      <h1>My Time Capsule</h1>
      <form id="capsuleForm">
        <textarea id="message" placeholder="Write a letter to your future self..." aria-label="Letter to your future self" required></textarea>
        
        <p class="time-heading">Reveal in</p>
        
        <div class="time-row">
          <div class="time-unit">
            <input type="number" id="hrs" min="0" max="999" value="0" aria-label="Hours to wait" />
            <span class="time-label" aria-hidden="true">Hours</span>
          </div>
          
          <div class="time-sep" aria-hidden="true">:</div>
          
          <div class="time-unit">
            <input type="number" id="mins" min="0" max="59" value="0" aria-label="Minutes to wait" />
            <span class="time-label" aria-hidden="true">Minutes</span>
          </div>
          
          <div class="time-sep" aria-hidden="true">:</div>
          
          <div class="time-unit">
            <input type="number" id="secs" min="0" max="59" value="30" aria-label="Seconds to wait" />
            <span class="time-label" aria-hidden="true">Seconds</span>
          </div>
        </div> <div class="time-preview" id="preview" aria-live="polite">Reveals in 30 seconds</div>
        <p class="error" id="err" role="alert"></p>
        <button type="submit">Seal the Capsule</button>
      </form>

      <div id="capsuleReveal" class="hidden" aria-live="assertive">
        <h2>🔒 Capsule Sealed</h2>
        <p id="revealTime"></p>
      </div>
      
      <div id="messageReveal" class="hidden" aria-live="assertive">
        <h2>📩 Message from the Past</h2>
        <div id="revealedMessage"></div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
