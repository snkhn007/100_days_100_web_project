<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Unit Converter</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>


<style>

<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
min-height:100vh;
font-family:'DM Sans',sans-serif;
background:linear-gradient(135deg,#667eea,#764ba2,#f093fb);
color:white;
}

.uc-wrap{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.glass-card{
width:100%;
max-width:700px;
background:rgba(255,255,255,.15);
backdrop-filter:blur(20px);
-webkit-backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.25);
border-radius:25px;
padding:30px;
box-shadow:0 20px 40px rgba(0,0,0,.2);
}

.top-bar{
display:flex;
justify-content:flex-end;
margin-bottom:20px;
}

.theme-selector{
display:flex;
align-items:center;
gap:8px;
}

.theme-selector select{
padding:8px 12px;
border:none;
border-radius:10px;
background:rgba(255,255,255,.2);
color:white;
}

.card-title{
display:flex;
align-items:center;
gap:10px;
font-size:40px;
font-weight:700;
margin-bottom:25px;
}

.tabs{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:25px;
}

.tab-btn{
flex:1;
min-width:100px;
padding:12px;
border:none;
border-radius:10px;
background:rgba(255,255,255,.1);
color:white;
cursor:pointer;
font-weight:600;
}

.tab-btn.active{
background:rgba(255,255,255,.3);
}

.field-group{
margin-bottom:18px;
}

.field-label{
margin-bottom:8px;
font-weight:600;
}

.row{
display:flex;
gap:12px;
}

.glass-input,
.glass-select{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:rgba(255,255,255,.15);
color:white;
outline:none;
}

.glass-input::placeholder{
color:rgba(255,255,255,.7);
}

.select-wrap{
flex:1;
}

.swap-row{
display:flex;
justify-content:center;
margin:15px 0;
}

.swap-btn{
width:50px;
height:50px;
border-radius:50%;
border:none;
background:rgba(255,255,255,.2);
color:white;
cursor:pointer;
font-size:20px;
}

.result-banner{
margin-top:20px;
padding:18px;
background:rgba(0,0,0,.15);
border-radius:12px;
text-align:center;
}

.history-section{
margin-top:25px;
padding:15px;
border-radius:12px;
background:rgba(0,0,0,.12);
}

.history-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

#clearHistoryBtn{
padding:8px 12px;
border:none;
border-radius:8px;
cursor:pointer;
}

.history-list{
display:flex;
flex-direction:column;
gap:10px;
}

.history-item{
padding:10px;
background:rgba(255,255,255,.1);
border-radius:8px;
}

.footer-note{
margin-top:20px;
text-align:center;
font-size:14px;
}

@media(max-width:768px){

.row{
flex-direction:column;
}

.tabs{
flex-direction:column;
}

.card-title{
font-size:30px;
}

.glass-card{
padding:20px;
}
}
</style>

</style>
<body class="aurora">

  <div class="uc-wrap">

    <div class="glass-card">

      <!-- Theme Selector -->
      <div class="top-bar">

        <div class="theme-selector">
          <i class="ti ti-palette"></i>

          <select id="themeSelect">
            <option value="aurora">Aurora</option>
            <option value="ocean">Ocean</option>
            <option value="emerald">Emerald</option>
            <option value="sunset">Sunset</option>
            <option value="midnight">Midnight</option>
          </select>
        </div>

      </div>

      <!-- Title -->
      <h1 class="card-title">
        <i class="ti ti-arrows-exchange"></i>
        Unit Converter
      </h1>

      <!-- Category Tabs -->
      <div class="tabs" id="tabs">

        <button class="tab-btn active" data-cat="length">
          <i class="ti ti-ruler"></i>
          Length
        </button>

        <button class="tab-btn" data-cat="weight">
          <i class="ti ti-barbell"></i>
          Weight
        </button>

        <button class="tab-btn" data-cat="temperature">
          <i class="ti ti-temperature"></i>
          Temp
        </button>

        <button class="tab-btn" data-cat="time">
          <i class="ti ti-clock-hour-4"></i>
          Time
        </button>

        <button class="tab-btn" data-cat="speed">
          <i class="ti ti-gauge"></i>
          Speed
        </button>

      </div>

      <!-- From Section -->
      <div class="field-group">

        <div class="field-label">
          From
        </div>

        <div class="row">

          <input
            class="glass-input"
            type="number"
            id="fromInput"
            value="1"
            placeholder="Enter value"
          >

          <div class="select-wrap">
            <select
              class="glass-select"
              id="fromUnit"
            ></select>
          </div>

        </div>

      </div>

      <!-- Swap Button -->
      <div class="swap-row">

        <button
          class="swap-btn"
          id="swapBtn"
          title="Swap Units"
          aria-label="Swap Units"
        >
          <i class="ti ti-arrows-up-down"></i>
        </button>

      </div>

      <!-- To Section -->
      <div class="field-group">

        <div class="field-label">
          To
        </div>

        <div class="row">

          <input
            class="glass-input"
            type="number"
            id="toInput"
            readonly
            placeholder="Converted value"
          >

          <div class="select-wrap">
            <select
              class="glass-select"
              id="toUnit"
            ></select>
          </div>

        </div>

      </div>

      <!-- Result Banner -->
      <div class="result-banner" id="output">
        Enter a value above
      </div>

      <!-- Conversion History -->
      <div class="history-section">

        <div class="history-header">

          <span>
            <i class="ti ti-history"></i>
            Recent Conversions
          </span>

          <button id="clearHistoryBtn">
            Clear
          </button>

        </div>

        <div id="historyList" class="history-list">

          <div class="history-empty">
            No conversions yet
          </div>

        </div>

      </div>

      <!-- Footer -->
      <div class="footer-note">
        <i class="ti ti-sparkles"></i>
        Fast • Accurate • Multi-Theme Converter
      </div>

    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
