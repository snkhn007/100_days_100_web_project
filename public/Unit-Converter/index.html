<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit Converter</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
<a href="/" class="project-back-button" style="position:fixed;left:18px;top:18px;padding:8px 12px;border-radius:8px;background:white;text-decoration:none;z-index:9999;font-weight:700;font-family:Inter, system-ui, sans-serif;box-shadow:0 8px 20px rgba(0, 0, 0);">← Back to Home</a>

    <div class="container">
        <div class="heading">
            <h1>Unit Converter</h1>
            <p>Convert between different units easily and accurately</p>
        </div>

        <div class="box">
            <div class="category" id="category">
                <button class="categories active" data-cat="length">Length</button>
                <button class="categories" data-cat="weight">Weight</button>
                <button class="categories" data-cat="temperature">Temperature</button>
                <button class="categories" data-cat="time">Time</button>
                <button class="categories" data-cat="speed">Speed</button>
            </div> 

            <div class="input-val">
                <div>
                <div class="input-label">From:</div>
                    <div class="input-section">
                        <input type="number" id="fromInput" class="input-value">
                        <select id="fromUnit" class="unit-select"></select>
                    </div>
                    <div class="input-hint"></div>
                </div>
                <div>
                <div class="input-label">To:</div>
                    <div class="input-section to-input">
                        <input type="number" id="toInput" readonly class="input-value">
                        <select id="toUnit" class="unit-select"></select>
                    </div>
                    <div class="input-hint"></div>
                </div>
            </div>
                <div class="result">
                    Result: 
                    <div id="output" class="output"></div>
                </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
