<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced AI Video Frame-Synthesizer Studio</title>
    <style>
        :root {
            --bg-studio: #07090e;
            --panel-matte: #0f131c;
            --neon-blue: #00b3ff;
            --neon-purple: #9d00ff;
            --neon-amber: #ffaa00;
            --border-dark: #1b2230;
            --text-bright: #e6edf3;
            --text-dim: #7d8590;
        }

        body {
            background-color: var(--bg-studio);
            color: var(--text-bright);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .studio-container {
            width: 100%;
            max-width: 1200px;
        }

        header h2 {
            margin: 0 0 20px 0;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
            -webkit-text-fill-color: transparent;
        }

        .editor-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (min-width: 900px) {
            .editor-grid {
                grid-template-columns: 7fr 5fr;
            }
        }

        .panel-card {
            background-color: var(--panel-matte);
            border: 1px solid var(--border-dark);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            font-size: 0.8rem;
            font-weight: bold;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .panel-header::before {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--neon-blue);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--neon-blue);
        }

        canvas {
            background-color: #030406;
            border: 1px solid var(--border-dark);
            border-radius: 4px;
            width: 100%;
            height: auto;
            aspect-ratio: 16 / 9;
        }

        .timeline-card {
            background-color: var(--panel-matte);
            border: 1px solid var(--border-dark);
            border-radius: 8px;
            padding: 20px;
            width: 100%;
            box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
        }

        .timeline-track-wrapper {
            background-color: #05070a;
            border: 1px solid var(--border-dark);
            border-radius: 4px;
            padding: 15px;
            position: relative;
            margin-top: 10px;
        }

        input[type="range"].scrubber {
            width: 100%;
            margin: 0;
            background: transparent;
            accent-color: var(--neon-purple);
            cursor: ew-resize;
        }

        .control-row {
            margin-bottom: 12px;
        }

        .control-row label {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        select,
        input[type="range"].slider {
            width: 100%;
            background: #090c12;
            border: 1px solid var(--border-dark);
            border-radius: 4px;
            padding: 8px;
            color: #fff;
            accent-color: var(--neon-blue);
        }

        .btn-studio {
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
            border: none;
            color: #fff;
            font-weight: bold;
            padding: 12px;
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
            transition: box-shadow 0.2s;
        }

        .btn-studio:hover {
            box-shadow: 0 0 15px rgba(157, 0, 255, 0.4);
        }

        .telemetry-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--border-dark);
            font-size: 0.9rem;
        }

        .telemetry-item:last-child {
            border-bottom: none;
        }

        .telemetry-val {
            font-family: monospace;
            font-weight: bold;
            color: var(--neon-blue);
        }
    </style>
</head>

<body>

    <div class="studio-container">
        <header>
            <h2>AI Neural-Frame Synthesis Studio</h2>
        </header>

        <div class="editor-grid">
            <div class="panel-card">
                <div class="panel-header">Synthesis Output Monitor</div>
                <canvas id="video-canvas" width="640" height="360"></canvas>
            </div>

            <div class="panel-card">
                <div class="panel-header">Synthesis Parameters Core</div>

                <div class="control-row">
                    <label><span>Chrono Interpolation Mode:</span></label>
                    <select id="interp-select">
                        <option value="sine">Sinusoidal Matrix Drift</option>
                        <option value="linear">Linear Linear Gradient Vector</option>
                        <option value="step">Quantized Binary Step</option>
                    </select>
                </div>

                <div class="control-row">
                    <label><span>Procedural Vector Frequency:</span><span id="freq-lbl">1.0x</span></label>
                    <input type="range" id="freq-slider" class="slider" min="1" max="50" value="10">
                </div>

                <button id="render-toggle" class="btn-studio">Compile Live Sequence Stream</button>

                <div class="panel-header" style="margin-top: 20px; margin-bottom: 8px;">Synthesis Telemetry</div>
                <div class="telemetry-item">
                    <span>Active Video Timestamp:</span>
                    <span id="tel-time" class="telemetry-val" style="color: var(--neon-amber);">0.00s</span>
                </div>
                <div class="telemetry-item">
                    <span>Frame Synthesis Execution Latency:</span>
                    <span id="tel-latency" class="telemetry-val">0.0000 ms</span>
                </div>
                <div class="telemetry-item">
                    <span>Generated Vector Resolution:</span>
                    <span id="tel-resolution" class="telemetry-val">640 x 360 (Pixel Array)</span>
                </div>
            </div>
        </div>

        <div class="timeline-card">
            <div class="panel-header">Chrono-Grid Master Sequence Timeline</div>
            <div class="timeline-track-wrapper">
                <input type="range" id="timeline-scrubber" class="scrubber" min="0" max="1000" value="0">
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>

</html>
