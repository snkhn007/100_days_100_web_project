<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enhanced CAPTCHA</title>
    <link rel="stylesheet" href="captcha.css">
    <link rel="icon" href="../favv.png" type="image/x-icon" />
</head>
<body>
    <div class="container">
        <header>CAPTCHA</header>
        <p>Select CAPTCHA type:</p>
        <div class="captcha-types">
            <button class="type-btn active" data-type="text">Text</button>
            <button class="type-btn active" data-type="image">Image</button>
            <button class="type-btn active" data-type="audio">Audio</button>
            <button class="type-btn active" data-type="math">Math</button>
        </div>
        <div id="captchaContainer"></div>
        <div class="captcha-input-group">
            <div class="textcaptcha">
                <input type="text" placeholder="Enter CAPTCHA">
            </div>
            <button class="refresh">↻</button>
        </div>
        <p class="result"></p>
        <div class="button">
            <button>Submit CAPTCHA</button>
        </div>
    </div>
    <script src="captcha.js"></script>
</body>
</html>
