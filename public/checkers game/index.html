<!doctype html>
<html lang="en">
  <head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta charset="UTF-8" />
    <title>Checkers Game</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Checkers Game</h1>

      <div class="controls">
        <button onclick="startGame('pvp')">Player vs Player</button>
        <button onclick="startGame('bot')">Player vs Bot</button>
        <button onclick="resetGame()">Reset</button>
      </div>

      <div id="status">Select a mode to start</div>

      <div id="board"></div>
    </div>

    <!-- Notification Modal -->
    <div id="notification-modal" class="modal" onclick="if(event.target === this) closeModal()">
      <div class="modal-content">
        <span class="close-button" onclick="closeModal()">&times;</span>
        <h2 id="modal-title">Game Over</h2>
        <p id="modal-message"></p>
        <button onclick="closeModal()">OK</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
