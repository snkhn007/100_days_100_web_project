<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Text Animation Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-mark">◈</span>
        <span class="logo-text">LayerText</span>
      </div>
      <p class="tagline">CSS layered text animation generator</p>
    </div>
  </header>

  <main class="app-shell">

    <!-- ── CONTROLS PANEL ── -->
    <aside class="controls-panel" aria-label="Animation controls">

      <section class="ctrl-section">
        <h2 class="ctrl-heading">Content</h2>

        <div class="ctrl-field">
          <label for="txt-input" class="ctrl-label">Phrase</label>
          <input type="text" id="txt-input" class="ctrl-text" value="CSS Text Animation" maxlength="40" placeholder="Type your phrase…" autocomplete="off" spellcheck="false">
        </div>
      </section>

      <section class="ctrl-section">
        <h2 class="ctrl-heading">Colors</h2>

        <div class="ctrl-field">
          <label for="bg-color" class="ctrl-label">Background</label>
          <div class="color-row">
            <input type="color" id="bg-color" value="#101010" title="Pick background color">
            <span class="hex-display" id="bg-hex">#101010</span>
          </div>
        </div>

        <div class="ctrl-field">
          <label for="txt-color" class="ctrl-label">Text / stroke</label>
          <div class="color-row">
            <input type="color" id="txt-color" value="#ffff00" title="Pick text color">
            <span class="hex-display" id="txt-hex">#ffff00</span>
          </div>
        </div>
      </section>

      <section class="ctrl-section">
        <h2 class="ctrl-heading">Layers</h2>

        <div class="ctrl-field">
          <div class="slider-header">
            <label for="layers" class="ctrl-label">Count</label>
            <output class="slider-val" id="layers-val" for="layers">9</output>
          </div>
          <input type="range" id="layers" min="3" max="15" step="1" value="9" aria-label="Number of layers">
        </div>
      </section>

      <section class="ctrl-section">
        <h2 class="ctrl-heading">Animation</h2>

        <div class="ctrl-field">
          <div class="slider-header">
            <label for="anim-dur" class="ctrl-label">Duration</label>
            <output class="slider-val" id="anim-dur-val" for="anim-dur">2.0s</output>
          </div>
          <input type="range" id="anim-dur" min="0.5" max="5" step="0.5" value="2" aria-label="Animation duration">
        </div>

        <div class="ctrl-field">
          <div class="slider-header">
            <label for="delay-offset" class="ctrl-label">Layer delay</label>
            <output class="slider-val" id="delay-val" for="delay-offset">−0.25s</output>
          </div>
          <input type="range" id="delay-offset" min="0.05" max="0.5" step="0.05" value="0.25" aria-label="Layer delay offset">
        </div>

        <div class="ctrl-field">
          <div class="slider-header">
            <label for="font-size" class="ctrl-label">Font size</label>
            <output class="slider-val" id="font-val" for="font-size">2.0rem</output>
          </div>
          <input type="range" id="font-size" min="1" max="5" step="0.25" value="2" aria-label="Font size">
        </div>
      </section>

    </aside>

    <!-- ── RIGHT COLUMN ── -->
    <div class="right-col">

      <!-- Live Preview -->
      <div class="preview-wrapper">
        <div class="preview-bar">
          <span class="section-eyebrow">Live preview</span>
          <div class="preview-dots" aria-hidden="true">
            <span></span><span></span><span></span>
          </div>
        </div>
        <div class="preview-stage" id="preview-stage" aria-live="polite" aria-label="Animation preview"></div>
      </div>

      <!-- Export -->
      <div class="export-wrapper">
        <span class="section-eyebrow">Export code</span>

        <div class="code-grid">
          <div class="code-block">
            <div class="code-block-header">
              <span class="code-lang">HTML</span>
              <button class="copy-btn" data-target="html-out" aria-label="Copy HTML code">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                <span>Copy</span>
              </button>
            </div>
            <textarea id="html-out" class="code-area" readonly spellcheck="false" aria-label="Generated HTML"></textarea>
          </div>

          <div class="code-block">
            <div class="code-block-header">
              <span class="code-lang">CSS</span>
              <button class="copy-btn" data-target="css-out" aria-label="Copy CSS code">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                <span>Copy</span>
              </button>
            </div>
            <textarea id="css-out" class="code-area" readonly spellcheck="false" aria-label="Generated CSS"></textarea>
          </div>
        </div>
      </div>

    </div>
  </main>

      </div>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
