<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Day 10 – Color Picker Tool</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0e0e0e; --card: #1a1a1a; --border: #2e2e2e;
      --accent: #f0f0f0; --muted: #666; --picked: #e94560;
    }
    body {
      background: var(--bg); color: var(--accent);
      font-family: 'Space Mono', monospace;
      min-height: 100vh; display: flex;
      flex-direction: column; align-items: center;
      justify-content: center; padding: 2rem;
    }
    header { text-align: center; margin-bottom: 2.5rem; }
    header .day-tag { font-size: 0.75rem; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; margin-bottom: 0.4rem; }
    header h1 { font-family: 'Syne', sans-serif; font-size: 3rem; font-weight: 800; }
    header h1 span { color: var(--picked); }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 1.25rem; padding: 2rem; width: 100%; max-width: 440px; }
    .preview-box { width: 100%; height: 160px; border-radius: 0.75rem; background: var(--picked); transition: background 0.2s; margin-bottom: 1.5rem; }
    .picker-row { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; }
    .picker-row label { font-size: 0.75rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
    input[type="color"] { width: 52px; height: 52px; border: none; border-radius: 50%; cursor: pointer; background: none; padding: 0; }
    input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
    input[type="color"]::-webkit-color-swatch { border: 3px solid var(--border); border-radius: 50%; }
    .values-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.75rem; margin-bottom: 1.5rem; }
    .value-block { background: var(--bg); border: 1px solid var(--border); border-radius: 0.6rem; padding: 0.6rem 0.75rem; }
    .value-block .label { font-size: 0.6rem; letter-spacing: 0.15em; color: var(--muted); text-transform: uppercase; margin-bottom: 0.3rem; }
    .value-block .val { font-size: 0.8rem; font-weight: 700; color: var(--accent); }
    .copy-btn { width: 100%; padding: 0.85rem; background: var(--picked); color: #fff; border: none; border-radius: 0.75rem; font-family: 'Space Mono', monospace; font-size: 0.85rem; font-weight: 700; text-transform: uppercase; cursor: pointer; }
    .history-label { font-size: 0.65rem; letter-spacing: 0.15em; color: var(--muted); text-transform: uppercase; margin: 1.5rem 0 0.75rem; }
    .history { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .history-swatch { width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--border); cursor: pointer; transition: transform 0.15s; }
    .history-swatch:hover { transform: scale(1.2); }
    .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--accent); color: var(--bg); font-family: 'Space Mono', monospace; font-size: 0.8rem; font-weight: 700; padding: 0.6rem 1.4rem; border-radius: 2rem; opacity: 0; transition: transform 0.3s ease, opacity 0.3s ease; pointer-events: none; }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  </style>
</head>
<body>
  <header>
    <p class="day-tag">Day 10 · 100 Web Projects</p>
    <h1>Color <span>Picker</span></h1>
  </header>
  <div class="card">
    <div class="preview-box" id="preview"></div>
    <div class="picker-row">
      <input type="color" id="colorInput" value="#e94560" />
      <label>Pick any color →</label>
    </div>
    <div class="values-grid">
      <div class="value-block"><div class="label">HEX</div><div class="val" id="hexVal">#e94560</div></div>
      <div class="value-block"><div class="label">RGB</div><div class="val" id="rgbVal">233,69,96</div></div>
      <div class="value-block"><div class="label">HSL</div><div class="val" id="hslVal">349°,80%,59%</div></div>
    </div>
    <button class="copy-btn" id="copyBtn">Copy HEX</button>
    <p class="history-label">Recent Colors</p>
    <div class="history" id="history"></div>
  </div>
  <div class="toast" id="toast">Copied!</div>
  <script>
    const colorInput = document.getElementById('colorInput');
    const preview = document.getElementById('preview');
    const hexVal = document.getElementById('hexVal');
    const rgbVal = document.getElementById('rgbVal');
    const hslVal = document.getElementById('hslVal');
    const copyBtn = document.getElementById('copyBtn');
    const historyEl = document.getElementById('history');
    const toast = document.getElementById('toast');
    let history = [];

    function hexToRgb(hex) {
      return { r: parseInt(hex.slice(1,3),16), g: parseInt(hex.slice(3,5),16), b: parseInt(hex.slice(5,7),16) };
    }
    function rgbToHsl(r,g,b) {
      r/=255; g/=255; b/=255;
      const max=Math.max(r,g,b), min=Math.min(r,g,b);
      let h,s,l=(max+min)/2;
      if(max===min){h=s=0;}
      else {
        const d=max-min;
        s=l>0.5?d/(2-max-min):d/(max+min);
        switch(max){case r:h=((g-b)/d+(g<b?6:0))/6;break;case g:h=((b-r)/d+2)/6;break;case b:h=((r-g)/d+4)/6;break;}
      }
      return {h:Math.round(h*360),s:Math.round(s*100),l:Math.round(l*100)};
    }
    function updateColor(hex) {
      const {r,g,b}=hexToRgb(hex);
      const {h,s,l}=rgbToHsl(r,g,b);
      preview.style.background=hex;
      copyBtn.style.background=hex;
      hexVal.textContent=hex.toUpperCase();
      rgbVal.textContent=`${r},${g},${b}`;
      hslVal.textContent=`${h}°,${s}%,${l}%`;
      if(!history.includes(hex)){history.unshift(hex);if(history.length>10)history.pop();renderHistory();}
    }
    function renderHistory() {
      historyEl.innerHTML='';
      history.forEach(c=>{
        const sw=document.createElement('div');
        sw.className='history-swatch';
        sw.style.background=c;
        sw.addEventListener('click',()=>{colorInput.value=c;updateColor(c);});
        historyEl.appendChild(sw);
      });
    }
    function showToast(msg){toast.textContent=msg;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),1800);}
    copyBtn.addEventListener('click',()=>navigator.clipboard.writeText(hexVal.textContent).then(()=>showToast('HEX Copied! ✓')));
    colorInput.addEventListener('input',e=>updateColor(e.target.value));
    updateColor('#e94560');
  </script>
</body>
</html>
