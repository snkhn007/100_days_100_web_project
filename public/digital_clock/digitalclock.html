<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Neon Digital Clock</title>

  <link rel="stylesheet" href="digitalclock.css" />
  <link rel="icon" href="../favv.png" type="image/x-icon" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap"
    rel="stylesheet"
  />
</head>

<body>

  <div class="background-glow"></div>

  <main class="clock-app">

    <div class="top-bar">
      <div class="live-dot"></div>
      <p>LIVE DIGITAL CLOCK</p>
    </div>

    <div class="clock-card">

      <div class="theme-badge" id="theme-label">
        CLASSIC MODE
      </div>

      <h1 id="day-name">Tuesday</h1>

      <p id="full-date">19 May 2026</p>

      <div class="clock-time">
        <span id="hours">12</span>
        <span class="colon">:</span>

        <span id="minutes">00</span>
        <span class="colon">:</span>

        <span id="seconds">00</span>

        <span id="ampm" class="ampm">PM</span>
      </div>

      <div class="bottom-info">

        <div class="info-box">
          <span class="info-title">Timezone</span>
          <span id="timezone-label">Local Time</span>
        </div>

        <div class="info-box">
          <span class="info-title">Alarm</span>
          <span id="alarm-status">Not Set</span>
        </div>

      </div>
    </div>

    <div class="controls-container">

      <div class="theme-buttons">

        <button
          class="theme-btn active classic-btn"
          onclick="setTheme('classic')"
        >
          Classic
        </button>

        <button
          class="theme-btn modern-btn"
          onclick="setTheme('modern')"
        >
          Modern
        </button>

        <button
          class="theme-btn futuristic-btn"
          onclick="setTheme('futuristic')"
        >
          Futuristic
        </button>

      </div>

      <div class="select-group">

        <label>Select Timezone</label>

        <select id="timezone" onchange="updateClock()">

          <option value="local">Local Time</option>
          <option value="UTC">UTC</option>
          <option value="America/New_York">New York</option>
          <option value="Europe/London">London</option>
          <option value="Asia/Kolkata">India</option>

        </select>

      </div>

      <div class="alarm-section">

        <button class="alarm-toggle-btn" onclick="toggleAlarmSection()">
          <b>Set Alarm</b>
        </button>

        <div class="alarm-controls hidden" id="alarm-controls">

          <input type="time" id="alarm-time" />

          <div class="alarm-actions">

            <button onclick="setAlarm()" class="confirm-btn">
              Confirm
            </button>

            <button onclick="clearAlarm()" class="clear-btn">
              Clear
            </button>

          </div>

        </div>

      </div>

    </div>

  </main>

  <div id="toast" class="toast">
    Alarm Set Successfully
  </div>

  <div id="alarm-popup" class="alarm-popup hidden">

    <div class="popup-card">

      <h2>⏰ Alarm Ringing!</h2>

      <p>Wake up! Your alarm time has arrived.</p>

      <button onclick="stopAlarm()">
        Stop Alarm
      </button>

    </div>

  </div>

  <audio id="alarm-sound" src="alarm.mp3"></audio>

  <script src="digitalclock.js"></script>

</body>
</html>
