<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chronos+ Home</title>

<link rel="stylesheet" href="digitalclock.css">
<link rel="icon" href="../favv.png" type="image/x-icon">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
    <a href="/">Back</a>
    <a href="digitalclock.html">Home</a>
    <a href="alarms.html">Alarms</a>
    <a href="history.html">History</a>
</nav>

<main class="clock-app">

    <!-- HERO CLOCK -->
    <article class="clock-card">

        <button
            class="dark-mode-btn"
            id="dark-mode-toggle"
            onclick="toggleDarkMode()">
            🌙
        </button>

        <span class="theme-badge" id="theme-label">
            CLASSIC
        </span>

        <div class="date-block">
            <p id="day-name"></p>
            <time id="full-date"></time>
        </div>

        <section class="clock-time">
            <span id="hours">00</span>
            <span class="colon">:</span>
            <span id="minutes">00</span>
            <span class="colon">:</span>
            <span id="seconds">00</span>
            <span id="ampm"></span>
        </section>

        <button id="format-toggle">
            24H
        </button>

        <footer class="bottom-info">

            <div class="info-tag">
                <span id="timezone-label">
                    Local Time
                </span>
            </div>

            <div class="info-tag">
                <span id="alarm-status">
                    None Active
                </span>
            </div>

        </footer>

    </article>

    <!-- WORLD CLOCKS -->
    <section class="card">

        <header class="card-header">
            <h2>World Clocks</h2>

            <button
                class="btn btn-sm btn-outline"
                onclick="toggleWorldClockModal()">
                + Add
            </button>
        </header>

        <div
            id="world-clocks-list"
            class="world-clocks-grid">
        </div>

    </section>

    <!-- POMODORO -->
    <section
        class="card"
        aria-labelledby="pomodoro-heading">

        <header class="card-header">
            <h2 id="pomodoro-heading">
                Pomodoro Timer
            </h2>
        </header>

        <div class="pomodoro-display">
            <span id="pomodoro-time">25:00</span>
        </div>

        <div class="pomodoro-controls">

            <button
                id="start-pomodoro"
                class="btn btn-primary">
                Start
            </button>

            <button
                id="pause-pomodoro"
                class="btn btn-outline">
                Pause
            </button>

            <button
                id="reset-pomodoro"
                class="btn btn-danger">
                Reset
            </button>

        </div>

        <p id="pomodoro-status">
            Focus Session
        </p>

    </section>

</main>

<footer class="site-footer">
    Chronos+ © 2026
</footer>

<script src="digitalclock.js"></script>

</body>
</html>
