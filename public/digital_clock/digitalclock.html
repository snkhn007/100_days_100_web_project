<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digital Clock</title>
  <link rel="stylesheet" href="digitalclock.css" />
</head>
<body>
  <main class="clock-container" role="main">
    <h1 class="sr-only">Digital Clock</h1>

    <!-- Clock Display -->
    <section aria-label="Current time display">
      <div
        id="clock"
        class="clock-display"
        role="timer"
        aria-live="polite"
        aria-atomic="true"
        aria-label="Current time"
      >
        00:00:00
      </div>
      <div id="date-display" class="date-display" aria-label="Current date"></div>
    </section>

    <!-- Alarm Section -->
    <section class="alarm-section" aria-label="Alarm settings">
      <h2 class="section-title">Set Alarm</h2>

      <div class="alarm-controls">
        <label for="alarm-time" class="sr-only">Set alarm time</label>
        <input
          type="time"
          id="alarm-time"
          class="alarm-input"
          aria-label="Alarm time"
        />

        <button
          id="set-alarm-btn"
          class="btn btn-primary"
          aria-label="Set alarm"
          onclick="setAlarm()"
        >
          Set Alarm
        </button>

        <button
          id="cancel-alarm-btn"
          class="btn btn-secondary"
          aria-label="Cancel alarm"
          onclick="cancelAlarm()"
          disabled
        >
          Cancel Alarm
        </button>
      </div>

      <!-- Alarm Status -->
      <div
        id="alarm-status"
        class="alarm-status"
        role="status"
        aria-live="polite"
        aria-atomic="true"
      ></div>

      <!-- Alarm Ring UI -->
      <div
        id="alarm-ring"
        class="alarm-ring hidden"
        role="alert"
        aria-live="assertive"
      >
        <p>⏰ Alarm Ringing!</p>
        <button
          class="btn btn-stop"
          aria-label="Stop alarm"
          onclick="stopAlarm()"
        >
          Stop Alarm
        </button>
      </div>
    </section>
  </main>

  <!-- Visually hidden utility class -->
  <style>
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>

  <script src="digitalclock.js"></script>
</body>
</html>
