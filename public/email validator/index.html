<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Email Validator</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <h1>Email Validator</h1>
      <p class="subtitle">
        Validate email addresses and check deliverability information.
      </p>

      <div class="input-group">
        <input type="email" id="username" placeholder="Enter email address" autocomplete="email" required />

        <button id="submitBtn" class="btn">Validate Email</button>
      </div>

      <!-- It Will now help in result rendering, error messages and loading messages -->
      <div id="resultCont" class="result-container" aria-live="polite"></div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
