<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker - History & Milestones</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<a href="/" class="project-back-button" style="position:fixed;left:18px;top:18px;padding:8px 12px;border-radius:8px;background:linear-gradient(90deg, rgba(124,99,255,0.14), rgba(79,141,255,0.10));color:#fff;text-decoration:none;z-index:9999;font-weight:700;font-family:Inter, system-ui, sans-serif;box-shadow:0 8px 20px rgba(12,18,40,0.35);">← Back to Home</a>

    <div class="app-container">
        <!-- Structural App Banner Container -->
        <header class="app-header">
            <div class="logo-group">
                <h1>Expense <span class="logo-accent">Tracker</span></h1>
                <p class="logo-subtext">Your money, kept simple.</p>
            </div>
            
            <div class="header-controls">
                <!-- Integrated Page Navigation System Context -->
                <nav class="nav-links-group">
                    <a href="index.html" class="nav-link">Transactions</a>
                    <a href="dashboard.html" class="nav-link">Dashboard</a>
                    <a href="history.html" class="nav-link active">History Log</a>
                </nav>

                <!-- Data Configuration System Tools -->
                <div class="utility-buttons">
                    <button id="btnExport" class="btn-secondary" aria-label="Copy backup pack">Backup</button>
                    <button id="btnReset" class="btn-danger" aria-label="Clear all tracker data">Clear All</button>
                </div>
            </div>
        </header>

        <!-- Main Content Area -->
         <section class="content-card history-section full-width-layout" style="margin-top: 24px;">
                <div class="history-controls-bar">
                    <h2>History Log</h2>
                    <div class="search-and-filter-tools">
                        <input type="text" id="searchBar" placeholder="Search entries..." aria-label="Search items text index">
                        <div class="filter-buttons-group">
                            <button class="filter-tab active" data-filter="All">Show All</button>
                            <button class="filter-tab" data-filter="Income">Income</button>
                            <button class="filter-tab" data-filter="Expense">Expenses</button>
                        </div>
                    </div>
                </div>

                <div class="table-scroller">
                    <table class="history-table">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Description</th>
                                <th>Category</th>
                                <th style="text-align: right;">Amount</th>
                                <th style="text-align: center;">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="transactionsBody"></tbody>
                    </table>
                    <div id="noTransactionsMessage" class="empty-state">
                        No matching records found. Try changing your search filters!
                    </div>
                </div>
            </section>
        </div>
    </div>

    <!-- Theme Handling -->
    <button id="themeToggle" class="floating-theme-btn" aria-label="Toggle Theme">🌓</button>
    <script src="expense.js"></script>
</body>
</html>
