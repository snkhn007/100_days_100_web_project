<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="../favv.png" type="image/x-icon" />
</head>
<body>
    <!-- Header Section -->
    <header class="header">
        <h1>Expense Tracker</h1>
    </header>

    <!-- Main Container -->
    <div class="container">
        <!-- Left Dashboard Panel -->
        <aside class="dashboard">
            <div class="dashboard-content">
                <!-- Account Balance Card -->
                <div class="card card-large">
                    <div class="card-label">Account Balance</div>
                    <div class="card-amount" id="accountBalance">₹0.00</div>
                </div>

                <!-- Two-column cards -->
                <div class="cards-row">
                    <div class="card card-small">
                        <div class="card-label">Total Income</div>
                        <div class="card-amount income-text" id="totalIncome">₹0.00</div>
                    </div>
                    <div class="card card-small">
                        <div class="card-label">Total Expense</div>
                        <div class="card-amount expense-text" id="totalExpense">₹0.00</div>
                    </div>
                </div>

                <!-- Category Breakdown -->
                <div class="category-section">
                    <h3>Category Breakdown</h3>
                    <div class="categories-list" id="categoriesList">
                        <div class="category-item">
                            <span class="category-name">Food</span>
                            <span class="category-amount" id="cat-Food">₹0.00</span>
                        </div>
                        <div class="category-item">
                            <span class="category-name">Travel</span>
                            <span class="category-amount" id="cat-Travel">₹0.00</span>
                        </div>
                        <div class="category-item">
                            <span class="category-name">Shopping</span>
                            <span class="category-amount" id="cat-Shopping">₹0.00</span>
                        </div>
                        <div class="category-item">
                            <span class="category-name">Utilities</span>
                            <span class="category-amount" id="cat-Utilities">₹0.00</span>
                        </div>
                        <div class="category-item">
                            <span class="category-name">Others</span>
                            <span class="category-amount" id="cat-Others">₹0.00</span>
                        </div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Right Transaction Form Panel -->
        <section class="form-section">
            <div class="form-container">
                <h2>Add Transaction</h2>
                <form id="transactionForm" class="transaction-form">
                    <div class="form-group">
                        <label for="amount">Amount *</label>
                        <input type="number" id="amount" placeholder="0.00" step="0.01" min="0" required>
                        <span class="error-message" id="amountError"></span>
                    </div>

                    <div class="form-group">
                        <label for="description">Description *</label>
                        <input type="text" id="description" placeholder="Enter description" required>
                        <span class="error-message" id="descriptionError"></span>
                    </div>

                    <div class="form-group">
                        <label for="type">Type *</label>
                        <div class="type-selector">
                            <input type="radio" id="type-income" name="type" value="Income" required>
                            <label for="type-income" class="type-label">Income</label>
                            
                            <input type="radio" id="type-expense" name="type" value="Expense" required>
                            <label for="type-expense" class="type-label">Expense</label>
                        </div>
                        <span class="error-message" id="typeError"></span>
                    </div>

                    <div class="form-group">
                        <label for="category">Category *</label>
                        <select id="category" required>
                            <option value="">Select a category</option>
                            <option value="Food">Food</option>
                            <option value="Travel">Travel</option>
                            <option value="Shopping">Shopping</option>
                            <option value="Utilities">Utilities</option>
                            <option value="Others">Others</option>
                        </select>
                        <span class="error-message" id="categoryError"></span>
                    </div>

                    <div class="form-group">
                        <label for="date">Date *</label>
                        <input type="date" id="date" required>
                        <span class="error-message" id="dateError"></span>
                        <span class="helper-message" id="dateHelper"></span>
                    </div>

                    <button type="submit" class="btn-submit">Add Transaction</button>
                </form>
            </div>
        </section>
    </div>

    <!-- Recent Transactions Panel -->
    <section class="transactions-section">
        <div class="transactions-container">
            <h2>Recent Transactions</h2>
            <div class="table-wrapper">
                <table class="transactions-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Description</th>
                            <th>Category</th>
                            <th>Amount</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="transactionsBody">
                        <!-- Transactions will be inserted here -->
                    </tbody>
                </table>
                <div id="noTransactionsMessage" class="no-transactions">
                    No transactions yet. Add one to get started!
                </div>
            </div>
        </div>
    </section>

    <script src="expense.js" defer></script>
</body>
</html>
