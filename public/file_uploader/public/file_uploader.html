<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FILE-UPLOADER</title>
  <link rel="stylesheet" href="file_uploader.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ── INLINE FALLBACK — works even without static middleware ── */
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0b0c0f;
      font-family: 'Syne', 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    /* Animated dot grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.07) 1px, transparent 1px);
      background-size: 28px 28px;
      animation: bgDrift 30s linear infinite;
      pointer-events: none;
      z-index: 0;
    }

    /* Glowing blobs */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 600px 400px at 70% 30%, rgba(99,255,180,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 500px 300px at 20% 80%, rgba(120,160,255,0.06) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
    }

    @keyframes bgDrift {
      0%   { transform: translateY(0) translateX(0); }
      50%  { transform: translateY(-14px) translateX(6px); }
      100% { transform: translateY(0) translateX(0); }
    }

    /* ── Container ── */
    .container {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    /* ── Card ── */
    .myform {
      background: rgba(14, 16, 21, 0.96);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 20px;
      padding: 48px 44px 40px;
      width: 460px;
      max-width: 96vw;
      display: grid;
      gap: 20px;
      justify-items: stretch;
      box-shadow:
        0 0 0 1px rgba(99,255,180,0.04),
        0 40px 100px rgba(0,0,0,0.75),
        inset 0 1px 0 rgba(255,255,255,0.05);
      animation: cardIn 0.65s cubic-bezier(0.16,1,0.3,1) both;
    }

    @keyframes cardIn {
      from { opacity:0; transform: translateY(36px) scale(0.96); }
      to   { opacity:1; transform: translateY(0) scale(1); }
    }

    /* ── Header ── */
    .form-header {
      text-align: center;
      padding-bottom: 4px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      margin-bottom: 6px;
    }

    .form-header .logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .form-header .logo-icon {
      width: 38px;
      height: 38px;
      background: linear-gradient(135deg, #63ffb4 0%, #3be8a0 100%);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      box-shadow: 0 4px 16px rgba(99,255,180,0.3);
    }

    .form-header h1 {
      font-size: 1.7rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      color: #fff;
      line-height: 1;
    }

    .form-header h1 span { color: #63ffb4; }

    .form-header p {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.03em;
      margin-top: 6px;
    }

    /* ── Field wrapper ── */
    .form-field {
      display: flex;
      flex-direction: column;
      gap: 7px;
      width: 100%;
    }

    .form-field label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.4);
    }

    /* ── Text inputs ── */
    input[type="text"] {
      width: 100%;
      padding: 13px 16px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.09);
      background: rgba(255,255,255,0.04);
      color: #fff;
      font-size: 0.93rem;
      font-family: inherit;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
      outline: none;
    }

    input[type="text"]::placeholder { color: rgba(255,255,255,0.18); }

    input[type="text"]:focus {
      border-color: rgba(99,255,180,0.45);
      background: rgba(99,255,180,0.03);
      box-shadow: 0 0 0 3px rgba(99,255,180,0.1);
    }

    /* ── Drop zone ── */
    .file-drop-zone {
      position: relative;
      width: 100%;
      border: 1.5px dashed rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 30px 20px 26px;
      text-align: center;
      cursor: pointer;
      transition: all 0.25s ease;
      background: rgba(255,255,255,0.02);
      overflow: hidden;
    }

    .file-drop-zone::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(99,255,180,0.08) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.25s;
    }

    .file-drop-zone:hover,
    .file-drop-zone.dragover {
      border-color: rgba(99,255,180,0.45);
      background: rgba(99,255,180,0.03);
    }

    .file-drop-zone:hover::before,
    .file-drop-zone.dragover::before { opacity: 1; }

    .drop-icon {
      font-size: 2.2rem;
      display: block;
      margin-bottom: 10px;
      transition: transform 0.25s ease;
    }

    .file-drop-zone:hover .drop-icon { transform: translateY(-4px) scale(1.1); }

    .drop-text { font-size: 0.85rem; color: rgba(255,255,255,0.38); line-height: 1.6; }
    .drop-text strong {
      display: block;
      color: #63ffb4;
      font-size: 0.92rem;
      font-weight: 700;
      margin-bottom: 2px;
    }

    /* Hidden file input stretched over drop zone */
    input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
      z-index: 2;
    }

    /* ── File chips ── */
    #file-preview {
      width: 100%;
      display: none;
      flex-direction: column;
      gap: 7px;
      max-height: 130px;
      overflow-y: auto;
    }

    #file-preview::-webkit-scrollbar { width: 3px; }
    #file-preview::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }

    .file-chip {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 13px;
      background: rgba(99,255,180,0.05);
      border: 1px solid rgba(99,255,180,0.13);
      border-radius: 8px;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.7);
      animation: chipSlide 0.22s ease both;
    }

    @keyframes chipSlide {
      from { opacity:0; transform: translateX(-10px); }
      to   { opacity:1; transform: translateX(0); }
    }

    .chip-icon { font-size: 1rem; flex-shrink: 0; }
    .chip-name { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .chip-size { color: rgba(255,255,255,0.28); flex-shrink:0; font-size:0.72rem; }

    /* ── Divider ── */
    .divider {
      width: 100%;
      height: 1px;
      background: rgba(255,255,255,0.05);
    }

    /* ── Submit button ── */
    input[type="submit"] {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #63ffb4 0%, #3be8a0 100%);
      color: #000;
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 20px rgba(99,255,180,0.2);
    }

    input[type="submit"]:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(99,255,180,0.35);
      background: linear-gradient(135deg, #7fffca 0%, #63ffb4 100%);
    }

    input[type="submit"]:active { transform: translateY(0); }
  </style>
</head>

<body>

  <div class="container">
    <form
      action="/upload"
      enctype="multipart/form-data"
      method="post"
      class="myform"
    >
      <!-- Header -->
      <div class="form-header">
        <div class="logo">
          <div class="logo-icon">⬆</div>
          <h1>File<span>Drop</span></h1>
        </div>
        <p>Upload your files securely &amp; instantly</p>
      </div>

      <!-- FirstName -->
      <div class="form-field">
        <label>FirstName</label>
        <input
          type="text"
          id="firstName"
          name="firstName"
          placeholder="Enter your firstname"
          required
        />
      </div>

      <!-- LastName -->
      <div class="form-field">
        <label>LastName</label>
        <input
          type="text"
          id="lastName"
          name="lastName"
          placeholder="Enter your lastname"
          required
        />
      </div>

      <!-- File upload -->
      <div class="form-field">
        <label>Upload file here</label>
        <div class="file-drop-zone" id="dropZone">
          <span class="drop-icon">📂</span>
          <div class="drop-text">
            <strong>Click to browse or drag &amp; drop</strong>
            Multiple files supported · Any format
          </div>
          <input
            type="file"
            id="myFile"
            name="myFile"
            multiple="true"
            onchange="showPreview(this)"
          />
        </div>
        <div id="file-preview"></div>
      </div>

      <div class="divider"></div>

      <!-- Submit -->
      <div class="form-field">
        <input type="submit" value="Upload Files →" />
      </div>

    </form>
  </div>

  <script>
    const dropZone = document.getElementById('dropZone');

    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', () => dropZone.classList.remove('dragover'));

    function showPreview(input) {
      const preview = document.getElementById('file-preview');
      preview.innerHTML = '';

      if (!input.files.length) { preview.style.display = 'none'; return; }

      preview.style.display = 'flex';

      Array.from(input.files).forEach((file, i) => {
        const kb = file.size / 1024;
        const size = kb < 1 ? file.size + ' B' : kb < 1024 ? kb.toFixed(1) + ' KB' : (kb/1024).toFixed(1) + ' MB';
        const ext = file.name.split('.').pop().toLowerCase();
        const icons = { pdf:'📄', png:'🖼️', jpg:'🖼️', jpeg:'🖼️', gif:'🖼️', mp4:'🎬', mov:'🎬', zip:'🗜️', rar:'🗜️', docx:'📝', doc:'📝', xlsx:'📊', xls:'📊', txt:'📃', js:'⚙️', py:'🐍' };
        const icon = icons[ext] || '📎';

        const chip = document.createElement('div');
        chip.className = 'file-chip';
        chip.style.animationDelay = (i * 0.06) + 's';
        chip.innerHTML = `<span class="chip-icon">${icon}</span><span class="chip-name">${file.name}</span><span class="chip-size">${size}</span>`;
        preview.appendChild(chip);
      });

      dropZone.querySelector('.drop-text').innerHTML = `
        <strong>✓ ${input.files.length} file${input.files.length > 1 ? 's' : ''} ready</strong>
        Click to change selection
      `;
    }
  </script>
</body>
<script>
  const fileInput = document.getElementById('myFile');
  const fileName = document.getElementById('file-name');
  const message = document.getElementById('message');
  const form = document.querySelector('.myform');

  fileInput.addEventListener('change', () => {
    const files = fileInput.files;

    if (files.length > 0) {
      const names = Array.from(files).map(file => file.name).join(', ');
      fileName.textContent = `Selected: ${names}`;
    } else {
      fileName.textContent = '';
    }
  });

  form.addEventListener('submit', (e) => {
    const files = fileInput.files;

    if (files.length === 0) {
      e.preventDefault();
      message.textContent = 'Please select at least one file.';
      message.style.color = 'red';
      return;
    }

    const maxSize = 5 * 1024 * 1024;

    for (let file of files) {
      if (file.size > maxSize) {
        e.preventDefault();
        message.textContent = 'File size must be below 5MB.';
        message.style.color = 'red';
        return;
      }
    }

    message.textContent = 'Files ready for upload!';
    message.style.color = 'green';
  });
</script>

</html>
