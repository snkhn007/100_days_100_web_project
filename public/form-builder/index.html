<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FormForge - Dark Form Builder</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container-fluid">
      <div class="row vh-100">
        <!-- Sidebar -->
        <div
          class="col-md-3 col-lg-2 bg-dark border-end p-3 overflow-auto"
          id="sidebar"
        >
          <h4 class="text-light mb-4">
            <i class="fas fa-wrench"></i> FormForge
          </h4>
          <p class="text-muted small mb-3">Drag or click to add fields</p>

          <div class="field-list">
            <div class="field-item" data-type="text">
              <i class="fas fa-font"></i> Text Input
            </div>
            <div class="field-item" data-type="email">
              <i class="fas fa-envelope"></i> Email
            </div>
            <div class="field-item" data-type="password">
              <i class="fas fa-lock"></i> Password
            </div>
            <div class="field-item" data-type="number">
              <i class="fas fa-hashtag"></i> Number
            </div>
            <div class="field-item" data-type="textarea">
              <i class="fas fa-align-left"></i> Textarea
            </div>
            <div class="field-item" data-type="select">
              <i class="fas fa-caret-square-down"></i> Select
            </div>
            <div class="field-item" data-type="checkbox">
              <i class="fas fa-check-square"></i> Checkbox
            </div>
            <div class="field-item" data-type="radio">
              <i class="fas fa-dot-circle"></i> Radio
            </div>
            <div class="field-item" data-type="date">
              <i class="fas fa-calendar"></i> Date
            </div>
          </div>
        </div>

        <!-- Canvas -->
        <div
          class="col-md-6 col-lg-7 bg-secondary p-4 overflow-auto"
          id="canvas-area"
        >
          <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="text-light mb-0">Form Canvas</h3>
            <div>
              <button
                class="btn btn-outline-light btn-sm me-2"
                id="btn-preview"
              >
                <i class="fas fa-eye"></i> Preview
              </button>
              <button class="btn btn-success btn-sm" id="btn-export">
                <i class="fas fa-download"></i> Export HTML
              </button>
            </div>
          </div>

          <div
            id="form-canvas"
            class="bg-dark p-4 rounded border border-secondary min-vh-100"
          >
            <div class="text-center text-muted py-5" id="empty-state">
              <i class="fas fa-plus-circle fa-3x mb-3"></i>
              <p>
                Click on a field from the sidebar to start building your form
              </p>
            </div>
          </div>
        </div>

        <!-- Properties Panel -->
        <div
          class="col-md-3 col-lg-3 bg-dark border-start p-3 overflow-auto"
          id="properties-panel"
        >
          <h5 class="text-light mb-3">Properties</h5>
          <div id="properties-content">
            <p class="text-muted">Select a field to edit its properties</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Preview Modal -->
    <div class="modal fade" id="previewModal" tabindex="-1">
      <div class="modal-dialog modal-lg">
        <div class="modal-content bg-dark text-light">
          <div class="modal-header">
            <h5 class="modal-title">Form Preview</h5>
            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body" id="preview-body">
            <!-- Form will be injected here -->
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Close
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
