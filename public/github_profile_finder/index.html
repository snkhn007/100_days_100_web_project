<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Profile Finder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <p class="eyebrow">GitHub Explorer</p>
        <h1>Profile Finder</h1>
        <p class="subtitle">
          Search any GitHub username and inspect their profile, stats, and recent repositories.
        </p>
      </div>

      <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle theme">
        <span id="themeIcon">☾</span>
      </button>
    </header>

    <section class="search-panel">
      <form id="searchForm" class="search-form" autocomplete="off">
        <label class="sr-only" for="usernameInput">GitHub username</label>
        <div class="input-wrap">
          <span class="input-icon">⌕</span>
          <input
            id="usernameInput"
            type="text"
            placeholder="Search GitHub username..."
            spellcheck="false"
          />
        </div>
        <button type="submit" class="search-btn">Search</button>
      </form>

      <p class="hint">
        Try:
        <button class="quick-btn" data-user="torvalds" type="button">torvalds</button>,
        <button class="quick-btn" data-user="gaearon" type="button">gaearon</button>
      </p>
    </section>

    <section id="statusBox" class="status hidden" aria-live="polite"></section>

    <section id="profileCard" class="profile-card hidden">
      <div class="profile-head">
        <img id="avatar" class="avatar" src="" alt="Profile avatar" />
        <div class="profile-main">
          <div class="name-row">
            <div>
              <h2 id="name">Name</h2>
              <p id="username" class="username">@username</p>
            </div>
            <a id="profileLink" class="visit-link" href="#" target="_blank" rel="noreferrer">View GitHub</a>
          </div>
          <p id="bio" class="bio"></p>
        </div>
      </div>

      <div class="meta-grid">
        <div class="meta-item">
          <span class="meta-label">Location</span>
          <span id="location" class="meta-value">—</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">Company</span>
          <span id="company" class="meta-value">—</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">Website</span>
          <span id="website" class="meta-value">—</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">Joined</span>
          <span id="joined" class="meta-value">—</span>
        </div>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <span class="stat-label">Repos</span>
          <strong id="repoCount">0</strong>
        </div>
        <div class="stat-card">
          <span class="stat-label">Followers</span>
          <strong id="followers">0</strong>
        </div>
        <div class="stat-card">
          <span class="stat-label">Following</span>
          <strong id="following">0</strong>
        </div>
        <div class="stat-card">
          <span class="stat-label">Gists</span>
          <strong id="gists">0</strong>
        </div>
      </div>
    </section>

    <section id="reposSection" class="repos-section hidden">
      <div class="section-title">
        <h3>Popular Repositories</h3>
        <p>Sorted by stars and recent activity</p>
      </div>
      <div id="reposList" class="repos-list"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
