<!DOCTYPE html>
<html lang="en">
<head>
<meta charset= "UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEND-MAIL</title>
<link rel="stylesheet" href="mail.css">
<link rel="icon" href="../../favv.png" type="image/x-icon" />

</head>
<body>

<div class="contact">
    <h3>Subscribe to our emails</h3>

    <p class="form-subtitle">
        Stay updated with our latest news, updates, and exclusive content.
    </p>

    <form method="POST" action="/">

        <div class="contact01">

            <label for="name">Full Name</label>

            <input
                class="email"
                id="name"
                name="name"
                type="text"
                placeholder="Enter your full name"
                required
                autocomplete="off"
            >

            <label for="email">Email Address</label>

            <input
                class="email"
                id="email"
                name="emailid"
                type="email"
                placeholder="Enter your email address"
                required
                autocomplete="off"
            >

        </div>

        <div class="contact02">
            <input
                class="submit"
                type="submit"
                name="submit"
                value="Subscribe Now"
            >
        </div>

    </form>
</div>


</body>
</html>
