<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jay Hind</title>
    <link href="../indianflag/flag.css" rel="stylesheet" />
    <link rel="icon" href="../favv.png" type="image/x-icon" />
  </head>

  <body>
    <div class="background-video">
      <video autoplay muted loop id="bg-video">
        <source
          src="https://media.istockphoto.com/id/1503396346/video/happy-indian-republic-day-creative-flag-design-background.mp4?s=mp4-640x640-is&k=20&c=sScbw69iYMiOdC9_KZ2L12EL43ke3lsggE9aK7StIt4="
          type="video/mp4"
        />
        Your browser does not support HTML5 video.
      </video>
    </div>

    <div class="wrapper">
      <div class="bar">
        <div class="bar-1"></div>
        <div class="bar-2"></div>
        <div class="bar-3"></div>
      </div>
      <div class="flag">
        <svg width="450" height="300" viewBox="0 0 700 330" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="clothShade" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="rgba(255,255,255,0.05)" />
      <stop offset="25%" stop-color="rgba(0,0,0,0.13)" />
      <stop offset="50%" stop-color="rgba(255,255,255,0.22)" />
      <stop offset="75%" stop-color="rgba(0,0,0,0.12)" />
      <stop offset="100%" stop-color="rgba(255,255,255,0.05)" />
    </linearGradient>

    <filter id="flagShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="10" flood-color="#000000" flood-opacity="0.25" />
    </filter>

    <clipPath id="flagClip">
      <path
        d="M0 0
           C90 18, 150 -18, 240 0
           C330 18, 390 -18, 480 0
           C570 18, 630 -12, 700 0
           L700 300
           C610 282, 540 318, 450 300
           C360 282, 300 318, 210 300
           C120 282, 70 318, 0 300
           Z">
        <animate
          attributeName="d"
          dur="2.6s"
          repeatCount="indefinite"
          values="
          M0 0 C90 18,150 -18,240 0 C330 18,390 -18,480 0 C570 18,630 -12,700 0 L700 300 C610 282,540 318,450 300 C360 282,300 318,210 300 C120 282,70 318,0 300 Z;
          M0 8 C90 -12,150 22,240 5 C330 -15,390 20,480 4 C570 -14,630 20,700 8 L700 292 C610 315,540 280,450 295 C360 315,300 280,210 295 C120 315,70 280,0 292 Z;
          M0 0 C90 18,150 -18,240 0 C330 18,390 -18,480 0 C570 18,630 -12,700 0 L700 300 C610 282,540 318,450 300 C360 282,300 318,210 300 C120 282,70 318,0 300 Z" />
      </path>
    </clipPath>
  </defs>

  <g filter="url(#flagShadow)">
    <g clip-path="url(#flagClip)">
      <rect x="0" y="0" width="700" height="100" fill="#ff671f" />
      <rect x="0" y="100" width="700" height="100" fill="#ffffff" />
      <rect x="0" y="200" width="700" height="100" fill="#046a38" />

      <g>
        <animateTransform
          attributeName="transform"
          type="translate"
          from="-120 0"
          to="120 0"
          dur="2s"
          repeatCount="indefinite" />

        <rect x="-120" y="0" width="120" height="300" fill="url(#clothShade)" />
        <rect x="0" y="0" width="120" height="300" fill="url(#clothShade)" />
        <rect x="120" y="0" width="120" height="300" fill="url(#clothShade)" />
        <rect x="240" y="0" width="120" height="300" fill="url(#clothShade)" />
        <rect x="360" y="0" width="120" height="300" fill="url(#clothShade)" />
        <rect x="480" y="0" width="120" height="300" fill="url(#clothShade)" />
        <rect x="600" y="0" width="120" height="300" fill="url(#clothShade)" />
        <rect x="720" y="0" width="120" height="300" fill="url(#clothShade)" />
      </g>

      <g transform="translate(350 150)">
        <g>
          <animateTransform
            attributeName="transform"
            type="translate"
            values="0 0; 0 5; 0 0"
            dur="2.4s"
            repeatCount="indefinite" />

          <circle cx="0" cy="0" r="36" fill="none" stroke="#000080" stroke-width="4" />
          <circle cx="0" cy="0" r="5" fill="#000080" />

          <g stroke="#000080" stroke-width="2">
            <line x1="0" y1="0" x2="0" y2="-36" transform="rotate(0)" />
            <line x1="0" y1="0" x2="0" y2="-36" transform="rotate(15)" />
            <line x1="0" y1="0" x2="0" y2="-36" transform="rotate(30)" />
            <line x1="0" y1="0" x2="0" y2="-36" transform="rotate(45)" />
            <line x1="0" y1="0" x2="0" y2="-36" transform="rotate(60)" />
            <line x1="0" y1="0" x2="0" y2="-36" transform="rotate(75)" />
            <line x1="0" y1="0" x2="0" y2="-36" transform="rotate(90)" />
            <line x1="0" y1="0" x2="0" y2="-36" transform="rotate(105)" />
            <line x1="0" y1="0" x2="0" y2="-36" transform="rotate(120)" />
            <line x1="0" y1="0" x2="0" y2="-36" transform="rotate(135)" />
            <line x1="0" y1="0" x2="0" y2="-36" transform="rotate(150)" />
            <line x1="0" y1="0" x2="0" y2="-36" transform="rotate(165)" />
            <line x1="0" y1="0" x2="0" y2="-36" transform="rotate(180)" />
            <line x1="0" y1="0" x2="0" y2="-36" transform="rotate(195)" />
            <line x1="0" y1="0" x2="0" y2="-36" transform="rotate(210)" />
            <line x1="0" y1="0" x2="0" y2="-36" transform="rotate(225)" />
            <line x1="0" y1="0" x2="0" y2="-36" transform="rotate(240)" />
            <line x1="0" y1="0" x2="0" y2="-36" transform="rotate(255)" />
            <line x1="0" y1="0" x2="0" y2="-36" transform="rotate(270)" />
            <line x1="0" y1="0" x2="0" y2="-36" transform="rotate(285)" />
            <line x1="0" y1="0" x2="0" y2="-36" transform="rotate(300)" />
            <line x1="0" y1="0" x2="0" y2="-36" transform="rotate(315)" />
            <line x1="0" y1="0" x2="0" y2="-36" transform="rotate(330)" />
            <line x1="0" y1="0" x2="0" y2="-36" transform="rotate(345)" />
          </g>
        </g>
      </g>
    </g>
  </g>
</svg>
      </div>

      <div class="quote-container">
        <img id="patriot-image" src="" alt="Patriot Image" width="150px" />
        <div class="quote">"Give me blood and I will give you freedom."</div>
        <div class="author">- Subhas Chandra Bose</div>
        <div class="quote-nav">
          <button id="prev-quote">&#8592;</button>
          <button id="next-quote">&#8594;</button>
        </div>
      </div>
    </div>

    <script>
      // JavaScript for quote navigation
      const quotes = [
        {
          text: '"Give me blood and I will give you freedom."',
          author: "- Subhas Chandra Bose",
          image: "./img/subhas_bose.png",
        },
        {
          text: '"Swaraj is my birthright and I shall have it."',
          author: "- Bal Gangadhar Tilak",
          image: "./img/bal_tilak.png",
        },
        {
          text: '"Inquilab Zindabad."',
          author: "- Bhagat Singh",
          image: "./img/bhagat_singh.jpg",
        },
        {
          text: '"Jai Jawan Jai Kisan."',
          author: "- Lal Bahadur Shastri",
          image: "./img/lal_bahadur.png",
        },
        {
          text: '"Jai Hind!"',
          author: "- Netaji Subhas Chandra Bose",
          image: "./img/subhas_bose.png",
        },
        {
          text: '"Sarfaroshi ki tamanna ab hamare dil mein hai."',
          author: "- Ram Prasad Bismil",
          image: "./img/ram_prasad.png",
        },
        {
          text: '"Dushman ki goliyon ka hum samna karenge, Azad hee rahein hain, azad hee rahenge."',
          author: "- Chandrashekhar Azad",
          image: "./img/azad.png",
        },
        {
          text: '"Satyameva Jayate."',
          author: "- Pandit Madan Mohan Malaviya",
          image: "./img/pandit_madan_mohan.webp",
        },
        {
          text: '"Sarvodaya, Samaj Sudharak, Samaj Sevak."',
          author: "- Mahatma Gandhi",
          image: "./img/gandhi.png",
        },
        {
          text: '"Karo ya maro."',
          author: "- Mahatma Gandhi",
          image: "./img/gandhi.png",
        },
      ];
      let currentQuoteIndex = 0;

      const quoteText = document.querySelector(".quote");
      const quoteAuthor = document.querySelector(".author");
      const patriotImage = document.getElementById("patriot-image");

      function displayQuote() {
        quoteText.textContent = quotes[currentQuoteIndex].text;
        quoteAuthor.textContent = quotes[currentQuoteIndex].author;
        patriotImage.src = quotes[currentQuoteIndex].image;
        patriotImage.alt = quotes[currentQuoteIndex].author;
      }

      displayQuote();

      document.getElementById("prev-quote").addEventListener("click", () => {
        currentQuoteIndex =
          (currentQuoteIndex - 1 + quotes.length) % quotes.length;
        displayQuote();
      });

      document.getElementById("next-quote").addEventListener("click", () => {
        currentQuoteIndex = (currentQuoteIndex + 1) % quotes.length;
        displayQuote();
      });
    </script>
  </body>
</html>
