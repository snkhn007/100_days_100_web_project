<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roast My Code - Terminal</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet">
</head>

<body>
<a href="/" class="project-back-button" style="position:fixed;left:18px;top:18px;padding:8px 12px;border-radius:8px;background:linear-gradient(90deg, rgba(124,99,255,0.14), rgba(79,141,255,0.10));color:#fff;text-decoration:none;z-index:9999;font-weight:700;font-family:Inter, system-ui, sans-serif;box-shadow:0 8px 20px rgba(12,18,40,0.35);">← Back to Home</a>

    <div class="terminal-container">
        <div class="terminal-header">
            <div class="window-controls">
                <span class="control red"></span>
                <span class="control yellow"></span>
                <span class="control green"></span>
            </div>
            <div class="window-title">bash -- user@macbook -- 80x24</div>
        </div>

        <div class="terminal-body" id="terminalBody">
            <div id="outputArea">
                <div class="system-msg">Welcome to RoastOS v1.0.0</div>
                <div class="system-msg">Type <span class="highlight">'help'</span> to see a list of available commands.
                </div>
                <br>
            </div>

            <div class="input-line">
                <span class="prompt">user@macbook ~ % </span>
                <input type="text" id="commandInput" autocomplete="off" spellcheck="false" autofocus>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
