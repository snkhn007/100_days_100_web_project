<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maths Quiz Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<a href="/" class="project-back-button" style="position:fixed;left:18px;top:18px;padding:8px 12px;border-radius:8px;background:white;text-decoration:none;z-index:9999;font-weight:700;font-family:Inter, system-ui, sans-serif;box-shadow:0 8px 20px rgba(0, 0, 0);">← Back to Home</a>

    <div class="quiz-container">
        <div id="difficulty-screen">
            <h1>Maths Quiz Game</h1>
            <p>Select Difficulty:</p>
            <button onclick="startGame('easy')">Easy</button>
            <button onclick="startGame('medium')">Medium</button>
            <button onclick="startGame('hard')">Hard</button>
        </div>
       <div id="game-screen" style="display: none;">
    <h1>Maths Quiz Game</h1>

    <button id="restart-btn"
        onclick="restartQuiz()">Restart</button>

    <div id="score-container">
        Score: <span id="score">0</span>
    </div>

    <div id="timer">Time: 30s</div>

    <div id="question-box">
        Loading question...
    </div>

    <div id="options-box"
        class="options-grid">
    </div>
</div>
        <div id="gameover-screen" style="display: none;">
            <h1>Game Over!</h1>
            <p>Final Score: <span id="final-score">0</span></p>
            <p>High Score: <span id="final-high-score">0</span></p>
            <button onclick="backToMenu()">Play Again</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
