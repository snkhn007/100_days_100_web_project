<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minimalist Visual Kanban Board</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" href="image.png">
    <script>
      (function () {
        const savedTheme = localStorage.getItem("theme");
        const systemTheme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        document.documentElement.setAttribute("data-theme", savedTheme || systemTheme);
      })();
    </script>
  </head>
  <body>
    <div class="kanban-workspace">
      <header class="workspace-header">
        <div class="header-content">
          <h1>Agile Kanban Workspace</h1>
          <p>Drag and drop tasks across production stages</p>
        </div>
        <div class="workspace-header-actions">
          <button id="themeToggleBtn" class="theme-toggle-btn" aria-label="Toggle Theme">
            <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="5"></circle>
              <line x1="12" y1="1" x2="12" y2="3"></line>
              <line x1="12" y1="21" x2="12" y2="23"></line>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
              <line x1="1" y1="12" x2="3" y2="12"></line>
              <line x1="21" y1="12" x2="23" y2="12"></line>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
            <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
          </button>
          <button id="addCardBtn" class="action-btn-primary">
            + Add New Task
          </button>
        </div>
      </header>

      <main class="kanban-board-grid">
        <section class="kanban-lane" data-lane="todo">
          <div class="lane-header color-todo">
            <h2>To Do</h2>
            <span class="lane-counter" id="todo-count">0</span>
          </div>
          <div class="lane-dropzone" id="todo-lane"></div>
        </section>

        <section class="kanban-lane" data-lane="progress">
          <div class="lane-header color-progress">
            <h2>In Progress</h2>
            <span class="lane-counter" id="progress-count">0</span>
          </div>
          <div class="lane-dropzone" id="progress-lane"></div>
        </section>

        <section class="kanban-lane" data-lane="done">
          <div class="lane-header color-done">
            <h2>Done</h2>
            <span class="lane-counter" id="done-count">0</span>
          </div>
          <div class="lane-dropzone" id="done-lane"></div>
        </section>
      </main>
    </div>

    <div class="modal-overlay" id="cardModal">
      <div class="modal-card">
        <h3>Create Workspace Task</h3>
        <div class="form-group">
          <label for="taskTitle">Task Title</label>
          <input
            type="text"
            id="taskTitle"
            placeholder="Enter task objective..."
            maxlength="50"
          />
        </div>
        <div class="form-group">
          <label for="taskTag">Color Identifier Tag</label>
          <select id="taskTag">
            <option value="tag-blue">Blue (Feature)</option>
            <option value="tag-purple">Purple (Research)</option>
            <option value="tag-amber">Amber (Urgent)</option>
            <option value="tag-emerald">Emerald (Optimization)</option>
          </select>
        </div>
        <div class="modal-actions">
          <button id="cancelModalBtn" class="action-btn-secondary">
            Cancel
          </button>
          <button id="submitCardBtn" class="action-btn-primary">
            Confirm Task
          </button>
        </div>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
