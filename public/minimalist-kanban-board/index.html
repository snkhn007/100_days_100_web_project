<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minimalist Visual Kanban Board</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="kanban-workspace">
      <header class="workspace-header">
        <div class="header-content">
          <h1>Agile Kanban Workspace</h1>
          <p>Drag and drop tasks across production stages</p>
        </div>
        <button id="addCardBtn" class="action-btn-primary">
          + Add New Task
        </button>
      </header>

      <main class="kanban-board-grid">
        <section class="kanban-lane" data-lane="todo">
          <div class="lane-header color-todo">
            <h2>To Do</h2>
            <span class="lane-counter" id="todo-count">0</span>
          </div>
          <div class="lane-dropzone" id="todo-lane"></div>
        </section>

        <section class="kanban-lane" data-lane="progress">
          <div class="lane-header color-progress">
            <h2>In Progress</h2>
            <span class="lane-counter" id="progress-count">0</span>
          </div>
          <div class="lane-dropzone" id="progress-lane"></div>
        </section>

        <section class="kanban-lane" data-lane="done">
          <div class="lane-header color-done">
            <h2>Done</h2>
            <span class="lane-counter" id="done-count">0</span>
          </div>
          <div class="lane-dropzone" id="done-lane"></div>
        </section>
      </main>
    </div>

    <div class="modal-overlay" id="cardModal">
      <div class="modal-card">
        <h3>Create Workspace Task</h3>
        <div class="form-group">
          <label for="taskTitle">Task Title</label>
          <input
            type="text"
            id="taskTitle"
            placeholder="Enter task objective..."
            maxlength="50"
          />
        </div>
        <div class="form-group">
          <label for="taskTag">Color Identifier Tag</label>
          <select id="taskTag">
            <option value="tag-blue">Blue (Feature)</option>
            <option value="tag-purple">Purple (Research)</option>
            <option value="tag-amber">Amber (Urgent)</option>
            <option value="tag-emerald">Emerald (Optimization)</option>
          </select>
        </div>
        <div class="modal-actions">
          <button id="cancelModalBtn" class="action-btn-secondary">
            Cancel
          </button>
          <button id="submitCardBtn" class="action-btn-primary">
            Confirm Task
          </button>
        </div>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
