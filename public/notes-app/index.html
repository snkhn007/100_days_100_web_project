<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">  
  <title>Midnight Notes | GSSoC '26</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.0.0/css/line.css">
</head>
<body>
  <div class="header-container">
    <h1 class="main-title">Notes Archive</h1>
    <div class="search-bar">
      <i class="uil uil-search"></i>
      <input type="text" id="search-input" placeholder="Search your digital brain...">
    </div>
  </div>
  
  <div class="popup-box">
    <div class="popup">
      <div class="content">
        <header>
          <p id="modalTitleText" style="color: #00f2fe;"></p>
          <i class="uil uil-times" id="closePopup"></i>
        </header>
        <div class="form-container">
          <div class="row">
            <label>Title</label>
            <input type="text" id="titleInput" placeholder="Give it a name...">
          </div>
          <div class="row main-desc-row">
            <label>Description</label>
            <textarea id="descInput" placeholder="Deep dive into your thoughts here..."></textarea>
          </div>
          <div class="row" id="passRow">
            <label>Security Pin</label>
            <input type="password" id="passInput" placeholder="Secret Pin (Optional)">
          </div>
          <div class="footer-buttons">
            <button id="deleteBtn" class="danger-btn">Discard</button>
            <button id="editToggleBtn" class="secondary-btn">Unlock Edit</button>
            <button id="submitBtn" class="primary-btn">Save Memory</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="wrapper">
    <li class="add-box">
      <div class="icon"><i class="uil uil-plus"></i></div>
      <p>New Note</p>
    </li>
  </div>

  <script src="script.js"></script>
</body>
</html>
