<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Animated Background -->
    <canvas id="bgCanvas" class="background-canvas"></canvas>

    <div
      class="container d-flex justify-content-center align-items-center min-vh-100"
    >
      <div class="card shadow-xl" id="resetCard">
        <div class="card-body p-5">
          <div class="text-center mb-4">
            <div
              class="mx-auto mb-3 d-flex justify-content-center align-items-center"
              style="
                width: 60px;
                height: 60px;
                background: rgba(103, 126, 234, 0.15);
                border-radius: 50%;
              "
            >
              <i class="bi bi-shield-lock-fill text-primary fs-1"></i>
            </div>
            <h2 class="fw-bold text-white">Reset Password</h2>
            <p class="text-light-50">
              Create a strong new password for your account
            </p>
          </div>

          <form id="resetForm" novalidate>
            <!-- Username or Email -->
            <div class="mb-3">
              <label for="username" class="form-label text-light"
                >Username or Email</label
              >
              <div class="input-group">
                <span class="input-group-text">
                  <i class="bi bi-person-fill"></i>
                </span>
                <input
                  type="text"
                  class="form-control"
                  id="username"
                  placeholder="Enter username or email"
                  required
                />
              </div>
              <div class="invalid-feedback">Username or Email is required.</div>
            </div>

            <!-- New Password -->
            <div class="mb-3">
              <label for="newPassword" class="form-label text-light"
                >New Password</label
              >
              <div class="input-group">
                <span class="input-group-text">
                  <i class="bi bi-lock-fill"></i>
                </span>
                <input
                  type="password"
                  class="form-control"
                  id="newPassword"
                  placeholder="Enter new password"
                  required
                />
                <button
                  class="btn btn-outline-light toggle-password"
                  type="button"
                  data-target="newPassword"
                >
                  <i class="bi bi-eye"></i>
                </button>
              </div>
              <div class="invalid-feedback" id="passwordFeedback">
                Password must be at least 8 characters.
              </div>

              <!-- Password Strength -->
              <div id="passwordStrength" class="password-strength mt-2 d-none">
                <div class="strength-bar"></div>
              </div>
            </div>

            <!-- Confirm Password -->
            <div class="mb-4">
              <label for="confirmPassword" class="form-label text-light"
                >Confirm New Password</label
              >
              <div class="input-group">
                <span class="input-group-text">
                  <i class="bi bi-lock-fill"></i>
                </span>
                <input
                  type="password"
                  class="form-control"
                  id="confirmPassword"
                  placeholder="Confirm new password"
                  required
                />
                <button
                  class="btn btn-outline-light toggle-password"
                  type="button"
                  data-target="confirmPassword"
                >
                  <i class="bi bi-eye"></i>
                </button>
              </div>
              <div class="invalid-feedback" id="confirmFeedback">
                Passwords do not match.
              </div>
            </div>

            <button
              type="submit"
              id="submitBtn"
              class="btn btn-primary w-100 py-3 fw-semibold"
            >
              Reset Password
            </button>
          </form>

          <!-- Success Message -->
          <div
            id="successMessage"
            class="alert alert-success mt-4 d-none text-center"
          >
            <i class="bi bi-check-circle-fill fs-1 mb-2"></i><br />
            <strong>Password Reset Successful!</strong><br />
            <small class="text-success-emphasis"
              >You can now login with your new password.</small
            >
          </div>

          <div class="text-center mt-4">
            <a href="#" class="text-light-50 text-decoration-none small">
              ← Back to Login
            </a>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
