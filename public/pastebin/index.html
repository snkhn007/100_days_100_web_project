<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pastebin - Share Code Snippets</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/atom-one-dark.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0f172a;
            color: #e2e8f0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid #334155;
            margin-bottom: 40px;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-actions {
            display: flex;
            gap: 15px;
        }

        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #2563eb;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }

        .btn-secondary {
            background: #475569;
        }

        .btn-secondary:hover {
            background: #334155;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 40px;
        }

        .section {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            overflow: hidden;
        }

        .section-header {
            background: #0f172a;
            padding: 15px 20px;
            border-bottom: 1px solid #334155;
            font-weight: 600;
            font-size: 16px;
        }

        .section-content {
            padding: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
            color: #cbd5e1;
        }

        input[type="text"],
        select,
        textarea {
            width: 100%;
            padding: 12px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 6px;
            color: #e2e8f0;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            resize: none;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        textarea {
            height: 300px;
            font-family: 'Courier New', monospace;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group:last-child {
            margin-bottom: 0;
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-full {
            flex: 1;
        }

        #output {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 6px;
            padding: 20px;
            min-height: 300px;
            overflow-x: auto;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.5;
            color: #e2e8f0;
        }

        #output code {
            background: none;
            padding: 0;
            color: inherit;
        }

        .info-box {
            background: #1e293b;
            border-left: 4px solid #3b82f6;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
            line-height: 1.6;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 30px;
        }

        .stat-card {
            background: #1e293b;
            border: 1px solid #334155;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #3b82f6;
        }

        .stat-label {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 5px;
            text-transform: uppercase;
        }

        .highlight {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 6px;
            padding: 15px;
            overflow-x: auto;
        }

        .highlight pre {
            margin: 0;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            header {
                flex-direction: column;
                text-align: center;
                gap: 15px;
            }

            .header-actions {
                width: 100%;
                justify-content: center;
            }
        }

        .copy-btn {
            padding: 8px 12px;
            font-size: 12px;
            background: #475569;
            float: right;
            margin-bottom: 10px;
        }

        .copy-btn:hover {
            background: #334155;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">📌 Pastebin</div>
            <div class="header-actions">
                <button class="btn-secondary" onclick="clearAll()">Clear All</button>
                <button onclick="saveAs()">Save & Share</button>
            </div>
        </header>

        <div class="info-box">
            💡 A simple pastebin to share code snippets with syntax highlighting. Paste your code, select the language, and share!
        </div>

        <div class="main-content">
            <div class="section">
                <div class="section-header">📝 Code Input</div>
                <div class="section-content">
                    <div class="form-group">
                        <label for="title">Paste Title (Optional)</label>
                        <input type="text" id="title" placeholder="Enter a title for your paste...">
                    </div>

                    <div class="form-group">
                        <label for="language">Language</label>
                        <select id="language">
                            <option value="javascript">JavaScript</option>
                            <option value="python">Python</option>
                            <option value="html">HTML</option>
                            <option value="css">CSS</option>
                            <option value="json">JSON</option>
                            <option value="sql">SQL</option>
                            <option value="java">Java</option>
                            <option value="cpp">C++</option>
                            <option value="csharp">C#</option>
                            <option value="bash">Bash</option>
                            <option value="plaintext">Plain Text</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="code">Code</label>
                        <textarea id="code" placeholder="Paste your code here..."></textarea>
                    </div>

                    <div class="actions">
                        <button class="btn-full" onclick="formatCode()">Format & Highlight</button>
                    </div>
                </div>
            </div>

            <div class="section">
                <div class="section-header">✨ Preview</div>
                <div class="section-content">
                    <button class="copy-btn" onclick="copyToClipboard()">Copy</button>
                    <div id="output" class="highlight">
                        <pre><code>Your formatted code will appear here...</code></pre>
                    </div>
                </div>
            </div>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="charCount">0</div>
                <div class="stat-label">Characters</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="lineCount">0</div>
                <div class="stat-label">Lines</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="wordCount">0</div>
                <div class="stat-label">Words</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="sizeDisplay">0 B</div>
                <div class="stat-label">Size</div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <script>
        const codeInput = document.getElementById('code');
        const output = document.getElementById('output');
        const languageSelect = document.getElementById('language');

        // Update statistics
        function updateStats() {
            const code = codeInput.value;
            const charCount = code.length;
            const lineCount = code.split('\n').length;
            const wordCount = code.trim().split(/\s+/).length;
            const sizeInBytes = new Blob([code]).size;

            document.getElementById('charCount').textContent = charCount;
            document.getElementById('lineCount').textContent = lineCount;
            document.getElementById('wordCount').textContent = wordCount;
            document.getElementById('sizeDisplay').textContent = 
                sizeInBytes > 1024 ? (sizeInBytes / 1024).toFixed(2) + ' KB' : sizeInBytes + ' B';
        }

        // Format and highlight code
        function formatCode() {
            const code = codeInput.value;
            const language = languageSelect.value;

            if (!code.trim()) {
                alert('Please enter some code first!');
                return;
            }

            try {
                const highlighted = hljs.highlight(code, { language: language, ignoreIllegals: true }).value;
                output.innerHTML = `<pre><code class="language-${language}">${highlighted}</code></pre>`;
            } catch (e) {
                output.innerHTML = `<pre><code>${escapeHtml(code)}</code></pre>`;
            }

            updateStats();
        }

        // Helper function to escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Copy to clipboard
        function copyToClipboard() {
            const text = codeInput.value;
            if (!text) {
                alert('Nothing to copy!');
                return;
            }

            navigator.clipboard.writeText(text).then(() => {
                alert('Code copied to clipboard!');
            }).catch(err => {
                console.error('Failed to copy: ', err);
            });
        }

        // Save as file
        function saveAs() {
            const code = codeInput.value;
            const title = document.getElementById('title').value || 'paste';
            const language = languageSelect.value;

            if (!code.trim()) {
                alert('Please enter some code first!');
                return;
            }

            const extensions = {
                javascript: 'js',
                python: 'py',
                html: 'html',
                css: 'css',
                json: 'json',
                sql: 'sql',
                java: 'java',
                cpp: 'cpp',
                csharp: 'cs',
                bash: 'sh',
                plaintext: 'txt'
            };

            const ext = extensions[language] || 'txt';
            const filename = `${title.replace(/\s+/g, '_')}.${ext}`;

            const element = document.createElement('a');
            element.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent(code));
            element.setAttribute('download', filename);
            element.style.display = 'none';
            document.body.appendChild(element);
            element.click();
            document.body.removeChild(element);

            alert(`File saved as: ${filename}`);
        }

        // Clear all
        function clearAll() {
            if (confirm('Are you sure you want to clear everything?')) {
                codeInput.value = '';
                document.getElementById('title').value = '';
                languageSelect.value = 'javascript';
                output.innerHTML = '<pre><code>Your formatted code will appear here...</code></pre>';
                updateStats();
            }
        }

        // Update stats on input
        codeInput.addEventListener('input', updateStats);

        // Initialize
        updateStats();
    </script>
</body>
</html>
