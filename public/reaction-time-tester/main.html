<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reaction Time Tester - F1 Challenge</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<a href="/" class="project-back-button" style="position:fixed;left:18px;top:18px;padding:8px 16px;border-radius:8px;background:#1e293b;color:#3b82f6;border:1px solid #3b82f6;text-decoration:none;z-index:9999;font-weight:700;font-family:Inter, system-ui, sans-serif;transition:all 0.2s ease;" onmouseover="this.style.background='#3b82f6';this.style.color='#fff'" onmouseout="this.style.background='#1e293b';this.style.color='#3b82f6'">← Back to Home</a>

  <!-- Animated Background -->
  <div class="bg-animation">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
  </div>

  <!-- Theme Toggle -->
  <div class="theme-toggle">
    <button class="toggle-btn" id="themeToggle">🌙 Dark Mode</button>
  </div>

  <div class="container">
    <!-- Game Section -->
    <div class="game-section">
      <div class="title">
        TEST YOUR REACTION TIME!
        <span>(Do you think you can beat an F1 driver?)</span>
      </div>

      <div class="traffic-light-container">
        <!-- Traffic Lights -->
        <div class="traffic-light">
          <div class="light" id="redLight"></div>
          <div class="light" id="orangeLight"></div>
          <div class="light" id="greenLight"></div>
        </div>
        <!-- Right Side -->
        <div class="controls-area">
          <div class="countdown-text" id="countdownText">
            Ready?
          </div>
          <button class="action-btn" id="actionBtn">
            Click to Start
          </button>
        </div>
      </div>
    </div>
    <!-- Leaderboard & New Features -->
    <div class="right-panel">
      <!-- Statistics Dashboard -->
      <div class="stats-section">
        <div class="section-title">📊 Statistics</div>
        <div class="stats-grid" id="statsGrid">
          <div class="stat-card">
            <div class="stat-value" id="totalTests">0</div>
            <div class="stat-label">Total Tests</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="bestTime">-</div>
            <div class="stat-label">Best Time</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="avgTime">-</div>
            <div class="stat-label">Average Time</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="excellentCount">0</div>
            <div class="stat-label">Excellent (&lt;200ms)</div>
          </div>
        </div>
      </div>

      <!-- Achievements -->
      <div class="achievements-section">
        <div class="section-title">🏅 Achievements</div>
        <div class="achievements-progress">
          <p><span id="unlockedAchievements">0</span>/5 Unlocked</p>
          <div class="progress-bar-container">
            <div class="progress-bar" id="achievementProgress" style="width:0%"></div>
          </div>
        </div>
        <div class="achievements-grid" id="achievementsGrid"></div>
      </div>

      <!-- Test History -->
      <div class="history-section">
        <div class="section-title">📜 Last 10 Tests</div>
        <div class="history-list" id="historyList"></div>
      </div>

      <!-- Leaderboard -->
      <div class="leaderboard-section">
        <div class="leaderboard-title">🏆 Leaderboard</div>
        <div class="leaderboard-list" id="leaderboard"></div>
      </div>
    </div>
  </div>
  <!-- Benchmark Rating Overlay (shown after test) -->
  <div class="benchmark-modal" id="benchmarkModal">
    <div class="benchmark-content">
      <div class="benchmark-title">Your Reaction Time</div>
      <div class="benchmark-time" id="benchmarkTime">- ms</div>
      <div class="benchmark-rating" id="benchmarkRating">-</div>
      <div class="benchmark-compare" id="benchmarkCompare"></div>
      <button class="benchmark-close" id="benchmarkClose">Continue</button>
    </div>
  </div>
  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>
  <script src="script.js"></script>
</body>
</html>
