<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reaction Time Tester - F1 Challenge</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #000000;
      --bg-secondary: #1a1a1a;
      --text-color: #ffffff;
      --card-bg: rgba(255, 255, 255, 0.1);
      --border-color: rgba(255, 255, 255, 0.2);
    }

    body.light-mode {
      --bg-primary: #f5f5f5;
      --bg-secondary: #e0e0e0;
      --text-color: #333333;
      --card-bg: rgba(0, 0, 0, 0.05);
      --border-color: rgba(0, 0, 0, 0.1);
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
      font-family: "Open Sans", sans-serif;
      color: var(--text-color);
      transition: all 0.3s ease;
    }

    .container {
      display: flex;
      gap: 40px;
      align-items: flex-start;
      padding: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* ===== THEME TOGGLE ===== */
    .theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1000;
    }

    .toggle-btn {
      background: var(--card-bg);
      border: 2px solid var(--border-color);
      color: var(--text-color);
      padding: 10px 20px;
      border-radius: 50px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
      transition: all 0.3s ease;
    }

    .toggle-btn:hover {
      transform: scale(1.05);
      background: var(--border-color);
    }

    /* ===== MAIN GAME SECTION ===== */
    .game-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 30px;
    }

    .title {
      text-align: center;
      font-size: 32px;
      font-weight: 900;
      line-height: 1.3;
      max-width: 500px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
    }

    .title span {
      display: block;
      font-size: 20px;
      opacity: 0.9;
      margin-top: 10px;
    }

    /* ===== TRAFFIC LIGHT ===== */
    .traffic-light-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .traffic-light {
      display: flex;
      flex-direction: column;
      gap: 15px;
      background: #222;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    .light {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: #444;
      border: 3px solid #333;
      transition: all 0.2s ease;
      box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.5);
    }

    .light.red {
      background: #ff4444;
      box-shadow: 0 0 30px #ff4444, inset 0 2px 5px rgba(0, 0, 0, 0.3);
    }

    .light.orange {
      background: #ffaa00;
      box-shadow: 0 0 30px #ffaa00, inset 0 2px 5px rgba(0, 0, 0, 0.3);
    }

    .light.green {
      background: #00ff00;
      box-shadow: 0 0 30px #00ff00, inset 0 2px 5px rgba(0, 0, 0, 0.3);
    }

    .countdown-text {
      text-align: center;
      font-size: 48px;
      font-weight: 900;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 200px;
    }

    /* ===== ACTION BUTTON ===== */
    .action-btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 18px 50px;
      font-size: 18px;
      font-weight: bold;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .action-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
    }

    .action-btn:active {
      transform: translateY(0);
    }

    .action-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* ===== GREEN MODE (when light is green) ===== */
    .action-btn.green-mode {
      background: #00ff00;
      color: #000000;
      box-shadow: 0 0 30px #00ff00;
      animation: pulse 0.5s ease-in-out infinite;
      font-size: 24px;
      padding: 20px 60px;
    }

    .action-btn.green-mode:hover {
      box-shadow: 0 0 50px #00ff00;
      transform: scale(1.05);
    }

    .action-btn.green-mode:active {
      transform: scale(0.95);
    }

    @keyframes pulse {
      0%, 100% {
        box-shadow: 0 0 30px #00ff00;
      }
      50% {
        box-shadow: 0 0 50px #00ff00;
      }
    }

    /* ===== LEADERBOARD ===== */
    .leaderboard-section {
      background: var(--card-bg);
      border: 2px solid var(--border-color);
      padding: 25px;
      border-radius: 15px;
      min-width: 300px;
      backdrop-filter: blur(10px);
      margin-top: 100px;
    }

    .leaderboard-title {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 20px;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .leaderboard-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .leaderboard-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 15px;
      background: var(--border-color);
      border-radius: 8px;
      font-size: 18px;
      font-weight: bold;
      animation: slideIn 0.3s ease;
    }

    .leaderboard-item.new {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      animation: popIn 0.5s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes popIn {
      0% {
        transform: scale(0.8);
        opacity: 0;
      }
      50% {
        transform: scale(1.1);
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    .rank {
      font-size: 24px;
      font-weight: 900;
      min-width: 40px;
      color: #ffd700;
    }

    .score-value {
      font-size: 20px;
      margin-left: auto;
    }

    .empty-slot {
      text-align: center;
      color: rgba(255, 255, 255, 0.5);
      padding: 12px;
    }

    body.light-mode .empty-slot {
      color: rgba(0, 0, 0, 0.5);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .container {
        flex-direction: column;
        gap: 30px;
      }

      .title {
        font-size: 24px;
      }

      .light {
        width: 80px;
        height: 80px;
      }

      .countdown-text {
        font-size: 36px;
      }

      .leaderboard-section {
        min-width: 100%;
        max-width: 400px;
        margin-top: 0;
      }

      .action-btn {
        padding: 15px 40px;
        font-size: 16px;
      }

      .action-btn.green-mode {
        padding: 18px 50px;
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <!-- Theme Toggle -->
  <div class="theme-toggle">
    <button class="toggle-btn" id="themeToggle">🌙 Dark Mode</button>
  </div>

  <div class="container">
    <!-- Game Section -->
    <div class="game-section">
      <div class="title">
        TEST YOUR REACTION TIME!
        <span>(Do you think you can beat an F1 driver?)</span>
      </div>

      <div class="traffic-light-container">
        <div class="traffic-light">
          <div class="light" id="redLight"></div>
          <div class="light" id="orangeLight"></div>
          <div class="light" id="greenLight"></div>
        </div>
        <div class="countdown-text" id="countdownText">Ready?</div>
      </div>

      <button class="action-btn" id="actionBtn">Click to Start</button>
    </div>

    <!-- Leaderboard -->
    <div class="leaderboard-section">
      <div class="leaderboard-title">🏆 Leaderboard</div>
      <div class="leaderboard-list" id="leaderboard"></div>
    </div>
  </div>

  <script>
    // ===== THEME TOGGLE =====
    const themeToggle = document.getElementById("themeToggle");
    const body = document.body;

    // Check if dark mode was saved
    if (localStorage.getItem("theme") === "light") {
      body.classList.add("light-mode");
      themeToggle.textContent = "☀️ Light Mode";
    }

    themeToggle.addEventListener("click", () => {
      body.classList.toggle("light-mode");
      const isLight = body.classList.contains("light-mode");
      themeToggle.textContent = isLight ? "☀️ Light Mode" : "🌙 Dark Mode";
      localStorage.setItem("theme", isLight ? "light" : "dark");
    });

    // ===== GAME LOGIC =====
    const actionBtn = document.getElementById("actionBtn");
    const countdownText = document.getElementById("countdownText");
    const redLight = document.getElementById("redLight");
    const orangeLight = document.getElementById("orangeLight");
    const greenLight = document.getElementById("greenLight");
    const leaderboard = document.getElementById("leaderboard");

    let scores = JSON.parse(localStorage.getItem("reactionScores")) || [];
    let gameActive = false;
    let waitingForClick = false;
    let gameStartTime = 0;

    // Clear all lights
    function clearLights() {
      redLight.classList.remove("red");
      orangeLight.classList.remove("orange");
      greenLight.classList.remove("green");
      countdownText.textContent = "Ready?";
    }

    // Reset button to start mode
    function resetButton() {
      actionBtn.classList.remove("green-mode");
      actionBtn.textContent = "Click to Start";
    }

    // Change button to green mode
    function changeToGreenMode() {
      actionBtn.classList.add("green-mode");
      actionBtn.textContent = "Click!";
    }

    // Start the game
    function startGame() {
      gameActive = true;
      actionBtn.disabled = true;
      resetButton();
      clearLights();

      // 3... 2... 1... sequence
      let countdown = 3;
      const countdownInterval = setInterval(() => {
        if (countdown > 0) {
          countdownText.textContent = countdown;

          if (countdown === 3) {
            redLight.classList.add("red");
          } else if (countdown === 2) {
            redLight.classList.remove("red");
            orangeLight.classList.add("orange");
          } else if (countdown === 1) {
            orangeLight.classList.remove("orange");
          }

          countdown--;
        } else {
          clearInterval(countdownInterval);
          // GREEN LIGHT APPEARS - TIMER STARTS HERE
          greenLight.classList.add("green");
          countdownText.textContent = "GO!";
          gameStartTime = Date.now(); // ← RECORDING STARTS WHEN GREEN
          waitingForClick = true;
          actionBtn.disabled = false; // Enable button for clicking
          changeToGreenMode(); // ← Change button to green with checkmark

          // Set timeout if user is too slow
          setTimeout(() => {
            if (waitingForClick) {
              waitingForClick = false;
              countdownText.textContent = "Missed!";
              clearLights();
              resetButton();
              gameActive = false;
              actionBtn.disabled = false;
            }
          }, 5000);
        }
      }, 1000);
    }

    // Handle button click
    actionBtn.addEventListener("click", () => {
      if (!gameActive) {
        // Start mode - click to begin
        startGame();
      } else if (waitingForClick) {
        // Green mode - record the score
        recordScore();
      }
    });

    // Record score
    function recordScore() {
      const reactionTime = Date.now() - gameStartTime;
      waitingForClick = false;
      gameActive = false;

      countdownText.textContent = `⚡ ${reactionTime} ms!`;
      clearLights();
      resetButton();
      actionBtn.disabled = true;

      // Add score to list
      scores.push(reactionTime);
      // Sort and keep only top 5 best (lowest) scores
      scores.sort((a, b) => a - b);
      scores = scores.slice(0, 5);

      // Save to localStorage
      localStorage.setItem("reactionScores", JSON.stringify(scores));

      // Update leaderboard
      updateLeaderboard(reactionTime);

      // Re-enable button after delay
      setTimeout(() => {
        actionBtn.disabled = false;
        countdownText.textContent = "Ready?";
      }, 1500);
    }

    // Update leaderboard display
    function updateLeaderboard(newScore) {
      leaderboard.innerHTML = "";

      if (scores.length === 0) {
        leaderboard.innerHTML = '<div class="empty-slot">No scores yet. Start playing!</div>';
        return;
      }

      scores.forEach((score, index) => {
        const item = document.createElement("div");
        item.className = "leaderboard-item";
        
        // Highlight new score
        if (score === newScore && index === scores.indexOf(newScore)) {
          item.classList.add("new");
        }

        const rank = document.createElement("div");
        rank.className = "rank";
        rank.textContent = `#${index + 1}`;

        const value = document.createElement("div");
        value.className = "score-value";
        value.textContent = `${score} ms`;

        item.appendChild(rank);
        item.appendChild(value);
        leaderboard.appendChild(item);
      });
    }

    // Initialize leaderboard on load
    updateLeaderboard(null);
  </script>
</body>
</html>
