<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipezzz - Explore Recipes</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <a href="main.html" class="project-back-button">← Back to Home</a>

    <nav aria-label="Main Navigation">
        <h2 class="logo">Recipezzz</h2>
        <div class="navlink">
            <a href="main.html" class="active">Home</a>
            <a href="rec.html">Recipes</a>
        </div>
    </nav>

    <main class="data">
        <header>
            <h1>Recipes Selector</h1>
            <p id="select-heading">Select your recipe</p>
        </header>
        
        <div class="form-group">
            <!-- JavaScript will fill these options from text.json -->
            <select id="difficulty" aria-labelledby="select-heading" 
                    onfocus="if(this.options.length > 5){ this.size = 5; }" 
                    onblur="this.size = 1;" 
                    onchange="this.size = 1; this.blur();">
                <option>Loading recipes...</option>
            </select>
        </div>
        
        <button id="start" type="button">Get Recipe</button>
    </main>
</body>
</html>
