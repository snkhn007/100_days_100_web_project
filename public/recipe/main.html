<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Genie</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<a href="/" class="project-back-button" style="position:fixed;left:18px;top:18px;padding:8px 12px;border-radius:8px;background:white;text-decoration:none;z-index:9999;font-weight:700;font-family:Inter, system-ui, sans-serif;box-shadow:0 8px 20px rgba(0, 0, 0);">← Back to Home</a>

    <nav>
        <h2 style="margin-right: 10px;">Recipezzz</h2>
    </nav>
    <h1>Recipes Selector</h1>
    
    <div class="data">
        
    <h3>Select your recipe</h3>
    <select id="difficulty" aria-placeholder="Select your test type">
        <option value="Grilled Cheese Sandwich">Grilled Cheese Sandwich</option>
        <option value="Banana Smoothie">Banana Smoothie</option>
        <option value="Lemonade">Lemonade</option>
        <option value="French Toast">French Toast</option>
        <option value="Garlic Bread">Garlic Bread</option>

        <option value="Pancakes">Pancakes</option>
        <option value="Vegetable Stir Fry">Vegetable Stir Fry</option>
        <option value="Omelette">Omelette</option>
        <option value="Caesar Salad">Caesar Salad</option>
        <option value="Fried Rice">Fried Rice</option>

        <option value="Chicken Biryani">Chicken Biryani</option>
        <option value="Palak Paneer">Palak Paneer</option>
        <option value="Chana Masala">Chana Masala</option>
        <option value="Dal Tadka">Dal Tadka</option>
        <option value="Masala Dosa">Masala Dosa</option>

    </select>
    <br>
    <button id="start">Get Recipe</button>
        <!-- <h2>
            Typing Text below
        </h2>
        <h4>
            Text
        </h4>
        <input type="text" placeholder="Text..."> -->
    </div>
</body>
<script>
    document.getElementById('start').addEventListener('click', function() {
        
        const difficulty = document.getElementById('difficulty').value;
        

        
        sessionStorage.setItem('difficulty', difficulty);

        window.location.href = 'rec.html';
    });

</script>
</html>
