<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>Image Slider</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1" />
  <link rel="stylesheet" href="swiper-bundle.min.css" />
  <link rel="stylesheet" href="index.css">
</head>

<body>

  <h1>IMAGE SLIDER</h1>

  <div id="slideshow">

    <div class="slider-row">
      <button onclick="prevPhoto()" aria-label="Previous image">&#8249;</button>

      <div class="image-wrapper">
        <img id="photo" src="public/images/i1.jpg" alt="Mahakaleshwar Temple" />
      </div>

      <button onclick="nextPhoto()" aria-label="Next image">&#8250;</button>
    </div>

    <!-- Caption box: place name + location -->
    <div class="caption-box">
      <p id="place-name" class="place-name">Mahakaleshwar Temple</p>
      <p id="place-location" class="place-location">📍 Ujjain, Madhya Pradesh, India</p>
    </div>

    <!-- Slide counter e.g. 1 / 9 -->
    <p id="counter" class="counter">1 / 9</p>

    <!-- Dot indicators -->
    <div id="dots" class="dots"></div>

  </div>
 

  <script src="swiper-bundle.min.js"></script>
  <script src="index.js"></script>
</body>

</html>
