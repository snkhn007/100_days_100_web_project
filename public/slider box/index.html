<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>Image Slider Gallery</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1" />

  <link rel="stylesheet" href="swiper-bundle.min.css" />
  <link rel="stylesheet" href="index.css">
</head>

<body>
  <main class="gallery-app">
    <section class="gallery-panel">
      <header class="gallery-header">
        <div>
          <p class="eyebrow">Curated visual library</p>
          <h1 class="title">Image Slider</h1>
        </div>
        <div class="slide-counter" aria-live="polite">
          <span id="currentSlide">01</span>
          <span>/</span>
          <span id="totalSlides">40</span>
        </div>
      </header>

      <nav class="category-filter" aria-label="Image categories">
        <button class="category-btn active" type="button" data-category="all">All</button>
        <button class="category-btn" type="button" data-category="cars">Cars</button>
        <button class="category-btn" type="button" data-category="animals">Animals</button>
        <button class="category-btn" type="button" data-category="landscapes">Landscapes</button>
        <button class="category-btn" type="button" data-category="bungalows">Bungalows</button>
      </nav>

      <div class="swiper mySwiper">
        <div class="swiper-wrapper" id="sliderWrapper"></div>
        <button class="swiper-button-next" aria-label="Next slide"></button>
        <button class="swiper-button-prev" aria-label="Previous slide"></button>
      </div>
    </section>
  </main>

  <template id="slideTemplate">
    <div class="swiper-slide">
      <div class="media-frame"></div>
      <div class="slide-details">
        <span class="slide-category"></span>
        <h2 class="slide-title"></h2>
        <p class="slide-description"></p>
      </div>
    </div>
  </template>

  <script src="swiper-bundle.min.js"></script>
  <script src="index.js"></script>
</body>

</html>
