<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SNAKE</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
<a href="/" class="project-back-button" style="position:fixed;left:18px;top:18px;padding:8px 12px;border-radius:8px;background:white;text-decoration:none;z-index:9999;font-weight:700;font-family:Inter, system-ui, sans-serif;box-shadow:0 8px 20px rgba(0, 0, 0);">← Back to Home</a>


  <div class="title">SNAKE</div>

  <div class="hud">
    <div class="stat-box">
      <span class="stat-label">Score</span>
      <div class="stat-value" id="score">0</div>
    </div>
    <div class="stat-box">
      <span class="stat-label">High Score</span>
      <div class="stat-value" id="highscore">0</div>
    </div>
    <div class="stat-box">
      <span class="stat-label">Level</span>
      <div class="stat-value" id="level">1</div>
    </div>
  </div>

  <div class="canvas-wrapper">
    <canvas id="gameCanvas"></canvas>
    <div id="scanline"></div>

    
    <div class="overlay" id="startOverlay">
      <div class="overlay-title">READY</div>
      <div class="overlay-sub">GUIDE THE SNAKE<br>CONSUME. GROW. SURVIVE.</div>
      <button class="btn" id="startBtn"><span>START GAME</span></button>
      <div class="controls-hint">
        <div class="key"><span class="key-symbol">W</span>UP</div>
        <div class="key"><span class="key-symbol">A</span>LEFT</div>
        <div class="key"><span class="key-symbol">S</span>DOWN</div>
        <div class="key"><span class="key-symbol">D</span>RIGHT</div>
        <div class="key"><span class="key-symbol">↑↓←→</span>ARROWS</div>
      </div>
    </div>

  
    <div class="overlay hidden" id="gameOverOverlay">
      <div class="overlay-title">GAME OVER</div>
      <div class="game-over-score" id="finalScore"></div>
      <button class="btn" id="restartBtn"><span>PLAY AGAIN</span></button>
    </div>
  </div>

  <script src="./script.js"></script>
</body>
</html>
