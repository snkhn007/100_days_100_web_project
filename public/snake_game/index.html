<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#000000">
  <title>SNAKE</title>
  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <!-- Cleaned up home button link styling -->
  <a href="/" class="project-back-button"
    style="position:fixed; left:18px; top:18px; padding:8px 12px; border-radius:8px; background:white; color:#000000; text-decoration:none; z-index:9999; font-weight:700; font-family:Inter, system-ui, sans-serif; box-shadow:0 8px 20px rgba(0, 0, 0, 0.3);">←
    Back to Home</a>

  <button id="themeToggle" class="theme-btn">🌙 Dark Mode</button>
  <div class="title">SNAKE GAME</div>
  <div class="hud">
    <div class="stat-box">
      <span class="stat-label">Score</span>
      <div class="stat-value" id="score">0</div>
    </div>
    <div class="stat-box">
      <span class="stat-label">High Score</span>
      <div class="stat-value" id="highscore">0</div>
    </div>
    <div class="stat-box">
      <span class="stat-label">Level</span>
      <div class="stat-value" id="level">1</div>
    </div>
  </div>

  <div class="canvas-wrapper">
    <canvas id="gameCanvas"></canvas>
    <div id="scanline"></div>

    <div class="overlay" id="startOverlay">
      <div class="overlay-title">READY</div>
      <div class="overlay-sub">GUIDE THE SNAKE<br>CONSUME. GROW. SURVIVE.</div>
      <button class="btn" id="startBtn"><span>START GAME</span></button>
      <div class="controls-hint">
        <div class="key"><span class="key-symbol">W</span>UP</div>
        <div class="key"><span class="key-symbol">A</span>LEFT</div>
        <div class="key"><span class="key-symbol">S</span>DOWN</div>
        <div class="key"><span class="key-symbol">D</span>RIGHT</div>
        <div class="key"><span class="key-symbol">↑↓←→</span>ARROWS</div>
      </div>
    </div>

    <div class="overlay hidden" id="gameOverOverlay">
      <div class="overlay-title">GAME OVER</div>
      <div class="game-over-score" id="finalScore"></div>
      <button class="btn" id="restartBtn"><span>PLAY AGAIN</span></button>
    </div>
  </div>

  <!-- ========== MOBILE TOUCH CONTROLS with Accessibility ========== -->
  <div class="mobile-controls" id="mobileControls">
    <div class="dpad">
      <div class="dpad-row top-row">
        <button class="dpad-btn" aria-label="Move Up" data-dir="up">▲</button>
      </div>
      <div class="dpad-row bottom-row">
        <button class="dpad-btn" aria-label="Move Left" data-dir="left">◀</button>
        <button class="dpad-btn" aria-label="Move Down" data-dir="down">▼</button>
        <button class="dpad-btn" aria-label="Move Right" data-dir="right">▶</button>
      </div>
    </div>
  </div>

  <!-- ========== AUDIO ASSETS ========== -->
  <!-- Added audio elements so your JavaScript code can find and play them -->
  <audio id="eatSound" src="./assets/eat.mp3" preload="auto"></audio>
  <audio id="gameOverSound" src="./assets/gameover.mp3" preload="auto"></audio>

  <!-- ONLY ONE script tag at the bottom -->
  <script src="./script.js"></script>
</body>

</html>
