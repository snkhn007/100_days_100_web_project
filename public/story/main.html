<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Animations</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="landing-page">
<a href="/" class="project-back-button" style="position:fixed;left:18px;top:18px;padding:8px 12px;border-radius:8px;background:white;text-decoration:none;z-index:9999;font-weight:700;font-family:Inter, system-ui, sans-serif;box-shadow:0 8px 20px rgba(0, 0, 0);">← Back to Home</a>

    <main class="landing-container">
        <h1>Story Animations</h1>
        <p class="lead">
            Step into a world where stories come to life. Listen, follow each scene, and enjoy these interactive adventures.
        </p>
        <p class="carousel-hint">💡 Click <strong>Next</strong> or <strong>Prev</strong> on the card below to explore other stories!</p>


        <!-- Dynamic Story Card Container -->
        <section class="story-card">
            <h2 id="story-title">The Clever Rabbit and the Lion</h2>
            <img
                id="story-cover"
                class="cover-image"
                src="images/poster.jpeg"
                alt="Story Poster"
                title="Story Poster"
            >
            
            <!-- Navigation Controls -->
            <div class="carousel-controls" style="display: flex; justify-content: space-between; align-items: center; width: 100%; margin: 15px 0;">
                <button id="prev-btn" class="btn-secondary" style="padding: 8px 16px; cursor: pointer;">&larr; Prev</button>
                <span id="story-indicator" style="font-weight: bold;">1 / 3</span>
                <button id="next-btn" class="btn-secondary" style="padding: 8px 16px; cursor: pointer;">Next &rarr;</button>
            </div>

            <button id="start" class="btn-primary" style="width: 100%;">Start Story</button>
        </section>
    </main>

    <script>
        // 1. Array of Story Objects (Easily expandable!)
        const stories = [
            {
                id: "rabbit-lion",
                title: "The Clever Rabbit and the Lion",
                cover: "images/poster.jpeg"
            },
            
            {
                id: "tortoise-hare",
                title: "The Rabbit and the Turtle",
                cover: "images/race.jpg" // Update with your actual asset path
            },
            {
    id: "cap-seller",
    title: "The Cap Seller and the Monkeys",
    cover: "images/monkey-capseller-intro.jpg" // Update with your actual asset path
},

{
    id: "fox-stork",
    title: "The Fox and the Stork",
    cover: "images/stork-poster.jpg" // Update with your actual asset path
}

        ];

        let currentIndex = 0;

        // 2. DOM Elements
        const titleEl = document.getElementById("story-title");
        const coverEl = document.getElementById("story-cover");
        const indicatorEl = document.getElementById("story-indicator");
        const prevBtn = document.getElementById("prev-btn");
        const nextBtn = document.getElementById("next-btn");
        const startBtn = document.getElementById("start");

        // 3. Update UI Render Function
        function updateStoryDOM() {
            const currentStory = stories[currentIndex];
            titleEl.textContent = currentStory.title;
            coverEl.src = currentStory.cover;
            coverEl.alt = `Poster of ${currentStory.title}`;
            coverEl.title = currentStory.title;
            indicatorEl.textContent = `${currentIndex + 1} / ${stories.length}`;
        }

        // 4. Event Listeners for Navigation
        prevBtn.addEventListener("click", () => {
            // Loops back to the end if clicking prev on first item
            currentIndex = (currentIndex === 0) ? stories.length - 1 : currentIndex - 1;
            updateStoryDOM();
        });

        nextBtn.addEventListener("click", () => {
            // Loops back to start if clicking next on last item
            currentIndex = (currentIndex === stories.length - 1) ? 0 : currentIndex + 1;
            updateStoryDOM();
        });

        // 5. Direct User to Selected Story
        startBtn.addEventListener("click", () => {
            const selectedStoryId = stories[currentIndex].id;
            // Passes the unique story identifier via URL params to story.html
            window.location.href = `story.html?story=${selectedStoryId}`;
        });

        // Initialize display
        updateStoryDOM();
    </script>
</body>
</html>
