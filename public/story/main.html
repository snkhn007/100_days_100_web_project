<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Animations</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="landing-page">
<a href="/" class="project-back-button" style="position:fixed;left:18px;top:18px;padding:8px 12px;border-radius:8px;background:linear-gradient(90deg, rgba(124,99,255,0.14), rgba(79,141,255,0.10));color:#fff;text-decoration:none;z-index:9999;font-weight:700;font-family:Inter, system-ui, sans-serif;box-shadow:0 8px 20px rgba(12,18,40,0.35);">← Back to Home</a>

    <main class="landing-container">
        <h1>Story Animations</h1>
        <p class="lead">
            Step into a world where stories come to life. Listen, follow each scene, and enjoy this
            interactive version of <strong>The Clever Rabbit and the Lion</strong>.
        </p>

        <section class="story-card">
            <h2>The Clever Rabbit and the Lion</h2>
            <img
                class="cover-image"
                src="images/poster.jpeg"
                alt="Poster of The Clever Rabbit and the Lion"
                title="The Clever Rabbit and the Lion"
            >
            <button id="start" class="btn-primary">Start Story</button>
        </section>
    </main>
    <script>
        document.getElementById("start").addEventListener("click", goToStory);

        function goToStory() {
            window.location.href = "story.html";
        }
    </script>
</body>
</html>
