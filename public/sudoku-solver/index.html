<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sudoku Solver</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <div class="container">

        <h1>// SUDOKU_SOLVER</h1>

        <p class="subtitle">
            System.vizia_backtrack_algo
        </p>

        <div id="grid" class="sudoku-grid"></div>

        <div class="controls">

            <button onclick="solveSudoku()">
                Execute
            </button>

            <button onclick="clearGrid()">
                Clear
            </button>

            <button onclick="generatePuzzle()">
                Initialize
            </button>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
