<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sudoku Solver</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="header-actions">
        <button id="themeToggleBtn" class="theme-toggle-btn" onclick="toggleTheme()">🌙</button>
    </div>
<a href="/" class="project-back-button" style="position:fixed;left:18px;top:18px;padding:8px 12px;border-radius:8px;background:white;text-decoration:none;z-index:9999;font-weight:700;font-family:Inter, system-ui, sans-serif;box-shadow:0 8px 20px rgba(0, 0, 0);">← Back to Home</a>


    <div class="container">

        <h1>// SUDOKU_SOLVER</h1>

        <p class="subtitle">
            System.vizia_backtrack_algo
        </p>

        <div id="grid" class="sudoku-grid"></div>

        <div class="controls">

            <button onclick="solveSudoku()">
                Execute
            </button>

            <button onclick="clearGrid()">
                Clear
            </button>

            <button onclick="generatePuzzle()">
                Initialize
            </button>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
