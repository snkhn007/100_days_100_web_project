<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Travel Companion - Discover Your Adventure</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <!-- Back Button -->
    <a href="/" class="project-back-button" style="position:fixed;left:18px;top:18px;padding:8px 16px;border-radius:8px;background:rgba(255,255,255,0.1);color:#fff;border:1px solid rgba(255,255,255,0.3);text-decoration:none;z-index:9999;font-weight:700;font-family:Inter, system-ui, sans-serif;transition:all 0.2s ease;backdrop-filter:blur(10px);" onmouseover="this.style.background='rgba(255,255,255,0.2)'" onmouseout="this.style.background='rgba(255,255,255,0.1)'">← Back</a>

    <!-- Animated Background -->
    <div class="animated-bg">
      <div class="gradient-blob blob-1"></div>
      <div class="gradient-blob blob-2"></div>
      <div class="gradient-blob blob-3"></div>
      <canvas id="particleCanvas" class="particle-canvas"></canvas>
    </div>

    <!-- Hero Section -->
    <section class="hero">
      <div class="hero-content">
        <!-- Main Headline -->
        <h1 class="hero-title">Discover Your Next<br/><span class="gradient-text">Adventure</span></h1>
        <p class="hero-subtitle">Handpicked destinations, unforgettable experiences</p>
        
        <!-- Search Bar -->
        <div class="search-wrapper">
          <div class="search-bar">
            <svg class="airplane-icon" viewBox="0 0 24 24" fill="currentColor">
              <path d="M21.5 2.5L2.5 12l7 4.5-2 7 3-5.5 7 2-7-9.5z"/>
            </svg>
            <input 
              type="text" 
              id="destinationInput" 
              class="search-input" 
              placeholder="Where do you want to go?" 
              aria-label="Search destination"
            />
            <button id="searchBtn" class="search-submit" aria-label="Search">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.35-4.35"></path>
              </svg>
            </button>
          </div>
          <!-- Autocomplete Suggestions -->
          <div id="suggestionsContainer" class="suggestions-container" style="display: none;"></div>
        </div>

        <!-- CTA Button -->
        <button class="cta-button">
          <span>Explore Now</span>
          <svg class="arrow-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </button>

        <!-- Scroll Indicator -->
        <div class="scroll-indicator">
          <span>Scroll to explore</span>
          <svg class="bounce-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 5v14M5 12l7 7 7-7"/>
          </svg>
        </div>
      </div>

      <!-- Stats Cards -->
      <div class="stats-container">
        <div class="stat-card">
          <div class="stat-icon">🌍</div>
          <p class="stat-number">500+</p>
          <p class="stat-label">Destinations</p>
        </div>
        <div class="stat-card">
          <div class="stat-icon">👥</div>
          <p class="stat-number">10K+</p>
          <p class="stat-label">Happy Travelers</p>
        </div>
        <div class="stat-card">
          <div class="stat-icon">⭐</div>
          <p class="stat-number">4.9</p>
          <p class="stat-label">Rating</p>
        </div>
      </div>
    </section>

    <!-- Main Content -->
    <main class="container">
      <section class="content-section">
        <h2>Why Travel With Us?</h2>
        <p>Experience world-class service and unforgettable memories</p>
      </section>
    </main>

    <!-- Vanilla JavaScript -->
    <script src="./app.js"></script>
  </body>
</html>
