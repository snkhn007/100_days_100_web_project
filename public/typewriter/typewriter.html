<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Typewriter</title>
    <link rel="stylesheet" href="typewriter.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
      integrity="sha512-z3gLpd7yknf1YoNbCzqRKc4qyor8gaKU1qmn+CShxbuBusANI9QpRohGBreCFkKxLhei6S9CQXFEbbKuqLg0DA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"
      integrity="sha512-qZvrmS2ekKPF2mSznTQsxqPgnpkI4DNTlrdUmTzrDgektczlKNRRhy5X5AAOnx5S09ydFYWWNSfcEqDTTHgtNA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
  </head>

  <body>
    <a
      href="/"
      class="project-back-button"
      style="
        position: fixed;
        left: 18px;
        top: 18px;
        padding: 8px 12px;
        border-radius: 8px;
        background: white;
        text-decoration: none;
        z-index: 9999;
        font-weight: 700;
        font-family: Inter, system-ui, sans-serif;
        box-shadow: 0 8px 20px rgba(0, 0, 0);
      "
      >← Back to Home</a
    >
    <div class="theme-toggle" id="themeToggle">🌙</div>
    <div class="typewriter-machine">
      <div class="carriage-bar">
        <div class="carriage-knob knob-left"></div>
        <div class="carriage-controls">
          <div class="control-group">
            <label for="pdfTheme"><i class="fas fa-palette"></i> Style</label>
            <select id="pdfTheme">
              <option value="vintage">📜 Vintage</option>
              <option value="editorial">✍️ Editorial</option>
              <option value="modern">⚡ Modern</option>
            </select>
          </div>
          <div class="control-group">
            <label for="pdfTitle"><i class="fas fa-feather"></i> Title</label>
            <input
              type="text"
              id="pdfTitle"
              placeholder="Doc Title..."
              maxlength="40"
            />
          </div>
          <div class="control-group">
            <label for="pdfAuthor"
              ><i class="fas fa-signature"></i> Author</label
            >
            <input
              type="text"
              id="pdfAuthor"
              placeholder="Byline..."
              maxlength="30"
            />
          </div>
          <div class="button-group-carriage">
            <button
              id="exportPdfBtn"
              class="carriage-btn btn-red"
              title="Export to PDF"
            >
              <i class="fas fa-file-pdf"></i> Export
            </button>
            <button
              id="clearPaperBtn"
              class="carriage-btn btn-silver"
              title="Reset Paper"
            >
              <i class="fas fa-trash-alt"></i> Clear
            </button>
          </div>
        </div>
        <div class="carriage-knob knob-right"></div>
      </div>

      <div id="pagesContainer">
        <div class="paper-sheet page active-page">
          <span class="typewriterText"></span>
          <span class="cursor-paper"></span>
        </div>
      </div>

      <div class="typewriter-body">
        <div class="input-area">
          <input
            type="text"
            id="userInput"
            placeholder="Type here or click the keys below…"
          />
          <div class="controls">
            <button id="soundToggle">🔊 Sound ON</button>
            <button id="copyBtn">📋 Copy</button>
            <button id="downloadPDF">📄 Download PDF</button>
            <span id="pageCounter">Page 1</span>
          </div>
          <div class="counters">
            <span id="wordCount">Words: 0</span>
            <span class="counter-separator">|</span>
            <span id="charCount">Characters: 0</span>
          </div>
        </div>
        <div class="keyboard">
          <!-- Numbers row: keys show base char; Shift gives the symbol above -->
          <div class="keyboard-row" id="row-numbers">
            <button
              type="button"
              class="key dual-key"
              data-char="1"
              data-shift="!"
            >
              <span class="key-top">!</span><span class="key-bot">1</span>
            </button>
            <button
              type="button"
              class="key dual-key"
              data-char="2"
              data-shift="@"
            >
              <span class="key-top">@</span><span class="key-bot">2</span>
            </button>
            <button
              type="button"
              class="key dual-key"
              data-char="3"
              data-shift="#"
            >
              <span class="key-top">#</span><span class="key-bot">3</span>
            </button>
            <button
              type="button"
              class="key dual-key"
              data-char="4"
              data-shift="$"
            >
              <span class="key-top">$</span><span class="key-bot">4</span>
            </button>
            <button
              type="button"
              class="key dual-key"
              data-char="5"
              data-shift="%"
            >
              <span class="key-top">%</span><span class="key-bot">5</span>
            </button>
            <button
              type="button"
              class="key dual-key"
              data-char="6"
              data-shift="^"
            >
              <span class="key-top">^</span><span class="key-bot">6</span>
            </button>
            <button
              type="button"
              class="key dual-key"
              data-char="7"
              data-shift="&amp;"
            >
              <span class="key-top">&amp;</span><span class="key-bot">7</span>
            </button>
            <button
              type="button"
              class="key dual-key"
              data-char="8"
              data-shift="*"
            >
              <span class="key-top">*</span><span class="key-bot">8</span>
            </button>
            <button
              type="button"
              class="key dual-key"
              data-char="9"
              data-shift="("
            >
              <span class="key-top">(</span><span class="key-bot">9</span>
            </button>
            <button
              type="button"
              class="key dual-key"
              data-char="0"
              data-shift=")"
            >
              <span class="key-top">)</span><span class="key-bot">0</span>
            </button>
          </div>

          <!-- Symbol row 1 -->
          <div class="keyboard-row" id="row-symbols1">
            <button
              type="button"
              class="key sym-key dual-key"
              data-char="-"
              data-shift="_"
            >
              <span class="key-top">_</span><span class="key-bot">-</span>
            </button>
            <button
              type="button"
              class="key sym-key dual-key"
              data-char="="
              data-shift="+"
            >
              <span class="key-top">+</span><span class="key-bot">=</span>
            </button>
            <button
              type="button"
              class="key sym-key dual-key"
              data-char="["
              data-shift="{"
            >
              <span class="key-top">{</span><span class="key-bot">[</span>
            </button>
            <button
              type="button"
              class="key sym-key dual-key"
              data-char="]"
              data-shift="}"
            >
              <span class="key-top">}</span><span class="key-bot">]</span>
            </button>
            <button
              type="button"
              class="key sym-key dual-key"
              data-char="\"
              data-shift="|"
            >
              <span class="key-top">|</span><span class="key-bot">\</span>
            </button>
            <button
              type="button"
              class="key sym-key dual-key"
              data-char=";"
              data-shift=":"
            >
              <span class="key-top">:</span><span class="key-bot">;</span>
            </button>
            <!-- prettier-ignore -->
            <button
              type="button"
              class="key sym-key dual-key"
              data-char="'"
              data-shift="&quot;"
            >
              <span class="key-top">"</span><span class="key-bot">'</span>
            </button>
            <button
              type="button"
              class="key sym-key dual-key"
              data-char=","
              data-shift="<"
            >
              <span class="key-top">&lt;</span><span class="key-bot">,</span>
            </button>
            <button
              type="button"
              class="key sym-key dual-key"
              data-char="."
              data-shift=">"
            >
              <span class="key-top">&gt;</span><span class="key-bot">.</span>
            </button>
            <button
              type="button"
              class="key sym-key dual-key"
              data-char="/"
              data-shift="?"
            >
              <span class="key-top">?</span><span class="key-bot">/</span>
            </button>
          </div>

          <div class="keyboard-row" id="row1">
            <button type="button" class="key" data-char="q">Q</button>
            <button type="button" class="key" data-char="w">W</button>
            <button type="button" class="key" data-char="e">E</button>
            <button type="button" class="key" data-char="r">R</button>
            <button type="button" class="key" data-char="t">T</button>
            <button type="button" class="key" data-char="y">Y</button>
            <button type="button" class="key" data-char="u">U</button>
            <button type="button" class="key" data-char="i">I</button>
            <button type="button" class="key" data-char="o">O</button>
            <button type="button" class="key" data-char="p">P</button>
          </div>

          <div class="keyboard-row">
            <button type="button" class="key" data-char="a">A</button>
            <button type="button" class="key" data-char="s">S</button>
            <button type="button" class="key" data-char="d">D</button>
            <button type="button" class="key" data-char="f">F</button>
            <button type="button" class="key" data-char="g">G</button>
            <button type="button" class="key" data-char="h">H</button>
            <button type="button" class="key" data-char="j">J</button>
            <button type="button" class="key" data-char="k">K</button>
            <button type="button" class="key" data-char="l">L</button>
          </div>

          <div class="keyboard-row">
            <button type="button" class="key" data-char="z">Z</button>
            <button type="button" class="key" data-char="x">X</button>
            <button type="button" class="key" data-char="c">C</button>
            <button type="button" class="key" data-char="v">V</button>
            <button type="button" class="key" data-char="b">B</button>
            <button type="button" class="key" data-char="n">N</button>
            <button type="button" class="key" data-char="m">M</button>
          </div>

          <div class="keyboard-row keyboard-row--functions">
            <button
              type="button"
              class="key caps-lock"
              data-char="CAPSLOCK"
              aria-pressed="false"
            >
              CAPS LOCK
            </button>
            <button
              type="button"
              class="key shift-key"
              data-char="SHIFT"
              aria-pressed="false"
            >
              ⇧ SHIFT
            </button>
            <button type="button" class="key tab-key" data-char="TAB">
              ⇥ TAB
            </button>
            <button type="button" class="key enter-key" data-char="ENTER">
              ↵ RET
            </button>
            <button type="button" class="key space" data-char="SPACE">
              SPACE
            </button>
            <button type="button" class="key backspace" data-char="BACKSPACE">
              ⌫ DEL
            </button>
          </div>
        </div>
        <div class="cursor-controls">
          <button class="cursor-btn" id="leftCursor">←</button>
          <button class="cursor-btn" id="rightCursor">→</button>
        </div>
      </div>
    </div>
    <div class="toast-container" id="pdfToast"></div>

    <script src="typewriter.js"></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"
      integrity="sha512-GsLlZN/3F2ErC5ifS5QtgpiJtWd43JWSuIgh7mbzZ8zBps+dvLusV+eNQATqgA/HdeKFVgA5v3S/cIrLF7QnIg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
  </body>
</html>
