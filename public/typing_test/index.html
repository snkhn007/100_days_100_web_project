<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typer - Advanced Typing Test</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 class="title">Typer</h1>
        <button class="theme-toggle" id="themeToggle">🌙</button>
    </div>

    <div class="selectors-grid" id="selectorsPanel">
        <div class="selector-panel">
            <div class="panel-label">Difficulty</div>
            <div class="options-flex">
                <button class="opt-btn" data-diff="easy">Easy</button>
                <button class="opt-btn" data-diff="medium">Medium</button>
                <button class="opt-btn" data-diff="hard">Hard</button>
            </div>
        </div>
        <div class="selector-panel">
            <div class="panel-label">Game Mode</div>
            <div class="options-flex">
                <button class="opt-btn" data-mode="regular">Regular</button>
                <button class="opt-btn" data-mode="sudden">Sudden Death</button>
                <button class="opt-btn" data-mode="countdown">Countdown</button>
            </div>
        </div>
    </div>

    <div class="test-area" id="testAreaContainer">
        <div id="gameContent">
            <div class="test-area-header">
                <div class="badge-container">
                    <span class="badge" id="difficultyBadge"></span>
                    <span class="badge" id="modeBadge"></span>
                </div>
            </div>

            <div class="text-container-wrapper" id="textWrapper">
                <div class="typing-caret blinking" id="caret"></div>
                <div class="text-display" id="textDisplay"></div>
            </div>

            <input type="text" id="userInput" autocomplete="off" spellcheck="false">

            <div class="input-focus-overlay" id="focusOverlay">
                <button class="action-btn btn-start">Click to Focus & Type</button>
            </div>

            <div class="controls">
                <button class="action-btn btn-start" id="startBtn">Start Test</button>
                <button class="action-btn btn-reset" id="resetBtn">Reset</button>
            </div>

            <div class="stats hidden" id="stats">
                <div class="stat-item">
                    <div class="stat-label" id="timerLabel">Time</div>
                    <div class="stat-value" id="timerDisplay">0:00</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">WPM</div>
                    <div class="stat-value" id="wpmDisplay">0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Accuracy</div>
                    <div class="stat-value" id="accuracyDisplay">0%</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Errors</div>
                    <div class="stat-value" id="errorDisplay">0</div>
                </div>
            </div>
        </div>

        <div class="results" id="results">
            <h2>Test Complete! 🎉</h2>
            <div class="results-grid">
                <div class="result-item">
                    <div class="result-label">Words Per Minute</div>
                    <div class="result-value" id="finalWpm">0</div>
                </div>
                <div class="result-item">
                    <div class="result-label">Accuracy</div>
                    <div class="result-value" id="finalAccuracy">0%</div>
                </div>
                <div class="result-item">
                    <div class="result-label">Time Spent</div>
                    <div class="result-value" id="finalTime">0s</div>
                </div>
                <div class="result-item">
                    <div class="result-label">Total Errors</div>
                    <div class="result-value" id="finalErrors">0</div>
                </div>
            </div>

            <div class="graph-container">
                <svg class="graph-svg" id="analyticsGraph"></svg>
            </div>

            <div class="controls">
                <button class="action-btn btn-start" id="retryBtn">Try Again</button>
            </div>
        </div>
    </div>
</div>

</body>
</html>
