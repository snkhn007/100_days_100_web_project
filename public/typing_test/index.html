<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typer - Relaxing Typing Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f8f9fa;
            --text-primary: #1a1a1a;
            --text-secondary: #666666;
            --border-color: #e0e0e0;
            --correct: #4ade80;
            --wrong: #ef4444;
            --cursor: #3b82f6;
            --accent: #3b82f6;
            --transition: 0.3s ease;
        }

        html.dark-mode {
            --bg-primary: #0f0f0f;
            --bg-secondary: #1a1a1a;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --border-color: #333333;
            --cursor: #60a5fa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            transition: background-color var(--transition), color var(--transition);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(59, 130, 246, 0.05) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(74, 222, 128, 0.05) 0%, transparent 50%);
            z-index: -1;
            pointer-events: none;
        }

        html.dark-mode body::before {
            background: radial-gradient(circle at 20% 50%, rgba(96, 165, 250, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(74, 222, 128, 0.08) 0%, transparent 50%);
        }

        .container {
            max-width: 900px;
            width: 100%;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 50px;
            padding: 0 20px;
        }

        .title {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -1px;
            background: linear-gradient(135deg, var(--accent), #10b981);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .theme-toggle {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid var(--border-color);
            background-color: var(--bg-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            transition: all var(--transition);
            user-select: none;
        }

        .theme-toggle:hover {
            border-color: var(--accent);
            background-color: var(--accent);
            color: white;
            transform: scale(1.05);
        }

        .theme-toggle:active {
            transform: scale(0.95);
        }

        .test-area {
            background-color: var(--bg-secondary);
            border-radius: 20px;
            padding: 60px 40px;
            margin-bottom: 40px;
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
        }

        .text-display {
            font-size: 1.8rem;
            line-height: 1.8;
            font-weight: 500;
            text-align: center;
            letter-spacing: 0.5px;
            margin-bottom: 40px;
            word-wrap: break-word;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .text-display span {
            position: relative;
            transition: all 0.1s ease;
        }

        .text-display span.correct {
            color: var(--correct);
        }

        .text-display span.wrong {
            color: var(--wrong);
            background-color: rgba(239, 68, 68, 0.1);
            border-radius: 2px;
        }

        .text-display span.current {
            background-color: var(--cursor);
            color: white;
            border-radius: 2px;
            padding: 2px 4px;
            animation: blink 1s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0.5; }
        }

        .text-display span.untyped {
            color: var(--text-secondary);
        }

        .input-section {
            margin-bottom: 20px;
        }

        #userInput {
            width: 100%;
            padding: 20px;
            font-size: 1.1rem;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Courier New', monospace;
            transition: border-color var(--transition), box-shadow var(--transition);
            outline: none;
        }

        #userInput:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }

        button {
            padding: 14px 32px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all var(--transition);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-start {
            background: linear-gradient(135deg, var(--accent), #0ea5e9);
            color: white;
            flex: 1;
            max-width: 200px;
        }

        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }

        .btn-start:active {
            transform: translateY(0);
        }

        .btn-reset {
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            border: 2px solid var(--border-color);
        }

        .btn-reset:hover {
            border-color: var(--accent);
            background-color: var(--accent);
            color: white;
        }

        /* Results section */
        .results {
            display: none;
            text-align: center;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .results h2 {
            font-size: 1.8rem;
            margin-bottom: 30px;
            color: var(--accent);
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .result-item {
            background-color: var(--bg-primary);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .result-label {
            font-size: 0.9rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .result-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
        }

        /* Stats display during typing */
        .stats {
            display: flex;
            justify-content: space-around;
            padding: 20px;
            background-color: var(--bg-primary);
            border-radius: 12px;
            margin-top: 20px;
            border: 1px solid var(--border-color);
            font-size: 0.95rem;
        }

        .stat-item {
            text-align: center;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        @media (max-width: 768px) {
            .title {
                font-size: 1.8rem;
            }

            .text-display {
                font-size: 1.3rem;
                padding: 20px;
            }

            .test-area {
                padding: 30px 20px;
            }

            .results-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Visibility control styles */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="title">Typer</h1>
            <button class="theme-toggle" id="themeToggle">🌙</button>
        </div>

        <div class="test-area">
            <!-- Game Workspace Content -->
            <div id="gameContent">
                <div class="text-display" id="textDisplay"></div>
                <div class="input-section">
                    <input 
                        type="text" 
                        id="userInput" 
                        placeholder="Click here and start typing..." 
                        autocomplete="off"
                        spellcheck="false"
                    >
                </div>
                <div class="controls">
                    <button class="btn-start" id="startBtn">Start Test</button>
                    <button class="btn-reset" id="resetBtn">Reset</button>
                </div>
                <div class="stats hidden" id="stats">
                    <div class="stat-item">
                        <div class="stat-label">Time</div>
                        <div class="stat-value" id="timerDisplay">0:00</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">WPM</div>
                        <div class="stat-value" id="wpmDisplay">0</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Accuracy</div>
                        <div class="stat-value" id="accuracyDisplay">0%</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Typed</div>
                        <div class="stat-value" id="typedDisplay">0</div>
                    </div>
                </div>
            </div>

            <!-- Score / Result Content directly inside the card boundaries -->
            <div class="results" id="results">
                <h2>Test Complete! 🎉</h2>
                <div class="results-grid">
                    <div class="result-item">
                        <div class="result-label">Words Per Minute</div>
                        <div class="result-value" id="finalWpm">0</div>
                    </div>
                    <div class="result-item">
                        <div class="result-label">Accuracy</div>
                        <div class="result-value" id="finalAccuracy">0%</div>
                    </div>
                    <div class="result-item">
                        <div class="result-label">Time</div>
                        <div class="result-value" id="finalTime">0s</div>
                    </div>
                    <div class="result-item">
                        <div class="result-label">Errors</div>
                        <div class="result-value" id="finalErrors">0</div>
                    </div>
                </div>
                <div class="controls">
                    <button class="btn-start" id="retryBtn">Try Again</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js" defer></script>
</body>
</html>
