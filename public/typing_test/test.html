<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <h2 style="margin-right: 10px;">Typer</h2>
        <a href="#">Home</a>
        <a href="#">Typing Test</a>
        <a href="#">Typing Test Result</a>
    </nav>
    <div class="test">
        <h1>Typer Test</h1>
        <p id="text-display"></p>
        <input id="text-input" type="text" placeholder="Start typing here...">
        <p id="timer"></p>
        <p id="result"></p>
        <button id="restart">Restart</button>
    </div>
</body>
<script>
    document.addEventListener('DOMContentLoaded', async function () {
        const difficulty = sessionStorage.getItem('difficulty') || 'easy';
        const duration = parseInt(sessionStorage.getItem('duration'), 10) || 30;
        const timerElement = document.getElementById('timer');
        let timeLeft = duration;

        try {
            // Use relative path correctly
            const response = await fetch('./data/sampletext.json');
            
            if (!response.ok) {
                throw new Error(`HTTP error! Status: ${response.status}`);
            }

            const data = await response.json();
            const textArray = data[difficulty] || [];

            if (textArray.length === 0) {
                throw new Error(`No texts found for difficulty: ${difficulty}`);
            }

            const selectedText = textArray[Math.floor(Math.random() * textArray.length)];
            document.getElementById('text-display').textContent = selectedText;
        } catch (err) {
            console.error('Error fetching JSON:', err);
            document.getElementById('text-display').textContent = 'Error loading text!';
        }

        const interval = setInterval(() => {
            if (timeLeft <= 0) {
                clearInterval(interval);
                document.getElementById('text-input').disabled = true;
            } else {
                timerElement.textContent = `Time left: ${timeLeft}`;
                timeLeft--;
            }
        }, 1000);

        const textInput = document.getElementById('text-input');
        const textDisplay = document.getElementById('text-display');

        textInput.addEventListener('input', () => {
            if (textInput.value.trim() === textDisplay.textContent.trim()) {
                clearInterval(interval);
                textInput.disabled = true;
                timerElement.textContent = `Completed with ${timeLeft} seconds remaining`;
            }
        });

        document.getElementById('restart').addEventListener('click', function () {
            window.location.href = 'main.html';
        });
        
    });
</script>

</html>
