<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Unit Converter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="converter-card">
        <h2>Unit Converter</h2>
        
        <div class="input-group">
            <label for="inputValue">From:</label>
            <input type="number" id="inputValue" value="1" placeholder="Enter value">
            <select id="fromUnit">
                <option value="m">Meters (m)</option>
                <option value="km">Kilometers (km)</option>
                <option value="mi">Miles (mi)</option>
                <option value="ft">Feet (ft)</option>
            </select>
        </div>

        <div class="input-group">
            <label for="outputValue">To:</label>
            <input type="number" id="outputValue" readonly>
            <select id="toUnit">
                <option value="m">Meters (m)</option>
                <option value="km" selected>Kilometers (km)</option>
                <option value="mi">Miles (mi)</option>
                <option value="ft">Feet (ft)</option>
            </select>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
