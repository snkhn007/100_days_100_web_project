<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Virtual Playground</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 20px;
        background: #f0f0f0;
        text-align: center;
      }
      h1 {
        color: #333;
      }
      .play-area {
        width: 400px;
        height: 400px;
        margin: 20px auto;
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        position: relative;
        overflow: hidden;
      }
      .ball {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: #ff6b6b;
        background: #ff6b6b;
        position: absolute;
        cursor: pointer;
        transition: transform 0.1s;
      }
      .controls {
        margin-top: 20px;
      }
      button {
        padding: 10px 20px;
        font-size: 16px;
        margin: 0 5px;
        border: none;
        border-radius: 6px;
        background: #007bff;
        color: #fff;
        cursor: pointer;
      }
      button:hover {
        background: #0056b3;
      }

      /* Planet selector row */
      .planet-selector {
        margin-top: 16px;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }
      .planet-selector label {
        font-size: 14px;
        color: #333;
        margin-right: 4px;
        font-weight: bold;
      }
      /* Planet buttons share the base button style but have a
         distinct inactive colour so active state is clearly visible */
      .planet-btn {
        padding: 8px 14px;
        font-size: 13px;
        margin: 0;
        background: #6c757d;
      }
      .planet-btn:hover {
        background: #495057;
      }
      /* Active planet is highlighted in a distinct accent colour */
      .planet-btn.active {
        background: #fd7e14;
        outline: 2px solid #c96000;
        outline-offset: 1px;
      }
      .planet-btn.active:hover {
        background: #e06c0b;
      }

      /* Customise row (color + shape) */
      .customise {
        margin-top: 14px;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
        font-size: 14px;
        color: #333;
      }
      .customise label {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .customise select {
        padding: 4px 8px;
        border-radius: 6px;
        border: 1px solid #ccc;
        font-size: 14px;
        cursor: pointer;
      }

      /* Responsive: stack controls on narrow screens */
      @media (max-width: 440px) {
        .play-area {
          width: 100%;
          height: 320px;
        }
        .planet-selector {
          gap: 6px;
        }
        .planet-btn {
          padding: 7px 10px;
          font-size: 12px;
        }
      }
    </style>
  </head>
  <body>
    <h1>Virtual Playground</h1>
    <p>Click the ball to make it jump! Select a planet to change gravity.</p>

    <div class="play-area" id="playArea">
      <div class="ball" id="ball"></div>
    </div>

    <!-- Action controls: Reset only (Toggle Gravity replaced by planet selector) -->
    <div class="controls">
      <button onclick="resetBall()">Reset</button>
    </div>

    <!-- Planet Gravity Selector -->
    <div class="planet-selector" id="planetSelector">
      <label>Planet:</label>
      <button class="planet-btn" data-planet="moon">🌕 Moon</button>
      <button class="planet-btn" data-planet="mars">🔴 Mars</button>
      <button class="planet-btn active" data-planet="earth">🌍 Earth</button>
      <button class="planet-btn" data-planet="saturn">🪐 Saturn</button>
      <button class="planet-btn" data-planet="jupiter">🟠 Jupiter</button>
    </div>

    <!-- Ball customisation: color picker + shape selector -->
    <div class="customise">
      <label>Color <input type="color" id="ballColor" value="#ff6b6b" /></label>
      <label>Shape
        <select id="ballShape">
          <option value="circle">Circle</option>
          <option value="square">Square</option>
          <option value="triangle">Triangle</option>
          <option value="star">Star</option>
        </select>
      </label>
    </div>
    <div class="customise">
      <label>Color <input type="color" id="ballColor" value="#ff6b6b" /></label>
      <label>Shape
        <select id="ballShape">
          <option value="circle">Circle</option>
          <option value="square">Square</option>
          <option value="triangle">Triangle</option>
          <option value="star">Star</option>
        </select>
      </label>
    </div>

    <script>
      /* ── Planet configuration ───────────────────────────────────────
         Each planet defines:
           multiplier — scales BASE_GRAVITY (Earth = 1.00 baseline)
           bounce     — coefficient applied to vy on floor/ceiling collision
                        (1.0 = perfectly elastic, 0.0 = no bounce)
      ────────────────────────────────────────────────────────────────── */
      const PLANETS = {
        moon:    { label: 'Moon',    multiplier: 0.16, bounce: 0.95 },
        mars:    { label: 'Mars',    multiplier: 0.38, bounce: 0.85 },
        earth:   { label: 'Earth',   multiplier: 1.00, bounce: 0.75 },
        saturn:  { label: 'Saturn',  multiplier: 1.06, bounce: 0.70 },
        jupiter: { label: 'Jupiter', multiplier: 2.53, bounce: 0.55 },
      };

      /* ── Gravity calculation ────────────────────────────────────────
         BASE_GRAVITY is the raw pixel-per-frame² acceleration for Earth.
         Each planet's actual gravity = BASE_GRAVITY × planet.multiplier.
         This matches the original Earth gravity value of 0.5 exactly.
      ────────────────────────────────────────────────────────────────── */
      const BASE_GRAVITY = 0.5;

      /* Active physics state — starts on Earth */
      let currentPlanet = PLANETS.earth;
      let gravity = BASE_GRAVITY * currentPlanet.multiplier; // 0.5

      const ball     = document.getElementById('ball');
      const area     = document.getElementById('playArea');
      const colorPicker = document.getElementById('ballColor');
      const shapeSelect = document.getElementById('ballShape');

      let x = 180, y = 180, vx = 0, vy = 0;
      let bouncing = true;

      /* ── Physics loop ───────────────────────────────────────────────
         gravity is re-read from the live variable each frame, so
         switching planets takes effect immediately with no restart.
      ────────────────────────────────────────────────────────────────── */
      function update() {
        /* Apply gravity to vertical velocity */
        vy += gravity;
        x  += vx;
        y  += vy;

        /* Bounce coefficient usage:
           On floor/ceiling collision the vertical velocity is reversed
           and scaled by currentPlanet.bounce (energy loss per bounce).
           Wall bouncing uses a fixed 0.7 damping — horizontal drag is
           independent of gravity and consistent across all planets. */
        if (y + 40 > 400) { y = 400 - 40; vy *= -currentPlanet.bounce; }
        if (y < 0)         { y = 0;        vy *= -currentPlanet.bounce; }
        if (x + 40 > 400)  { x = 400 - 40; vx *= -0.7; }
        if (x < 0)         { x = 0;        vx *= -0.7; }

        ball.style.left = x + 'px';
        ball.style.top  = y + 'px';
        if (bouncing) requestAnimationFrame(update);
      }

      /* Click the ball to launch it upward with a random horizontal kick */
      ball.addEventListener('click', () => {
        vy = -10;
        vx = (Math.random() - 0.5) * 10;
      });

      /* Reset restores position and velocity; planet/color/shape unchanged */
      function resetBall() {
        x = 180; y = 180; vx = 0; vy = 0;
      }

      /* ── Planet selector ────────────────────────────────────────────
         Clicking a planet button updates gravity and bounce immediately.
         Active button styling reflects the current selection.
      ────────────────────────────────────────────────────────────────── */
      document.querySelectorAll('.planet-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const key = btn.dataset.planet;
          currentPlanet = PLANETS[key];

          /* Recalculate live gravity from multiplier */
          gravity = BASE_GRAVITY * currentPlanet.multiplier;

          /* Update active highlight */
          document.querySelectorAll('.planet-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
        });
      });

      /* ── Ball colour ────────────────────────────────────────────────
         Color picker input fires on every drag — instant update.
      ────────────────────────────────────────────────────────────────── */
      colorPicker.addEventListener('input', () => {
        ball.style.background = colorPicker.value;
      });
      ball.style.background = colorPicker.value;

      /* ── Ball shape ─────────────────────────────────────────────────
         CSS clip-path handles triangle and star; border-radius for
         circle and square. No canvas needed.
      ────────────────────────────────────────────────────────────────── */
      const CLIP_PATHS = {
        circle:   '',
        square:   '',
        triangle: 'polygon(50% 0%, 0% 100%, 100% 100%)',
        star:     'polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%)',
      };

      function applyShape(shape) {
        ball.style.borderRadius = shape === 'circle' ? '50%' : '0';
        ball.style.clipPath     = CLIP_PATHS[shape];
      }

      shapeSelect.addEventListener('change', () => applyShape(shapeSelect.value));

      /* Kick off the animation loop */
      update();
    </script>
  </body>
</html>
