<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign up – Zomato</title>
    <link rel="icon" type="image/png" href="images/favicon.ico" />
    <link rel="stylesheet" href="index.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />
    <style>
      body {
        background: var(--bg);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* ── NAVBAR ── */
      .z-navbar {
        background: var(--bg-white);
        padding: 0 5%;
        height: 6.2rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        box-shadow: var(--shadow-sm);
        position: sticky;
        top: 0;
        z-index: 100;
        border-bottom: 1px solid var(--border);
        transition: background var(--transition);
      }
      .z-navbar-logo {
        height: 2.8rem;
        cursor: pointer;
        object-fit: contain;
      }
      .z-navbar-right {
        display: flex;
        gap: 10px;
        align-items: center;
      }
      .z-navbar-right a {
        text-decoration: none;
        font-size: 1.45rem;
        color: var(--text-secondary);
        font-weight: 500;
        padding: 0.65rem 1.6rem;
        border-radius: var(--radius-sm);
        transition:
          background var(--transition),
          color var(--transition);
      }
      .z-navbar-right a:hover {
        background: var(--red-light);
        color: var(--red);
      }
      .z-navbar-right a.active {
        border: 1.5px solid var(--red);
        color: var(--red);
        background: var(--red-light);
      }
      .z-dm-btn {
        background: var(--bg);
        border: 1.5px solid var(--border-dark);
        color: var(--text-primary);
        font-size: 1.3rem;
        padding: 0.55rem 1.1rem;
        border-radius: 99px;
        cursor: pointer;
        font-family: "Outfit", sans-serif;
        transition:
          border-color var(--transition),
          background var(--transition);
      }
      .z-dm-btn:hover {
        border-color: var(--red);
        background: var(--red-light);
      }

      /* ── MAIN ── */
      .z-main {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 4rem 2rem;
      }

      /* ── CARD ── */
      .z-card {
        background: var(--bg-white);
        border-radius: var(--radius-lg);
        padding: 4rem 3.8rem 3.4rem;
        width: 100%;
        max-width: 46rem;
        box-shadow: var(--shadow-lg);
        border: 1px solid var(--border);
        transition: background var(--transition);
        animation: cardIn 0.45s cubic-bezier(0.4, 0, 0.2, 1) both;
      }
      @keyframes cardIn {
        from {
          opacity: 0;
          transform: translateY(24px) scale(0.98);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      .z-card h2 {
        font-size: 2.6rem;
        font-weight: 700;
        color: var(--text-primary);
        margin-bottom: 0.5rem;
        letter-spacing: -0.02em;
      }
      .z-card .sub {
        font-size: 1.4rem;
        color: var(--text-muted);
        margin-bottom: 2.8rem;
      }
      .z-card .sub a {
        color: var(--red);
        font-weight: 600;
      }

      /* Social */
      .z-social {
        display: flex;
        gap: 10px;
        margin-bottom: 2rem;
      }
      .z-social-btn {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 1rem 1.4rem;
        border: 1.5px solid var(--border);
        border-radius: var(--radius-sm);
        background: var(--bg-white);
        font-size: 1.4rem;
        font-weight: 600;
        color: var(--text-primary);
        cursor: pointer;
        font-family: "Outfit", sans-serif;
        transition:
          border-color var(--transition),
          background var(--transition),
          transform var(--transition);
      }
      .z-social-btn:hover {
        border-color: var(--red);
        background: var(--red-light);
        transform: translateY(-2px);
      }
      .z-social-btn i {
        font-size: 1.6rem;
      }
      .z-social-btn .fa-google {
        color: #4285f4;
      }
      .z-social-btn .fa-facebook {
        color: #3b5998;
      }

      /* Divider */
      .z-divider {
        display: flex;
        align-items: center;
        gap: 12px;
        color: var(--text-muted);
        font-size: 1.2rem;
        margin: 1.6rem 0;
      }
      .z-divider::before,
      .z-divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--border);
      }

      /* Fields */
      .z-field {
        margin-bottom: 1.5rem;
      }
      .z-field label {
        display: block;
        font-size: 1.25rem;
        font-weight: 600;
        color: var(--text-secondary);
        margin-bottom: 0.6rem;
        letter-spacing: 0.01em;
      }
      .z-field input {
        width: 100%;
        padding: 1.2rem 1.4rem;
        border: 1.5px solid var(--border-dark);
        border-radius: var(--radius-sm);
        font-size: 1.45rem;
        font-family: "Outfit", sans-serif;
        color: var(--text-primary);
        background: var(--bg-white);
        outline: none;
        transition:
          border-color var(--transition),
          box-shadow var(--transition),
          background var(--transition);
      }
      .z-field input:focus {
        border-color: var(--red);
        box-shadow: 0 0 0 3px rgba(226, 55, 68, 0.1);
      }
      .z-field input.err {
        border-color: var(--red);
      }
      .z-field input::placeholder {
        color: var(--text-muted);
      }
      .z-err {
        font-size: 1.15rem;
        color: var(--red);
        margin-top: 5px;
        min-height: 16px;
        display: block;
      }

      /* Password */
      .pw-wrap {
        position: relative;
      }
      .pw-wrap input {
        padding-right: 6rem;
      }
      .pw-toggle {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: var(--text-muted);
        font-size: 1.15rem;
        font-weight: 700;
        font-family: "Outfit", sans-serif;
        cursor: pointer;
        transition: color var(--transition);
      }
      .pw-toggle:hover {
        color: var(--red);
      }

      /* Strength bar */
      .strength-wrap {
        height: 5px;
        background: var(--border);
        border-radius: 99px;
        margin-top: 10px;
        overflow: hidden;
      }
      .strength-bar {
        height: 100%;
        width: 0;
        border-radius: 99px;
        transition:
          width 0.35s ease,
          background 0.35s ease;
      }
      .strength-lbl {
        font-size: 1.15rem;
        font-weight: 600;
        display: block;
        margin-top: 5px;
        min-height: 16px;
      }

      /* Terms */
      .z-terms {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        font-size: 1.3rem;
        color: var(--text-secondary);
        margin-bottom: 1.8rem;
        cursor: pointer;
        line-height: 1.5;
      }
      .z-terms input {
        accent-color: var(--red);
        margin-top: 3px;
        flex-shrink: 0;
        width: 1.5rem;
        height: 1.5rem;
      }
      .z-terms a {
        color: var(--red);
        font-weight: 600;
      }

      /* Submit */
      .z-submit {
        width: 100%;
        padding: 1.4rem;
        background: var(--red);
        color: #fff;
        border: none;
        border-radius: var(--radius-sm);
        font-size: 1.6rem;
        font-weight: 700;
        font-family: "Outfit", sans-serif;
        cursor: pointer;
        box-shadow: 0 4px 16px rgba(226, 55, 68, 0.3);
        transition:
          background var(--transition),
          transform var(--transition),
          box-shadow var(--transition);
      }
      .z-submit:hover {
        background: var(--red-dark);
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(226, 55, 68, 0.35);
      }
      .z-submit:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }

      /* Success */
      .z-success {
        background: #f0fff4;
        border: 1.5px solid #86efac;
        color: #166534;
        border-radius: var(--radius-sm);
        padding: 1.1rem 1.4rem;
        font-size: 1.3rem;
        text-align: center;
        margin-top: 1.4rem;
        font-weight: 500;
      }
      body.dark-mode .z-success {
        background: #0f2e1c;
        border-color: #166534;
        color: #86efac;
      }

      /* Switch */
      .z-switch {
        text-align: center;
        font-size: 1.35rem;
        color: var(--text-muted);
        margin-top: 2.2rem;
      }
      .z-switch a {
        color: var(--red);
        font-weight: 700;
      }
      .z-switch a:hover {
        text-decoration: underline;
      }

      @media (max-width: 480px) {
        .z-card {
          padding: 3rem 2rem 2.6rem;
        }
        .z-card h2 {
          font-size: 2rem;
        }
        .z-social {
          flex-direction: column;
        }
        .z-navbar-right a {
          font-size: 1.3rem;
          padding: 0.55rem 1rem;
        }
      }
    </style>
  </head>
  <body>
    <!-- Navbar -->
    <nav class="z-navbar">
      <a href="zomato.html">
        <img
          class="z-navbar-logo"
          src="https://b.zmtcdn.com/web_assets/b40b97e677bc7b2ca77c58c61db266fe1603954218.png"
          alt="Zomato"
        />
      </a>
      <div class="z-navbar-right">
        <a href="login.html">Log in</a>
        <a href="signup.html" class="active">Sign up</a>
        <button class="z-dm-btn" id="dmToggle">🌙</button>
      </div>
    </nav>

    <main class="z-main">
      <div class="z-card">
        <h2>Create your account 🍽️</h2>
        <p class="sub">or <a href="login.html">log in to your account</a></p>

        <div class="z-social">
          <button class="z-social-btn" onclick="socialSignup('Google')">
            <i class="fa fa-google"></i> Google
          </button>
          <button class="z-social-btn" onclick="socialSignup('Facebook')">
            <i class="fa fa-facebook"></i> Facebook
          </button>
        </div>

        <div class="z-divider"><span>or sign up with email</span></div>

        <form id="signupForm" novalidate>
          <div class="z-field">
            <label for="fullName">Full Name</label>
            <input
              type="text"
              id="fullName"
              placeholder="Your full name"
              autocomplete="name"
            />
            <span class="z-err" id="nameErr"></span>
          </div>

          <div class="z-field">
            <label for="signupEmail">Email address</label>
            <input
              type="email"
              id="signupEmail"
              placeholder="you@example.com"
              autocomplete="email"
            />
            <span class="z-err" id="emailErr"></span>
          </div>

          <div class="z-field">
            <label for="signupPw">Password</label>
            <div class="pw-wrap">
              <input
                type="password"
                id="signupPw"
                placeholder="Create a strong password"
                oninput="checkStrength(this.value)"
                autocomplete="new-password"
              />
              <button
                type="button"
                class="pw-toggle"
                id="pwToggle1"
                onclick="togglePw('signupPw', 'pwToggle1')"
              >
                SHOW
              </button>
            </div>
            <div class="strength-wrap">
              <div class="strength-bar" id="strengthBar"></div>
            </div>
            <span class="strength-lbl" id="strengthLbl"></span>
            <span class="z-err" id="pwErr"></span>
          </div>

          <div class="z-field">
            <label for="confirmPw">Confirm Password</label>
            <div class="pw-wrap">
              <input
                type="password"
                id="confirmPw"
                placeholder="Re-enter your password"
                autocomplete="new-password"
              />
              <button
                type="button"
                class="pw-toggle"
                id="pwToggle2"
                onclick="togglePw('confirmPw', 'pwToggle2')"
              >
                SHOW
              </button>
            </div>
            <span class="z-err" id="confirmErr"></span>
          </div>

          <label class="z-terms">
            <input type="checkbox" id="terms" />
            I agree to the <a href="#">Terms of Service</a> and
            <a href="#">Privacy Policy</a>
          </label>
          <span class="z-err" id="termsErr"></span>

          <button type="submit" class="z-submit">Create Account</button>
          <div id="signupSuccess" class="z-success" style="display: none"></div>
        </form>

        <p class="z-switch">
          Already have an account? <a href="login.html">Log in</a>
        </p>
      </div>
    </main>

    <script>
      // Dark mode sync
      (function () {
        const dm = document.getElementById("dmToggle");
        const apply = (dark) => {
          document.body.classList.toggle("dark-mode", dark);
          if (dm) dm.textContent = dark ? "☀️" : "🌙";
        };
        apply(localStorage.getItem("zomato-theme") === "dark");
        if (dm)
          dm.addEventListener("click", () => {
            const isDark = document.body.classList.contains("dark-mode");
            apply(!isDark);
            localStorage.setItem("zomato-theme", isDark ? "light" : "dark");
          });
      })();

      function togglePw(inputId, btnId) {
        const input = document.getElementById(inputId);
        const btn = document.getElementById(btnId);
        if (input.type === "password") {
          input.type = "text";
          btn.textContent = "HIDE";
        } else {
          input.type = "password";
          btn.textContent = "SHOW";
        }
      }

      function checkStrength(val) {
        const bar = document.getElementById("strengthBar");
        const lbl = document.getElementById("strengthLbl");
        let score = 0;
        if (val.length >= 8) score++;
        if (/[A-Z]/.test(val)) score++;
        if (/[0-9]/.test(val)) score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;
        const levels = [
          { w: "0%", c: "transparent", t: "" },
          { w: "25%", c: "#ef4444", t: "Weak" },
          { w: "50%", c: "#f97316", t: "Fair" },
          { w: "75%", c: "#3b82f6", t: "Good" },
          { w: "100%", c: "#22c55e", t: "Strong 💪" },
        ];
        bar.style.width = levels[score].w;
        bar.style.background = levels[score].c;
        lbl.textContent = levels[score].t;
        lbl.style.color = levels[score].c;
      }

      function socialSignup(provider) {
        showToast(provider + " signup coming soon!");
      }

      function showToast(msg) {
        const t = document.createElement("div");
        t.textContent = msg;
        Object.assign(t.style, {
          position: "fixed",
          bottom: "2.4rem",
          left: "50%",
          transform: "translateX(-50%)",
          background: "#1c1c1c",
          color: "#fff",
          padding: "1.1rem 2rem",
          borderRadius: "99px",
          fontSize: "1.4rem",
          fontFamily: "Outfit,sans-serif",
          boxShadow: "0 8px 30px rgba(0,0,0,0.25)",
          zIndex: "99999",
          opacity: "0",
          transition: "opacity 0.25s ease",
        });
        document.body.appendChild(t);
        requestAnimationFrame(() => (t.style.opacity = "1"));
        setTimeout(() => {
          t.style.opacity = "0";
          setTimeout(() => t.remove(), 300);
        }, 2600);
      }

      document
        .getElementById("signupForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          let valid = true;
          const name = document.getElementById("fullName").value.trim();
          const email = document.getElementById("signupEmail").value.trim();
          const pw = document.getElementById("signupPw").value;
          const cpw = document.getElementById("confirmPw").value;
          const terms = document.getElementById("terms").checked;

          ["nameErr", "emailErr", "pwErr", "confirmErr", "termsErr"].forEach(
            (id) => {
              document.getElementById(id).textContent = "";
            },
          );

          if (!name || name.length < 2) {
            document.getElementById("nameErr").textContent =
              "Please enter your full name (min 2 chars).";
            valid = false;
          }
          if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
            document.getElementById("emailErr").textContent =
              "Please enter a valid email address.";
            valid = false;
          }
          if (!pw || pw.length < 8) {
            document.getElementById("pwErr").textContent =
              "Password must be at least 8 characters.";
            valid = false;
          }
          if (pw !== cpw) {
            document.getElementById("confirmErr").textContent =
              "Passwords do not match.";
            valid = false;
          }
          if (!terms) {
            document.getElementById("termsErr").textContent =
              "Please accept the terms to continue.";
            valid = false;
          }

          if (valid) {
            const btn = this.querySelector(".z-submit");
            btn.textContent = "Creating account…";
            btn.disabled = true;
            setTimeout(() => {
              const success = document.getElementById("signupSuccess");
              success.style.display = "block";
              success.textContent = "✅ Account created! Redirecting to login…";
              setTimeout(() => (window.location.href = "login.html"), 1800);
            }, 1000);
          }
        });
    </script>
  </body>
</html>
